<div id="tooltip" class="tooltip"></div>
<script>
const tooltip = document.getElementById('tooltip');
const dots = Array.from(document.querySelectorAll('.dot'));
const catColor = {"★泊松信号":"#16a34a","死猫反弹":"#dc2626","空头主导":"#64748b","数据不足":"#94a3b8"};
function showTip(e) {
  const t = e.target;
  tooltip.innerHTML = `<div class="t-name" style="color:${catColor[t.dataset.cat]||'#fff'}">${t.dataset.name}</div>
    <div class="t-row"><span class="t-label">产业链</span><span class="t-val">${t.dataset.chain||'—'}</span></div>
    <div class="t-row"><span class="t-label">λ净</span><span class="t-val">${t.dataset.ln}</span></div>
    <div class="t-row"><span class="t-label">总收益</span><span class="t-val">${t.dataset.tot}</span></div>
    <div class="t-row"><span class="t-label">分类</span><span class="t-val">${t.dataset.cat}</span></div>`;
  tooltip.style.left = (e.clientX + 12) + 'px';
  tooltip.style.top = (e.clientY + 12) + 'px';
  tooltip.style.opacity = 1;
}
function moveTip(e) { tooltip.style.left = (e.clientX + 12) + 'px'; tooltip.style.top = (e.clientY + 12) + 'px'; }
function hideTip() { tooltip.style.opacity = 0; }
dots.forEach(d => {
  d.addEventListener('mouseenter', showTip);
  d.addEventListener('mousemove', moveTip);
  d.addEventListener('mouseleave', hideTip);
  if (d.dataset.url) d.addEventListener('click', () => location.href = d.dataset.url);
});

// 筛选：按分类 + 按产业链
const catBtns = Array.from(document.querySelectorAll('.filter-btn'));
const chainSel = document.getElementById('chainSel');
const countTag = document.getElementById('countTag');
let curCat = '全部', curChain = '全部';
function applyFilter() {
  let n = 0;
  dots.forEach(d => {
    const okC = curCat === '全部' || d.dataset.cat === curCat;
    const okH = curChain === '全部' || d.dataset.chain === curChain;
    const show = okC && okH;
    d.style.display = show ? '' : 'none';
    if (show) n++;
  });
  countTag.textContent = `显示 ${n} / ${dots.length}`;
}
catBtns.forEach(b => b.addEventListener('click', () => {
  catBtns.forEach(x => x.classList.remove('active'));
  b.classList.add('active');
  curCat = b.dataset.cat;
  applyFilter();
}));
chainSel.addEventListener('change', () => { curChain = chainSel.value; applyFilter(); });
applyFilter();
</script>
</body>
</html>
