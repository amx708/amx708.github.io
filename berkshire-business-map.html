  overflow:hidden;
}
.hero::before{
  content:'';
  position:absolute;
  top:-50%;left:-50%;
  width:200%;height:200%;
  background:radial-gradient(ellipse at 30% 20%, rgba(245,158,11,0.10) 0%, transparent 50%),

  pointer-events:none;
}
.hero::after{
  content:'';
  position:absolute;
  bottom:0;left:0;right:0;
  height:100px;

  pointer-events:none;
}

.hero-badge{

  letter-spacing:0.5px;
  margin-bottom:18px;
}
.hero h1{

  color:#fff;
  margin-bottom:12px;
  letter-spacing:1px;
}
.hero p{

  color:rgba(255,255,255,0.6);
  max-width:600px;
  margin:0 auto;
}
.hero-stats{

  justify-content:center;
  gap:28px;
  margin-top:26px;
  flex-wrap:wrap;
}

.hero-stat .num{font-size:24px;font-weight:800;color:#fbbf24}
.hero-stat .lab{font-size:12px;color:rgba(255,255,255,0.5);margin-top:2px}

.toolbar-actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.zoom-btn{

  border:1px solid #e2e8f0;
  background:#fff;
  border-radius:9px;
  cursor:pointer;
  font-size:13px;
  font-weight:500;
  color:#334155;
  transition:all .15s;
}
.zoom-btn:hover{background:#f1f5f9;border-color:#cbd5e1;color:#0f172a}

.view-original-btn{
  display:inline-flex;
  align-items:center;
  gap:4px;
  padding:7px 15px;
  background:#1e293b;
  color:#fff;
  border-radius:9px;
  font-size:13px;
  font-weight:500;
  text-decoration:none;
  transition:background .15s;
}
.view-original-btn:hover{background:#334155}

.image-viewer-card{max-width:1100px;margin:34px auto 0}

/* ===== Map stage: original image, drag to pan (no zoom) ===== */
.map-stage{
  position:relative;
  height:80vh;
  max-height:900px;
  overflow:hidden;
  background:#0f172a;
  cursor:grab;
  user-select:none;
  -webkit-user-select:none;
  touch-action:none;
  line-height:0;
}
.map-stage.grabbing{cursor:grabbing}
.map-stage img{
  display:block;
  width:100%;
  height:auto;
  transform-origin:0 0;
  will-change:transform;
  user-select:none;
  -webkit-user-drag:none;
}
.map-tip{
  position:absolute;
  left:50%;bottom:14px;
  transform:translateX(-50%);
  background:rgba(15,23,42,0.8);
  color:#e2e8f0;
  font-size:12.5px;
  line-height:1.4;
  padding:7px 16px;
  border-radius:22px;
  pointer-events:none;
  white-space:nowrap;
  backdrop-filter:blur(4px);
}

/* ===== Search Bar ===== */
.search-section{

  margin:34px auto 0;
  padding:0 24px;
}
.search-box{

  max-width:520px;
  margin:0 auto;
}
.search-box input{

  font-size:15px;

.search-icon{

  pointer-events:none;
}
.search-results-count{

  font-size:13px;
  color:#64748b;
}

/* ===== Category Tabs ===== */
.category-tabs{

// ===== Render Companies =====
const categoryNames = {
  insurance: {cn:"保险业务", en:"Insurance"},
  railroad: {cn:"铁路", en:"Railroad"},
  energy: {cn:"能源", en:"Berkshire Hathaway Energy"},
  manufacturing: {cn:"制造业", en:"Manufacturing"},
  distribution: {cn:"批发分销", en:"Distribution (McLane)"},
  retail: {cn:"服务与零售", en:"Service & Retailing"},
  finance: {cn:"金融与金融产品", en:"Finance & Financial Products"},
};

const categoryIcons = {
  insurance: "🛡️",
  railroad: "🚂",
  energy: "⚡",
  manufacturing: "🏭",
  distribution: "📦",
  retail: "🛒",
  finance: "💰",
};

function renderCompanies() {
  const container = document.getElementById('companies-container');
  const categories = ['insurance','railroad','energy','manufacturing','distribution','retail','finance'];

  // Update counts
  document.getElementById('count-all').textContent = companies.length;
  categories.forEach(cat => {
    const count = companies.filter(c => c.cat === cat).length;
    const el = document.getElementById('count-' + cat);
    if (el) el.textContent = count;
  });

  let html = '';
  categories.forEach(cat => {
    const catCompanies = companies.filter(c => c.cat === cat);
    const info = categoryNames[cat];
    html += `<div class="category-section" id="cat-${cat}">`;
    html += `<div class="category-header">`;
    html += `<span class="category-icon">${categoryIcons[cat]}</span>`;
    html += `<span class="category-title">${info.cn}</span>`;
    html += `<span class="category-en">${info.en}</span>`;
    html += `<span class="category-count">${catCompanies.length} 家</span>`;
    html += `</div>`;
    html += `<div class="company-grid">`;
    catCompanies.forEach((c, i) => {
      html += `<div class="company-card" data-cn="${c.cn}" data-en="${c.en}" data-cat="${c.cat}">`;
      html += `<div class="company-name-cn">${c.cn}</div>`;
      html += `<div class="company-name-en">${c.en}</div>`;
      html += `<span class="company-tag tag-${c.cat}">${c.tag}</span>`;
      html += `<div class="company-desc">${c.desc}</div>`;
      html += `</div>`;
    });
    html += `</div></div>`;
  });

  container.innerHTML = html;
}

// ===== Scroll to Category =====
function scrollToCategory(cat, ev) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  if (ev && ev.currentTarget) ev.currentTarget.classList.add('active');

  if (cat === 'all') {
    window.scrollTo({top: document.querySelector('.companies-section').offsetTop - 70, behavior: 'smooth'});
    return;
  }
  const el = document.getElementById('cat-' + cat);
  if (el) {
    el.scrollIntoView({behavior: 'smooth', block: 'start'});
  }
}

// ===== Search =====
function searchCompanies() {
  const query = document.getElementById('search-input').value.trim().toLowerCase();
  const cards = document.querySelectorAll('.company-card');
  let matchCount = 0;

  cards.forEach(card => {
    card.classList.remove('search-match');
    if (!query) return;

    const cn = card.dataset.cn.toLowerCase();
    const en = card.dataset.en.toLowerCase();
    if (cn.includes(query) || en.includes(query)) {
      card.classList.add('search-match');
      matchCount++;
    }
  });

  const countEl = document.getElementById('search-count');
  if (query) {
    countEl.textContent = `找到 ${matchCount} 家匹配的公司`;
  } else {
    countEl.textContent = '';
  }
}

// ===== Map drag-pan (original image, NO zoom) =====
const stageEl = document.getElementById('map-stage');
const imgEl = document.getElementById('map-img');
let tx = 0, ty = 0, dragging = false, sx = 0, sy = 0, ox = 0, oy = 0;

function mapClamp(){
  const iw = imgEl.clientWidth, ih = imgEl.clientHeight;
  const sw = stageEl.clientWidth, sh = stageEl.clientHeight;
  // keep image covering the stage; pan only when image overflows
  const minX = iw <= sw ? 0 : sw - iw;
  const maxX = iw <= sw ? 0 : 0;
  const minY = ih <= sh ? 0 : sh - ih;
  const maxY = ih <= sh ? 0 : 0;
  tx = Math.max(minX, Math.min(maxX, tx));
  ty = Math.max(minY, Math.min(maxY, ty));
}
function mapApply(){ imgEl.style.transform = `translate(${tx}px, ${ty}px)`; }
function mapInit(){ tx = 0; ty = 0; mapClamp(); mapApply(); }

stageEl.addEventListener('mousedown', (e) => {
  dragging = true; sx = e.clientX; sy = e.clientY; ox = tx; oy = ty;
  stageEl.classList.add('grabbing');
});
window.addEventListener('mousemove', (e) => {
  if (!dragging) return;
  tx = ox + (e.clientX - sx);
  ty = oy + (e.clientY - sy);
  mapClamp(); mapApply();
});
window.addEventListener('mouseup', () => {
  dragging = false; stageEl.classList.remove('grabbing');
});
// Wheel = pan vertically (intentionally NOT zoom — original stays crisp)
stageEl.addEventListener('wheel', (e) => {
  e.preventDefault();
  ty -= e.deltaY;
  mapClamp(); mapApply();
}, {passive: false});
// Touch: one-finger pan
let tSX = 0, tSY = 0, tOX = 0, tOY = 0;
stageEl.addEventListener('touchstart', (e) => {
  if (e.touches.length === 1){
    dragging = true; tSX = e.touches[0].clientX; tSY = e.touches[0].clientY;
    tOX = tx; tOY = ty;
  }
}, {passive: false});
stageEl.addEventListener('touchmove', (e) => {
  if (dragging && e.touches.length === 1){
    e.preventDefault();
    tx = tOX + (e.touches[0].clientX - tSX);
    ty = tOY + (e.touches[0].clientY - tSY);
    mapClamp(); mapApply();
  }
}, {passive: false});
stageEl.addEventListener('touchend', () => { dragging = false; });
window.addEventListener('resize', mapInit);
imgEl.addEventListener('load', mapInit);
mapInit();

// Scroll spy for tabs
window.addEventListener('scroll', () => {
  const sections = document.querySelectorAll('.category-section');
  const tabs = document.querySelectorAll('.tab-btn');
  let current = 'all';

  sections.forEach(sec => {
    const rect = sec.getBoundingClientRect();
    if (rect.top < 220 && rect.bottom > 220) {
      current = sec.id.replace('cat-', '');
    }
  });

  tabs.forEach(tab => {
    tab.classList.remove('active');
    if (tab.textContent.includes(categoryNames[current]?.cn?.slice(0,2)) ||
        (current === 'all' && tab.textContent.includes('全部'))) {
      tab.classList.add('active');
    }
  });
});

renderCompanies();
