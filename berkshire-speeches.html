        animation: tts-hint-in 0.3s ease;

      }

        padding-bottom: 60px !important;
      }

    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 15 12 9 18 15"></polyline></svg>
  </button>
  <div class="tts-widget-progress-wrap" id="tts-progress-wrap">
    <div class="tts-widget-progress-fill" id="tts-progress-fill" style="width: 0%;"></div>
  </div>
  <div class="tts-widget-controls">
    <button class="tts-widget-btn-play" id="tts-btn-play" title="播放">
      <svg viewBox="0 0 24 24"><polygon points="6,4 20,12 6,20"></polygon></svg>
    </button>
    <button class="tts-widget-btn" id="tts-btn-stop" title="停止">⏹</button>
    <span class="tts-widget-sep"></span>
    <button class="tts-widget-btn" id="tts-btn-lang" title="切换语言">普通话</button>
    <span class="tts-widget-sep"></span>
    <button class="tts-widget-btn" id="tts-btn-speed" title="语速">1.0x</button>
    <span class="tts-widget-sep"></span>
    <button class="tts-widget-btn" id="tts-btn-point" title="定字朗读：点击任意字开始从该字朗读，黄色高亮逐字跟随">📍 定字朗读</button>
    <span class="tts-widget-spacer"></span>
    <span class="tts-widget-progress-text" id="tts-progress-text">4 段</span>
  </div>
</div></body></html>
