<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>站内搜索 — 伯克希尔投资数据中心</title>
<style>
/* ===== Reset & Base ===== */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-font-smoothing:antialiased}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei","Helvetica Neue",sans-serif;
  background:#f1f5f9;color:#1e293b;line-height:1.6;min-height:100vh;
}

/* ===== Top Home Bar ===== */
.top-home-bar{position:absolute;top:16px;left:24px;z-index:10}
.home-btn{
  display:inline-flex;align-items:center;gap:6px;
  padding:7px 14px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.18);
  border-radius:20px;color:rgba(255,255,255,0.85);font-size:13px;font-weight:500;
  text-decoration:none;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);
  transition:all 0.2s ease;
}
.home-btn:hover{background:rgba(255,255,255,0.18);border-color:rgba(255,255,255,0.28);color:#fff;transform:translateY(-1px)}

/* ===== Breadcrumb ===== */
.breadcrumb{max-width:1100px;margin:0 auto;padding:14px 24px 6px;font-size:13px;color:rgba(255,255,255,0.6);position:relative;z-index:2}
.breadcrumb a{color:rgba(255,255,255,0.7);text-decoration:none;transition:color 0.15s}
.breadcrumb a:hover{color:#fbbf24}
.breadcrumb span{color:rgba(255,255,255,0.35);margin:0 6px}
.breadcrumb .current{color:rgba(255,255,255,0.9);font-weight:500}

/* ===== Hero ===== */
.hero{
  position:relative;background:linear-gradient(135deg,#0f172a 0%,#1e293b 40%,#1e3a5f 100%);
  padding:60px 24px 90px;text-align:center;overflow:hidden;
}
.hero::before{
  content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;
  background:radial-gradient(ellipse at 30% 20%, rgba(245,158,11,0.08) 0%, transparent 50%),
              radial-gradient(ellipse at 70% 80%, rgba(37,99,235,0.06) 0%, transparent 50%);
  pointer-events:none;
}
.hero::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:100px;
  background:linear-gradient(to top, #f1f5f9 0%, transparent 100%);pointer-events:none;
}
.hero-content{position:relative;z-index:2;max-width:800px;margin:0 auto}
.hero-badge{
  display:inline-block;padding:4px 16px;
  background:rgba(245,158,11,0.15);border:1px solid rgba(245,158,11,0.3);
  border-radius:20px;color:#fbbf24;font-size:13px;font-weight:500;letter-spacing:0.5px;margin-bottom:20px;
}
.hero h1{font-size:clamp(28px,5vw,44px);font-weight:800;color:#fff;line-height:1.25;letter-spacing:-0.5px;margin-bottom:16px}
.hero h1 span{color:#f59e0b}
.hero>p{font-size:15px;color:#94a3b8;max-width:560px;margin:0 auto 28px;line-height:1.7}

/* ===== Search Box ===== */
.search-box{
  max-width:680px;margin:0 auto;position:relative;
}
.search-input-wrap{
  display:flex;align-items:center;gap:10px;
  background:#fff;border-radius:14px;padding:8px 8px 8px 18px;
  box-shadow:0 8px 32px rgba(0,0,0,0.18);border:1px solid rgba(255,255,255,0.1);
}
.search-icon{font-size:20px;color:#94a3b8}
.search-input{
  flex:1;border:none;background:transparent;font-size:16px;color:#1e293b;outline:none;padding:10px 0;
}
.search-input::placeholder{color:#94a3b8}
.search-btn{
  padding:11px 22px;background:#f59e0b;color:#fff;border:none;border-radius:10px;
  font-size:14px;font-weight:600;cursor:pointer;transition:all 0.2s ease;
}
.search-btn:hover{background:#d97706}
.search-tips{
  margin-top:10px;font-size:12px;color:rgba(255,255,255,0.5);
}
.search-tips span{display:inline-block;margin:0 8px}

/* ===== Main ===== */
.main{max-width:1100px;margin:0 auto;padding:32px 24px 80px}

/* ===== Filters ===== */
.filter-bar{
  display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:24px;
}
.filter-label{font-size:13px;color:#64748b;font-weight:600;margin-right:4px}
.filter-chip{
  padding:6px 14px;border-radius:20px;font-size:13px;font-weight:500;
  border:1px solid #e2e8f0;background:#fff;color:#475569;cursor:pointer;transition:all 0.15s ease;
}
.filter-chip:hover{border-color:#cbd5e1;background:#f8fafc}
.filter-chip.active{background:#1e293b;color:#fff;border-color:#1e293b}
.filter-chip .count{font-size:11px;color:#94a3b8;margin-left:4px}
.filter-chip.active .count{color:rgba(255,255,255,0.7)}

/* ===== Results Meta ===== */
.results-meta{font-size:13px;color:#64748b;margin-bottom:16px}
.results-meta strong{color:#1e293b}

/* ===== Result Cards ===== */
.result-list{display:flex;flex-direction:column;gap:14px}
.result-card{
  background:#fff;border-radius:14px;border:1px solid #e2e8f0;
  padding:20px 22px;box-shadow:0 2px 8px rgba(0,0,0,0.04);
  transition:all 0.2s ease;text-decoration:none;display:block;
}
.result-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,0.08);border-color:#cbd5e1}
.result-card .card-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:8px}
.result-card .card-title{font-size:16px;font-weight:700;color:#0f172a;line-height:1.4;margin-bottom:6px}
.result-card:hover .card-title{color:#f59e0b}
.result-card .card-desc{font-size:13px;color:#64748b;line-height:1.7;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.result-card .card-meta{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-top:12px;font-size:12px}
.result-card .category-badge{
  padding:3px 10px;border-radius:12px;font-weight:600;
  background:#eff6ff;color:#2563eb;border:1px solid #dbeafe;
}
.result-card .category-badge.cat-年会实录{background:#fef2f2;color:#dc2626;border-color:#fecaca}
.result-card .category-badge.cat-致股东的信{background:#f0fdf4;color:#16a34a;border-color:#bbf7d0}
.result-card .category-badge.cat-帕伯莱演讲,
.result-card .category-badge.cat-李录演讲,
.result-card .category-badge.cat-价值投资演讲{background:#fffbeb;color:#b45309;border-color:#fde68a}
.result-card .category-badge.cat-投资工具{background:#f5f3ff;color:#7c3aed;border-color:#ddd6fe}
.result-card .category-badge.cat-伯克希尔业务,
.result-card .category-badge.cat-伯克希尔投资,
.result-card .category-badge.cat-伯克希尔收购{background:#ecfdf5;color:#059669;border-color:#a7f3d0}
.result-card .category-badge.cat-概念知识,
.result-card .category-badge.cat-投资方法论,
.result-card .category-badge.cat-金融术语{background:#f0f9ff;color:#0284c7;border-color:#bae6fd}
.result-card .tag{font-size:11px;color:#94a3b8;background:#f1f5f9;padding:2px 8px;border-radius:10px}
.result-card .match-score{font-size:11px;color:#94a3b8}
.fallback-note{font-size:12px;color:#f59e0b;font-weight:500;margin-left:6px}
.suggest-link{display:inline-block;margin:4px 6px 4px 0;padding:5px 12px;background:#fff;border:1px solid #e2e8f0;border-radius:20px;color:#334155;font-size:13px;text-decoration:none;transition:all .15s}
.suggest-link:hover{background:#fef3c7;border-color:#fde68a;color:#92400e}

/* Highlight */
.hl{background:#fef3c7;color:#92400e;padding:0 2px;border-radius:2px;font-weight:600}

/* ===== Empty State ===== */
.empty-state{text-align:center;padding:60px 20px}
.empty-state .emoji{font-size:48px;margin-bottom:16px}
.empty-state h3{font-size:18px;color:#334155;margin-bottom:8px}
.empty-state p{font-size:14px;color:#94a3b8;max-width:400px;margin:0 auto;line-height:1.6}

/* ===== Loading ===== */
.loading{text-align:center;padding:60px 20px;color:#64748b;font-size:14px}
.loading::after{content:'';display:inline-block;width:16px;height:16px;border:2px solid #e2e8f0;border-top-color:#f59e0b;border-radius:50%;margin-left:8px;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== Footer ===== */
.page-footer{
  max-width:1100px;margin:0 auto 40px;padding:0 24px;font-size:12px;color:#94a3b8;text-align:center;line-height:1.6;
}

/* ===== Responsive ===== */
@media(max-width:768px){
  .hero{padding:50px 20px 70px}
  .search-input-wrap{padding:6px 6px 6px 14px}
  .search-btn{padding:10px 16px}
  .main{padding:24px 20px 60px}
  .filter-label{width:100%;margin-bottom:4px}
  .result-card{padding:16px}
}
</style>
</head>

<!-- Top Home Bar -->
<div class="top-home-bar">
  <a href="index.html" class="home-btn">🏠 返回首页</a>
</div>

<!-- Hero -->
<div class="hero">
  <div class="breadcrumb">
    <a href="index.html">首页</a><span>/</span><a href="berkshire-standalone.html">投资数据中心</a><span>/</span><span class="current">站内搜索</span>
  </div>
  <div class="hero-content">
    <div class="hero-badge">Berkshire Hathaway Research</div>

    <div class="search-box">

<!-- Main -->
<div class="main">

    <!-- chips will be injected -->
  </div>
  <div class="results-meta" id="resultsMeta"></div>

    <div class="loading">正在加载搜索索引</div>
  </div>
</div>

<!-- Footer -->
<div class="page-footer">
  专为A股与港股投资者设计 · 所有计算仅供参考，不构成投资建议 · 数据与公式基于公开金融理论

<script>
var indexData=null;
var currentCategory='全部';
var currentQuery='';

function loadIndex(){
  fetch('search-index.json')
    .then(r=>r.json())
    .then(data=>{
      indexData=data;
      renderFilters();
      // Check URL query
      var params=new URLSearchParams(window.location.search);
      var q=params.get('q')||'';
      if(q){
        document.getElementById('searchInput').value=q;
        doSearch();
      }else{
        showEmpty('请输入关键词开始搜索', '试试上面的热门关键词，或直接输入年份、人名、投资概念。');
      }
    })
    .catch(err=>{
      document.getElementById('resultList').innerHTML='<div class="empty-state"><div class="emoji">⚠️</div><h3>索引加载失败</h3><p>请检查网络连接或刷新页面重试</p></div>';
    });
}

function renderFilters(){
  var cats=['全部'].concat(indexData.categories);
  var counts={};
  indexData.entries.forEach(e=>{counts[e.category]=(counts[e.category]||0)+1;});
  counts['全部']=indexData.entries.length;

  var html='';
  cats.forEach(cat=>{
    html+='<button class="filter-chip'+(cat===currentCategory?' active':'')+'" onclick="setCategory(\''+cat+'\')">'+cat+'<span class="count">'+counts[cat]+'</span></button>';
  });
  document.getElementById('filterBar').innerHTML='<span class="filter-label">分类筛选：</span>'+html;
}

function setCategory(cat){
  currentCategory=cat;
  renderFilters();
  doSearch();
}

function normalize(str){
  if(!str) return '';
  return str.toLowerCase().replace(/[\s\-_.·]/g,'');
}

function tokenize(q){
  return q.split(/\s+/).filter(s=>s.length>0);
}

function getSearchTokens(q){
  return tokenize(q);
}

function highlight(text, tokens){
  if(!tokens.length || !text) return text;
  var out=text;
  var sorted=tokens.slice(0).sort((a,b)=>b.length-a.length);
  sorted.forEach(t=>{
    if(!t) return;
    var re=new RegExp('('+t.replace(/[.*+?^$\u007b\u007d()|[\]\\]/g,'\\$&')+')','gi');
    out=out.replace(re,'<span class="hl">$1</span>');
  });
  return out;
}

function calcScore(entry, tokens, rawQuery){
  var score=0;
  var matchedTokens=0;
  var titleNorm=normalize(entry.title);
  var descNorm=normalize(entry.description);
  var searchNorm=normalize(entry.searchText || entry.description);
  var tagNorm=entry.tags.map(normalize).join(' ');
  var headNorm=entry.headings.map(normalize).join(' ');
  var fullNorm=normalize(rawQuery) || '';
  var allUserMatched=true;

  if(fullNorm && fullNorm.length>=2){
    if(titleNorm.indexOf(fullNorm)>-1) score+=50;
    else if(tagNorm.indexOf(fullNorm)>-1) score+=35;
    else if(headNorm.indexOf(fullNorm)>-1) score+=25;
    else if(descNorm.indexOf(fullNorm)>-1) score+=15;
    else if(searchNorm.indexOf(fullNorm)>-1) score+=8;
  }

  tokens.forEach(t=>{
    var nt=normalize(t);
    if(!nt) return;
    var matched=false;
    var tokenScore=0;
    if(titleNorm.indexOf(nt)>-1){ tokenScore+=10; matched=true; }
    if(tagNorm.indexOf(nt)>-1){ tokenScore+=8; matched=true; }
    if(headNorm.indexOf(nt)>-1){ tokenScore+=5; matched=true; }
    if(descNorm.indexOf(nt)>-1){ tokenScore+=3; matched=true; }
    if(searchNorm.indexOf(nt)>-1){ tokenScore+=2; matched=true; }
    if(matched){
      score+=tokenScore;
      matchedTokens++;
      if(nt.length>=2) score+=1;
      if(nt.length>=3) score+=2;
      if(/^\d{4}年?$/.test(t) && titleNorm.indexOf(nt)>-1) score+=5;
    }
  });

  var distinctUserTokens = tokenize(rawQuery);
  if(distinctUserTokens.length>0){
    distinctUserTokens.forEach(t=>{
      var nt=normalize(t);
      if(!nt) return;
      if(titleNorm.indexOf(nt)===-1 && tagNorm.indexOf(nt)===-1 &&
         headNorm.indexOf(nt)===-1 && descNorm.indexOf(nt)===-1 &&
         searchNorm.indexOf(nt)===-1){
        allUserMatched=false;
      }
    });
    if(allUserMatched) score+=20;
  }

  score+=Math.max(0,30-entry.priority)/100;
  return {score:score, matchedTokens:matchedTokens, allMatched:allUserMatched};
}

function extractSnippet(text, tokens, rawQuery){
  if(!text || !tokens.length) return text;
  var queryNorm=normalize(rawQuery);
  var bestPos=-1, bestLen=0, bestScore=0;

  function tryMatch(pattern, weight){
    if(!pattern) return;
    var re=new RegExp(pattern.replace(/[.*+?^$\u007b\u007d()|[\]\\]/g,'\\$&'),'gi');
    var m;
    while((m=re.exec(text))!==null){
      var start=Math.max(0,m.index-40);
      var end=Math.min(text.length,m.index+m[0].length+60);
      var len=end-start;
      var hitCount=0;
      tokens.forEach(t=>{
        var nt=normalize(t);
        if(nt && normalize(text.substring(start,end)).indexOf(nt)>-1) hitCount++;
      });
      var score=hitCount*weight+(m[0].length>=queryNorm.length?3:0);
      if(score>bestScore || (score===bestScore && len<bestLen)){
        bestScore=score;
        bestPos=start;
        bestLen=len;
      }
    }
  }

  tryMatch(rawQuery, 5);
  tokens.forEach(t=>tryMatch(t,2));

  if(bestPos>=0){
    var snippet=text.substring(bestPos,bestPos+bestLen);
    if(bestPos>0) snippet='…'+snippet.trim();
    if(bestPos+bestLen<text.length) snippet=snippet.trim()+'…';
    return snippet;
  }

  return text.length>160?text.substring(0,160).trim()+'…':text;
}

function getRelatedSuggestions(q){
  var suggestions=[];
  var lower=q.toLowerCase();
  var map={
    '心理学':['行为金融','心理','认知偏差','情绪'],
    '心理':['行为金融','情绪','认知偏差','价值投资'],
    '行为':['行为金融','投资心理','芒格'],
    '经济学':['经济','宏观','投资'],
    '财务':['财报','ROE','自由现金流','利润率'],
    '公司':['伯克希尔','投资案例','企业分析'],
    '股票':['投资','估值','选股'],
    '收益':['复利','股息','CAGR','回报']
  };
  for(var k in map){
    if(lower.indexOf(k)>-1) suggestions=suggestions.concat(map[k]);
  }
  if(suggestions.length===0) suggestions=['巴菲特','芒格','护城河','安全边际','复利','价值投资'];
  return suggestions.filter((v,i,a)=>a.indexOf(v)===i).slice(0,6);
}

function doSearch(){
  var q=document.getElementById('searchInput').value.trim();
  currentQuery=q;
  var listEl=document.getElementById('resultList');

  if(!indexData){
    listEl.innerHTML='<div class="loading">正在加载索引</div>';
    return;
  }

  var userTokens=tokenize(q);
  var tokens=getSearchTokens(q);

  var results=[];
  var mode='and';
  indexData.entries.forEach(e=>{
    if(currentCategory!=='全部' && e.category!==currentCategory) return;
    if(userTokens.length===0) return results.push(e);
    var res=calcScore(e,tokens,q);
    if(res.allMatched && res.matchedTokens>0){
      results.push(Object.assign({}, e, {_score:res.score, _matched:res.matchedTokens}));
    }
  });

  var usedFallback=false;
  if(results.length<5 && userTokens.length>0){
    results=[];
    mode='or';
    indexData.entries.forEach(e=>{
      if(currentCategory!=='全部' && e.category!==currentCategory) return;
      var res=calcScore(e,tokens,q);
      if(res.matchedTokens>0){
        results.push(Object.assign({}, e, {_score:res.score, _matched:res.matchedTokens}));
      }
    });
    usedFallback=true;
  }

  if(userTokens.length>0){
    results.sort((a,b)=>b._score-a._score || a.priority-b.priority || a.title.localeCompare(a.title,'zh'));
  }else{
    results.sort((a,b)=>a.priority-b.priority || a.title.localeCompare(b.title,'zh'));
  }

  var url=new URL(window.location.href);
  if(q) url.searchParams.set('q',q); else url.searchParams.delete('q');
  window.history.replaceState({},'',url);

  var metaHtml='';
  if(userTokens.length===0){
    metaHtml='共 <strong>'+results.length+'</strong> 条资料'+(currentCategory!=='全部'?'（分类：'+currentCategory+'）':'');
  }else if(results.length===0){
    metaHtml='未找到 "<strong>'+escapeHtml(q)+'"</strong> 的精确匹配';
  }else{
    metaHtml='找到 <strong>'+results.length+'</strong> 条关于 "<strong>'+escapeHtml(q)+'"</strong> 的结果'+(usedFallback?' <span class="fallback-note">（已放宽为“任意词匹配”）</span>':'');
  }
  document.getElementById('resultsMeta').innerHTML=metaHtml;

  if(results.length===0){
    var suggestions=getRelatedSuggestions(q).map(s=>'<a href="berkshire-search.html?q='+encodeURIComponent(s)+'" class="suggest-link">'+escapeHtml(s)+'</a>').join('');
    showEmpty('未找到精确匹配', '试试更短、更通用的关键词，或点击下面的推荐词：'+suggestions);
    return;
  }

  var html='';
  results.forEach(r=>{
    var desc=(r.searchText || r.description) || '';
    if(userTokens.length){
      desc=extractSnippet(desc,tokens,q);
      desc=highlight(desc,tokens);
    }
    var title=userTokens.length?highlight(r.title,tokens):r.title;
    var catClass='category-badge '+('cat-'+r.category).replace(/[（）()]/g,'');
    var tagsHtml=r.tags.slice(0,4).map(t=>'<span class="tag">'+escapeHtml(t)+'</span>').join('');
    var matchInfo='';
    if(userTokens.length && r._matched>0){
      matchInfo='<span class="match-score">'+r._matched+'/'+(tokens.length)+' 词匹配</span>';
    }
    html+='<a class="result-card" href="'+r.url+'">'+
      '<div class="card-top">'+
        '<div>'+
          '<div class="card-title">'+title+'</div>'+
          '<div class="card-desc">'+desc+'</div>'+
        '</div>'+
      '</div>'+
      '<div class="card-meta">'+
        '<span class="'+catClass+'">'+escapeHtml(r.category)+'</span>'+
        tagsHtml+matchInfo+
      '</div>'+
    '</a>';
  });
  listEl.innerHTML=html;
}

function showEmpty(title,msg){
  document.getElementById('resultsMeta').innerHTML='';
  document.getElementById('resultList').innerHTML=
    '<div class="empty-state"><div class="emoji">🔍</div><h3>'+escapeHtml(title)+'</h3><p>'+msg+'</p></div>';
}

function escapeHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// Live search with debounce
var debounceTimer;
document.getElementById('searchInput').addEventListener('input',function(){
  clearTimeout(debounceTimer);
  debounceTimer=setTimeout(doSearch,250);
});
document.getElementById('searchInput').addEventListener('keydown',function(e){
  if(e.key==='Enter') doSearch();
});

loadIndex();
</script>
