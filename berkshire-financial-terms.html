<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>金融术语词典 | 伯克希尔投资数据中心</title>
<style>
:root{
  --navy:#0f2747; --navy2:#163a66; --blue:#2563eb; --orange:#f59e0b; --orange2:#fbbf24;
  --ink:#1e293b; --muted:#64748b; --line:#e2e8f0; --bg:#f4f7fb; --card:#fff;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--ink);line-height:1.6}
a{color:var(--blue);text-decoration:none}
.kb-header{position:sticky;top:0;z-index:50;background:rgba(15,39,71,.92);backdrop-filter:blur(10px);border-bottom:1px solid rgba(255,255,255,.08)}
.kb-header-inner{max-width:1080px;margin:0 auto;padding:12px 20px;display:flex;align-items:center;justify-content:space-between}
.kb-brand{color:#fff;font-weight:700;font-size:15px;letter-spacing:.5px}
.kb-crumb{color:#cbd5e1;font-size:13px}
.kb-crumb a{color:#cbd5e1}
.kb-crumb a:hover{color:var(--orange2)}
.kb-hero{max-width:1080px;margin:0 auto;padding:40px 20px 24px;text-align:center}
.kb-hero h1{font-size:34px;font-weight:900;color:var(--navy);letter-spacing:1px}
.kb-hero .src{margin-top:8px;font-size:14px;color:var(--muted)}
.kb-hero .src a{font-weight:600}
.kb-hero .lead{max-width:760px;margin:16px auto 0;color:#475569;font-size:15px}
.kb-stats{max-width:880px;margin:26px auto 0;display:grid;grid-template-columns:repeat(4,1fr);gap:14px}
.kb-stat{background:linear-gradient(135deg,var(--navy),var(--navy2));color:#fff;border-radius:14px;padding:18px 12px;text-align:center;box-shadow:0 6px 20px rgba(15,39,71,.18)}
.kb-stat .num{font-size:28px;font-weight:900;color:var(--orange2)}
.kb-stat .lab{font-size:13px;opacity:.85;margin-top:2px}
.kb-guide{max-width:1080px;margin:8px auto 0;padding:0 20px}
.kb-guide-card{background:#fff7e6;border:1px solid #fde68a;border-left:4px solid var(--orange);border-radius:12px;padding:16px 20px;font-size:14px;color:#7c5a17}
.kb-guide-card b{color:#9a3412}
.kb-main{max-width:1080px;margin:24px auto 60px;padding:0 20px}
.kb-tabs{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:16px}
.kb-tab{background:#fff;border:1px solid var(--line);border-radius:999px;padding:9px 18px;font-size:14px;font-weight:600;color:var(--muted);cursor:pointer;transition:.15s}
.kb-tab:hover{border-color:var(--blue);color:var(--blue)}
.kb-tab.active{background:var(--navy);color:#fff;border-color:var(--navy)}
.kb-search{margin-bottom:18px}
.kb-search input{width:100%;padding:12px 16px;border:1px solid var(--line);border-radius:10px;font-size:15px;outline:none}
.kb-search input:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(37,99,235,.12)}
.kb-panel{display:none}
.kb-panel.active{display:block}
.kb-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.kb-item{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:14px 16px;display:flex;flex-direction:column;gap:8px;transition:.15s}
.kb-item:hover{border-color:var(--blue);box-shadow:0 6px 18px rgba(37,99,235,.12);transform:translateY(-2px)}
.kb-item .nm{font-size:15px;font-weight:700;color:var(--navy);line-height:1.4}
.kb-item .meta{display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap}
.kb-item .auth{font-size:12px;color:var(--muted)}
.kb-item .lang{font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px}
.kb-item .lang.zh{color:#047857;background:#d1fae5}
.kb-item .lang.en{color:#b45309;background:#fef3c7}
.kb-item .go{font-size:12px;color:var(--blue);font-weight:600;white-space:nowrap}
.kb-item a{display:block}
.kb-sub{margin:6px 0 14px;font-size:13px;color:var(--muted);font-weight:600}
.kb-period{margin-bottom:22px}
.kb-period h3{font-size:16px;color:var(--navy);margin-bottom:10px;padding-left:10px;border-left:3px solid var(--orange)}
.kb-note{background:#eff6ff;border:1px solid #bfdbfe;border-left:4px solid var(--blue);border-radius:12px;padding:14px 18px;font-size:14px;color:#1e40af;margin-bottom:16px}
.kb-note a{font-weight:700}
.kb-note b{color:#1e3a8a}
.kb-empty{text-align:center;color:var(--muted);padding:40px;font-size:14px}
.quote-wrap{max-width:780px;margin:0 auto 28px}
.quote-head{font-size:19px;font-weight:800;color:var(--navy);margin-bottom:18px;text-align:center;letter-spacing:.5px}
.quote-item{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--orange);border-radius:12px;padding:16px 20px;margin-bottom:14px;box-shadow:0 4px 14px rgba(15,39,71,.06)}
.quote-en{font-size:15px;color:#334155;font-style:italic;line-height:1.75}
.quote-zh{font-size:15px;color:var(--navy);font-weight:600;margin-top:10px;line-height:1.75}
.quote-by{font-size:13px;color:var(--muted);margin-top:8px;text-align:right}
.quote-note{background:#fff7e6;border:1px solid #fde68a;border-radius:12px;padding:16px 20px;font-size:14px;color:#7c5a17;line-height:1.85;margin-top:6px}
footer{max-width:1080px;margin:0 auto;padding:24px 20px 50px;text-align:center;color:var(--muted);font-size:13px;border-top:1px solid var(--line)}
footer a{font-weight:600}
@media(max-width:600px){
  .kb-stats{grid-template-columns:repeat(2,1fr)}
  .kb-hero h1{font-size:26px}
}
</style>
</head>
<body>
<header class="kb-header">
  <div class="kb-header-inner">
    <div class="kb-brand">伯克希尔 · 投资数据中心</div>
    <div class="kb-crumb"><a href="berkshire-standalone.html">投资数据中心</a> / 金融术语词典</div>
  </div>
</header>

<section class="kb-hero">
  <h1>金融术语词典</h1>
  <p class="lead">伯克希尔投资数据中心的内容导航：投资方法论与巴菲特名言。投资方法论可在站内直接阅读中文详解；名言展示巴菲特原话的中英对照。</p>
  <div class="kb-stats">
    <div class="kb-stat"><div class="num">12</div><div class="lab">投资方法论（中文）</div></div>
    <div class="kb-stat"><div class="num">6</div><div class="lab">巴菲特名言（中英）</div></div>
  </div>
</section>

<div class="kb-guide">
  <div class="kb-guide-card">
    <b>怎么用：</b>点上方标签切换「投资方法论 / 名言」。投资方法论板块提供「<b>投资方法论中文详解</b>」入口，可一键查看 12 篇站内方法论全文；名言展示巴菲特原话的中英对照。
  </div>
</div>

<section class="kb-main">
  <div class="kb-tabs">
    <div class="kb-tab active" data-tab="method" onclick="switchTab('method')">📐 投资方法论</div>
    <div class="kb-tab" data-tab="quotes" onclick="switchTab('quotes')">💬 名言</div>
  </div>
  <div class="kb-search">
    <input id="kb-search" type="text" placeholder="搜索标题…" oninput="render()">
  </div>
  <div class="kb-panel active" id="panel-method"></div>
  <div class="kb-panel" id="panel-quotes"></div>
</section>

<footer>
  本页为伯克希尔投资数据中心的内容导航，收录投资方法论与巴菲特名言等，供站内检索与阅读使用。
</footer>

<script>
// ---------- 投资方法论（站内中文详解） ----------
const method_valuation = [
  {t:"收益增长与退出倍数 (Delta of the Delta)", u:"berkshire-methodology.html", a:"", d:"估值模型"},
  {t:"经济护城河评估", u:"berkshire-methodology.html", a:"", d:"估值模型"},
  {t:"股息贴现模型（DDM）", u:"berkshire-methodology.html", a:"", d:"估值模型"},
  {t:"账面价值收敛模型 (BV-Price Growth Parity)", u:"berkshire-methodology.html", a:"", d:"估值模型"},
  {t:"当前市盈率 vs. 历史市盈率", u:"berkshire-methodology.html", a:"", d:"估值模型"},
  {t:"股息收益率理论", u:"berkshire-methodology.html", a:"", d:"估值模型"},
  {t:"倍数估值法", u:"berkshire-methodology.html", a:"", d:"估值模型"},
  {t:"格雷厄姆公式", u:"berkshire-methodology.html", a:"", d:"估值模型"}
];
const method_strategy = [
  {t:"优质与宽阔经济护城河投资 (Quality & Wide Moat Investing)", u:"berkshire-methodology.html", a:"", d:"投资策略"},
  {t:"价值投资 (Value Investing)", u:"berkshire-methodology.html", a:"", d:"投资策略"},
  {t:"成长投资 (Growth Investing)", u:"berkshire-methodology.html", a:"", d:"投资策略"},
  {t:"股息投资 (Dividend Investing)", u:"berkshire-methodology.html", a:"", d:"投资策略"}
];


// ---------- 名言（巴菲特原话中英对照） ----------
const quotes = [
  {
    title: "一生不超过 20 个好点子",
    items: [
      {en:"“No one will get more than 20 great ideas in their lifetime.”", zh:"「一个人一生中，不会拥有超过 20 个真正的好点子。」", by:"沃伦·巴菲特"},
      {en:"“Imagine you got a ticket with only twenty punches on it when you graduated from business school. Every time you made an investment decision, it used up a punch. What would you do differently?”", zh:"「设想你从商学院毕业时，拿到一张只有 20 个打孔的票。每做一次投资决策，就耗掉一个孔。你会怎么做得不同？」", by:"沃伦·巴菲特"},
      {en:"“You’ll never use up all twenty punches if you save them for great ideas. And you shouldn’t use them on anything other than great ideas…”", zh:"「如果你把这些孔留給真正的好点子，你永远用不完这 20 个；而且除了好点子，你不该把它们用在任何别的东西上……」", by:"沃伦·巴菲特"},
      {en:"“When the Buffett part of Berkshire is over… if you take out the best 15 decisions, it would not be much of a record.”", zh:"「等伯克希尔的巴菲特时代落幕……如果把其中最好的 15 个决策拿掉，剩下的记录也就不值一提了。」", by:"查理·芒格"}
    ],
    note:"「20 个打孔卡」是巴菲特常讲的思想实验：假设一生只有 20 次投资决定可做，你就会变得极度挑剔，只等那些显而易见、定价错误的「好球」，而不会因市场噪音频繁出手。巴菲特与芒格都强调，伯克希尔数千亿美元的成就，几乎都来自约 15 个关键决策——少而精，远胜多而杂。"
  },
  {
    title: "价格与价值",
    items: [
      {en:"“Price is what you pay. Value is what you get.”", zh:"「你支付的是价格，得到的是价值。」", by:"沃伦·巴菲特，2008 年致股东的信"},
      {en:"“Whether we’re talking about socks or stocks, I like buying quality merchandise when it is marked down.”", zh:"「不管是袜子还是股票，我都喜欢买打折的优质货。」", by:"沃伦·巴菲特，2008 年致股东的信"}
    ],
    note:"这是巴菲特价值投资的核心：价格围绕价值波动，但长期投资者关心的是企业内在价值，而非短期报价。只要价格低于价值，就是买入的「安全边际」。"
  },
  {
    title: "恐惧与贪婪",
    items: [
      {en:"“Be fearful when others are greedy, and be greedy only when others are fearful.”", zh:"「别人贪婪时我恐惧，别人恐惧时我贪婪。」", by:"沃伦·巴菲特，1986 年致股东的信"}
    ],
    note:"巴菲特用这句话提醒投资者：市场情绪极端时，往往价格偏离价值最远。理性投资者应利用市场的情绪化，而非被市场裹挟。"
  },
  {
    title: "好公司 vs. 便宜公司",
    items: [
      {en:"“It’s far better to buy a wonderful company at a fair price than a fair company at a wonderful price.”", zh:"「以合理价格买入一家优秀的公司，远胜于以优秀价格买入一家合理的公司。」", by:"沃伦·巴菲特，1989 年致股东的信"}
    ],
    note:"收购喜诗糖果后，巴菲特从「捡烟蒂」转向「优质企业」。好公司能持续创造价值，普通公司即使买入便宜，也可能拖累长期回报。"
  },
  {
    title: "持有期限：永远",
    items: [
      {en:"“Our favorite holding period is forever.”", zh:"「我们最喜欢的持有期是永远。」", by:"沃伦·巴菲特，1988 年致股东的信"}
    ],
    note:"频繁交易会增加成本与税负，也让投资者难以享受复利。巴菲特偏爱那些业务清晰、护城河宽阔、能持续几十年的企业。"
  },
  {
    title: "潮水退去方知裸泳",
    items: [
      {en:"“You only find out who is swimming naked when the tide goes out.”", zh:"「只有当潮水退去，你才知道谁在裸泳。」", by:"沃伦·巴菲特，2001 年致股东的信"}
    ],
    note:"泡沫时期杠杆与风险被掩盖；当流动性收紧、市场回调，过度冒险的公司才会暴露。这是巴菲特对高杠杆与盲目扩张的警示。"
  }
];

let curTab = 'method';

function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function switchTab(t){
  curTab = t;
  document.querySelectorAll('.kb-tab').forEach(e=>e.classList.toggle('active', e.dataset.tab===t));
  document.querySelectorAll('.kb-panel').forEach(e=>e.classList.remove('active'));
  document.getElementById('panel-'+t).classList.add('active');
  render();
}

function itemHTML(it){
  const lang = it.lang || 'zh';
  const langTxt = (lang==='zh') ? '<span class="lang zh">中文</span>' : '<span class="lang en">EN</span>';
  const auth = (it.a? esc(it.a)+' · ' : '') + (it.d||'');
  const go = it.u ? '查看 →' : '主题索引';
  const inner =
    '<div class="nm">'+esc(it.t)+'</div>'+
    '<div class="meta"><span class="auth">'+auth+'</span>'+langTxt+'</div>'+
    '<div class="go">'+go+'</div>';
  if(it.u) return '<a class="kb-item" href="'+it.u+'">'+inner+'</a>';
  return '<div class="kb-item" style="cursor:default">'+inner+'</div>';
}

function renderList(arr, q){
  const items = arr.filter(it=> !q || (it.t+(' '+(it.a||''))).toLowerCase().indexOf(q.toLowerCase())>=0);
  if(!items.length) return '<div class="kb-empty">没有匹配「'+esc(q)+'」的条目</div>';
  return '<div class="kb-grid">'+items.map(itemHTML).join('')+'</div>';
}

function renderQuotes(){
  let html = '';
  quotes.forEach(function(q){
    html += '<div class="quote-wrap">';
    html += '<div class="quote-head">💬 '+esc(q.title)+'</div>';
    q.items.forEach(function(item){
      html += '<div class="quote-item">';
      html += '<div class="quote-en">'+esc(item.en)+'</div>';
      html += '<div class="quote-zh">'+esc(item.zh)+'</div>';
      html += '<div class="quote-by">— '+esc(item.by)+'</div>';
      html += '</div>';
    });
    html += '<div class="quote-note">'+esc(q.note)+'</div>';
    html += '</div>';
  });
  return html;
}

function render(){
  const q = (document.getElementById('kb-search').value||'').trim();
  if(curTab==='method'){
    const v = method_valuation.filter(it=> !q || (it.t+' '+it.a).toLowerCase().indexOf(q.toLowerCase())>=0);
    const s = method_strategy.filter(it=> !q || (it.t+' '+it.a).toLowerCase().indexOf(q.toLowerCase())>=0);
    let html = '';
    html += '<div class="kb-feature" style="background:linear-gradient(135deg,#0b1f3a,#10294d);color:#fff;border-radius:14px;padding:18px 20px;margin-bottom:18px;display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:12px"><div><div style="font-weight:800;font-size:16px">📘 投资方法论中文详解（12 篇）</div><div style="font-size:13px;color:#b9c8e0;margin-top:4px">格雷厄姆公式、DDM、护城河、价值 / 成长 / 股息投资… 含公式、巴菲特怎么用与案例。</div></div><a href="berkshire-methodology.html" style="background:#f5a623;color:#3a2700;font-weight:700;padding:10px 18px;border-radius:999px;white-space:nowrap">查看详解 →</a></div>';
    if(v.length) html += '<div class="kb-period"><h3>估值模型（8 篇）</h3>'+renderList(v,'')+'</div>';
    if(s.length) html += '<div class="kb-period"><h3>投资策略（4 篇）</h3>'+renderList(s,'')+'</div>';
    if(!html) html = '<div class="kb-empty">没有匹配「'+esc(q)+'」的条目</div>';
    document.getElementById('panel-method').innerHTML = html;
    return;
  }
  if(curTab==='quotes'){
    document.getElementById('panel-quotes').innerHTML = renderQuotes();
    return;
  }
}

render();
</script>
</body>
</html>
