<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>信息收录</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
:root {
  --bg:#f0f2f5; --card-bg:#fff; --text:#1a1a2e; --text2:#6b7280;
  --accent:#7c3aed; --accent2:#2563eb; --shadow:0 2px 12px rgba(0,0,0,0.08);
  --radius:16px;
}
body { font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC","Microsoft YaHei",sans-serif; background:var(--bg); color:var(--text); min-height:100vh; display:flex; flex-direction:column; }
.header { background:linear-gradient(135deg,#7c3aed 0%,#2563eb 100%); color:#fff; padding:0; text-align:center; position:relative; overflow:hidden; }
.header::before { content:""; position:absolute; top:-50%; left:-50%; width:200%; height:200%; background:radial-gradient(circle,rgba(255,255,255,0.08) 0%,transparent 60%); animation:headerBg 8s ease-in-out infinite alternate; }
@keyframes headerBg { from{transform:translate(0,0)} to{transform:translate(20px,20px)} }
.header-inner { position:relative; padding:60px 20px 50px; max-width:600px; margin:0 auto; }
.header h1 { font-size:32px; font-weight:800; letter-spacing:2px; margin-bottom:10px; }
.header p { font-size:15px; opacity:0.85; line-height:1.6; }
.main { flex:1; max-width:900px; margin:-30px auto 40px; padding:0 20px; width:100%; position:relative; z-index:1; }
.card-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:24px; margin-top:10px; }
.card { background:var(--card-bg); border-radius:var(--radius); box-shadow:var(--shadow); padding:32px 28px; text-decoration:none; color:var(--text); transition:all .2s; position:relative; overflow:hidden; border:1px solid rgba(0,0,0,0.04); }
.card:hover { transform:translateY(-4px); box-shadow:0 8px 24px rgba(0,0,0,0.12); }
.card-icon { font-size:42px; margin-bottom:16px; display:block; }
.card-title { font-size:20px; font-weight:700; margin-bottom:8px; }
.card-desc { font-size:14px; color:var(--text2); line-height:1.6; }
.card-meta { margin-top:18px; display:flex; gap:12px; flex-wrap:wrap; }
.card-tag { font-size:12px; padding:3px 10px; border-radius:20px; font-weight:600; }
.tag-purple { background:#ede9fe; color:#7c3aed; }
.tag-blue { background:#dbeafe; color:#2563eb; }
.tag-green { background:#d1fae5; color:#059669; }
.tag-amber { background:#fef3c7; color:#d97706; }
.footer { text-align:center; padding:24px; font-size:12px; color:#9ca3af; }
@media(max-width:600px) {
  .header-inner { padding:40px 16px 40px; }
  .header h1 { font-size:26px; }
  .card-grid { grid-template-columns:1fr; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-inner">
    <h1>📖 信息收录</h1>
    <p>精选阅读 · 随时收听 · 手机电脑同步</p>
  </div>
</div>

<div class="main">
  <div class="card-grid">

    <a class="card" href="./curated36.html">
      <span class="card-icon">🌐</span>
      <div class="card-title">跨境电商参考</div>
      <div class="card-desc">精选36篇文章，涵盖商业认知、案例拆解、选品方法论、Shopify实战、AI+跨境、平台趋势六大分类，支持普通话/粤语朗读。</div>
      <div class="card-meta">
        <span class="card-tag tag-purple">32篇文章</span>
        <span class="card-tag tag-blue">6大分类</span>
        <span class="card-tag tag-amber">🔊 支持朗读</span>
      </div>
    </a>

    <a class="card" href="./buffett-partnership-showcase.html">
      <span class="card-icon">📚</span>
      <div class="card-title">巴菲特致股东信</div>
      <div class="card-desc">1957-1972年巴菲特合伙基金及伯克希尔早期致股东信中文合集，RanRan最佳翻译版，支持逐字高亮朗读。</div>
      <div class="card-meta">
        <span class="card-tag tag-green">16封信</span>
        <span class="card-tag tag-blue">1957-1972</span>
        <span class="card-tag tag-amber">🔊 支持朗读</span>
      </div>
    </a>

  </div>
</div>

<div class="footer">信息收录 · github.io/amx708 · 持续更新中</div>

</body>
</html>
