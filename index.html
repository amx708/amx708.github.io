转录稿\n\n打开那些长视频,复制 YouTube 自动生成的 Transcript (转录稿)。\n第三步:喂给 ChatGPT\n\n把转录稿丢给 AI,下指令:\n\"列出这个视频中提到的所有处于'早期采用者'阶段的产品。\"\nAI 会帮你筛出那些被提及但还没被大品牌垄断的东西。\n第四步:验证趋势\n\nSeena 通过这个方法发现了 Pilates Grip Socks (皮拉提斯防滑袜)。\n然后去 Google Trends 验证,发现这个产品正处于指数级增长的初期 — 完美。\n\n最关键的发现是什么?\n他在视频里听到女孩们说:\n“我得买那些防滑袜\n\n“忘了带袜子,不得不花 18 美元在高价店里买”\n\n注意她们的用词:\"那些防滑袜\",不是某个品牌的袜子。\n这说明:消费者有产品意识,但没有品牌意识。\n这就是你的切入点。\n\n— 3 —\n品牌建设\n\n找到产品之后，Seena 没有走传统的低价代发货路线。\n他做了一件聪明的事：研究目标受众的\"身份认同\"。\n什么是身份认同品牌化?\n\n消费者买的不是产品功能，而是\"用了这个产品，我就能成为某种人\"的心理预期。\nSeena 注意到，目标受众的视频标题里频繁出现 \"That Girl\" (那个女孩)。\n这不是一个称呼，是一种审美、一种运动、一种身份象征。\n于是他问 AI:\n\"哪些品牌最能满足 That Girl 这一身份认同?\"\nAI 给出了 Glossier — 一个知名美妆品牌。\n虽然 Glossier 不卖袜子,但它的受众和 Seena 的目标受众高度重合。\n\n提取视觉基因\n\nSeena 研究了 Glossier 的视觉风格:\n梦幻般的云朵天空背景\n\n淡蓝色调 (Blue Pastels)\n\n?\n\n然后把这些元素注入自己的品牌。\n品牌命名逻辑\n\n防滑袜的功能是让人\"保持稳定\"。\n而 That Girl 的核心特质也是\"清醒且脚踏实地\"。\n所以品牌名叫 Grounded — 意为稳定的、脚踏实地的。\n名字不只是描述产品,而是描述产品的\"愿景特质\"。\n\n— 4 —\n关于视觉和营销\n\n关于视觉，一句话：第一眼就要赢\n\nSeena 在柏林聘请了专业的时尚摄影总监,选拔了最契合\"That Girl\"形象的模特。\n拍摄了四类核心素材:\n全身生活方式照：网站首屏大图,这是”钩子”,决定转化率\n\n极简产品图：参考年营收 2 亿美元的品牌 Brandy Melville\n\n广告素材 专门用于 Meta 和 TikTok 广告\n\n短视频片段：网站悬停效果和有机内容\n\n结果?\n用户看到网站第一眼就产生共鸣:\"这就是为我准备的。\"\nSeena 做的一个视频获得了 210 万次播放。\n他说,病毒式传播不是运气,是有框架的。\n病毒式视频结构\n\n开头 (Stitch / 合拍):\n\n视频开头用了一个热门片段 — 一个女孩从皮拉提斯器械上摔下来。这借用了热度,也自然引入了产品功能:防滑。\nSeena 接话:\"女孩,你忘了你的防滑袜。\"\n1-3 秒转场 (The 1-3 Second Transition):\n这是核心秘诀。\n在视频的第 3 秒左右,必须设置一个\"重参与点\",揭示视频的\"X 因素\"。\n有音乐的视频:卡点时展示产品功能\n\n口播视频:揭示最核心的冲突或惊喜点\n\n再营销广告 (Retargeting):\n视频获得数百万自然流量后，Seena 针对那些观看了至少 50% 内容的\"热受众\"投放 Meta 静态图广告。\n因为这些人已经有需求且认识了品牌,转化率飙升至 7.19%。\n\n这个Case，其实总结下来就几点：\n1、选一个增长中的赛道\n\n2、用 AI 分析微网红的视频转录稿\n\n3、找到”有产品意识但无品牌意识”的产品\n\n4、研究目标受众的身份认同\n\n5、把这种身份注入品牌的每一个细节\n\n这里面核心是数据，\n这么多数据，如何看数据，如何用AI帮你看数据，最后再由你拍板做决策，这个能力非常重要。", "filename": "小北的梦呓_2025-12-23_靠 AI选品，一年做到了270万美元.html"}]}, {"name": "Shopify实战", "color": "#059669", "icon": "🛒", "articles": [{"date": "2019-03-20", "title": "从零开始，30天学会在shopify上开店——Day1", "recommended": true, "content": "关于shopify开店，最近呢， 我打算开展一个30天的教程，通过这个教程你可以从零开始学会如何在shopify上成功地开店！\n对Step by Step！\n我也不知道什么时候能写完，我也不能保证完全写完，今年实在实在是太忙了，所以\n不要催我！\n不要催我！\n不要催我！！\nOkay，从今天开始让我们开始第一天的教程！今天的内容包含以下几点：\nshopify和dropshipping的基本概念\n\nshopify的两种店铺模式——Niche店铺和General店铺\n\n如何成功建立一个shopify店铺\n\n创建一个好的店铺名\n\n给shopify店铺关联新域名\n\nShopify现在是主流的跨境电商平台之一。我将从另一个视角来介绍shopify，所以无论你是刚接触shopify的新手，还是已经是营运一家店铺的店主，我相信你都可以从我的教程中学到一些新东西。\n\n01\n首先来介绍什么是shopify\n\n到底要不要用Shopify来建站呢？\nShopify网站建设，你所要知道的一切！\nShopify是当下主流的跨境电商平台之一，简单是因为够傻瓜~~其实呢，早期很多人做过wordpress的人来做shopify，那简直是太简单了\nShopify的操作很简单，没有任何技术方面的要求，非常适合新手创业。\n主要特点：\n不需要会代码或网页设计\n\n傻瓜式建站\n\n可以选择各种产品\n\n快速建立自己的店铺\n\n02\n什么是Dropshipping？\n关于这个话题，我之前也写过一篇文章，Dropshipping你所要了解的一切\nDropshopping是一种商业模式。做Dropshopping，你不需要提前准备库存，因此不需要很多的启动资金，也不用自己打包发货。\n如果卖家收到订单，只要立刻联系供应商，让供应商按照订单情况直接发货给顾客。\n相比传统模式的电商，Dropshopping是一个更好的选择，因为不用担心资金的问题，也省去了发货和物流的环节。\n只要做好店铺建设和推广运营等核心工作。你甚至不用当全职店家，完全可以利用空闲时间来开店。\n如果这是你第一次接触Dropshopping，那对你来可能有点难度。不过不用担心，我会尽量让教程简单易懂，便于理解。\n\n03\n你只是中间商\n如果你在shopify上做dropshipping的模式，那么你其实你扮演的只是一个中间商的作用\n赚钱的本质和思路，我在这一篇文章就提到过，其实这个世界上，贸易就是交换，交换产生的利润，其实就是一个倒买倒卖的生意\n如果你在shopify上开店做Dropshopping，那你的角色就是连接厂家和消费者的中间商，纯粹的连接关系，不用产生任何实际上的交易。\n\n在传统的电商模式中，店家需要先从供应商提前备货，然后通过自己的店铺卖出去。\n而现在完全可以舍弃这样“先买再卖”的模式，要做的只是创建自己的店铺，然后核心做marketing。\n通过各种营销渠道，曝光产品，引流，最后获得订单。有了订单之后，只要把客户的订单信息给供应商，让供应商安排发货即可。\n总的来说，你确实是做线上生意，但却不需要任何的实体产品。\n\n04\nNiche店铺 VS general店铺？\n\n好了，你现在知道什么是shopify了，然后呢也知道dropshipping的模式了\n那么接下来你就要开始建立店铺！\n你首先就会碰到一个问题，你的这个店铺到底是要Niche好，还是general好呢？\n换句话说，你到底是要搞杂货铺，还是很垂直的店铺呢？\nNiche店铺 和 general店铺是Shopify的两种店铺模式，这两种模式是针对产品类别来分类的。\n如果你决定要在shopify上开店，那首先思考自己要选择哪种店铺？\n\nNiche店铺是针对于niche产品，就是说你打算主打某个细分市场下的某一类产品。\n比如，照明灯具市场下的LED室内照明灯具，再细分一点可以是，LED办公照明灯或LED家具灯。\nNiche的特点之一，目标市场精准，转化率高。你的店铺主打某一类产品，因此你的广告、营销会有更精准的目标受众。\n但更重要的是选品问题和市场的竞争情况。如何选一款或一类好产品，经常让很多卖家头疼。\n当你选择了一款好的产品，还没来得及高兴却发现，市场已经饱和，甚至过度饱和，竞争非常激烈。有的时候很多店家甚至不得不选择关门。\n而General店铺可以涵盖很多种类的产品，这些产品之间甚至可以没有半毛钱关系。\n你可以同时卖衣服、化妆品、手表、文具等等。但这种模式的转化率就没那么高。\n比如，某天一个客户被你店里某款手表的广告吸引而来，结果却发现你的店铺其实并不是一家专业的手表店，里面的产品各种各样。\n可想而知，客户对你店铺的第一印象不会太好。尤其是那些专业的客户，他们一般都选择去能提供专业服务的商店购物。\n但General店铺的主要特点就是选择很多种类的产品，这意味着你可以有很多的测试机会。\n可以通过各种营销渠道和方案来测试不同的产品，然后选择一款最好的作为主打产品。\n所以，店铺的模式很重要，不同的经营模式，结果往往相差很大。\n如果你已经是某类产品的发烧友，研究这类产品已久，其中的区别好坏等各种信息你都很清楚，那你可以选择这类niche产品。\n例如，你一直都喜欢研究各种耳机，自己平时也会买不同品牌的耳机来使用和分析，不同的耳机音质如何，价格，设计等等你都很清楚。\n那你主打耳机的niche产品，就相对有优势。因为你很了解这款产品，就容易找到目标受众，可以有针对性的投放广告做营销，转化率自然就会比较高。\n所以要看你的定位，以及你的产品优势来判断。\n当然还有一种说法，特别是针对做广告的，我听到过一种观点，就是认为刚刚开始的店铺，其实你什么都不知道，那么你选niche是很危险的，而是要建一个General店铺，然后通过广告迅速来选品，来定niche\n\n05\n如何成功建立一个shopify店铺\n\n我们不仅要销量，更要利润。因此，我们的目标是要建立一个盈利的店铺。\n跟着我完成30天的课程，大家或多或少会有一些订单。但想要有持续性的投入甚至扩大店铺规模，就不能光考虑销售额，更要考虑利润。\n如果要你的店铺能盈利，那么要注意这几点：\n选择General店铺，多种产品一起卖\n\n首先测试15款产品\n\n投放并跟踪100-150个广告\n\n我们的第一个小目标是赚$1000。但要注意的是，并不是要求15个测试的产品都能盈利。我们只要找到这15款产品中销量最好的那款就行了。\n这里大家尽量要遵循KISS原则——keep it super simple。就是一切都尽量保持简单，简洁。\n\n06\n创建一个好的店铺名称\n\n一个好的店铺名称至关重要，店名一定程度上展现了店铺的形象。Shopify自带一款生成名字的免费在线工具。\n链接地址: \nhttps://www.shopify.com/tools/business-name-generator\n可以通过输入关键字，来搜索包含关键字的名字。\n\n点击选中的店铺名字，就转到填写输入邮箱和密码的界面，可以继续填写。\n\n创建一个好的店名，要注意下面几点：\n\n简单，必须是能拼读的单词，1-2个单词最佳，\n\n单词的音节最好2-4个\n\n好记，有特色能让人印象深刻\n\n不要出现“store”，“shop”，“deal”等单词，不利于树立品牌形象\n\n在思考如何选一个好的店名时，你可以参考网上的一些成功的店铺名字，来寻找灵感。\n\n07\n给shopify店铺关联新域名\n\n店铺名称是shopify店铺的免费二级域名地址（例如，店名是Clothing Moon）\n链接地址:\nhttps://Clothing-Moon.myshopify.com\n通过Shopify自带的名字生成器创建的名字后，会自动把名字和域名关联到一起。\n当然，也可以利用其他的工具来创建域名，然后手动把域名关联到你的店铺。\nNameCheap、GoDaddy和LeanDomainSearch都是目前很好用的域名工具，一般都是需要付费的。\n链接地址：\nhttps://www.namecheap.com/domains\nhttps://sg.godaddy.com/\nhttp://leandomainsearch.com/\n这些工具也是通过关键词来创建域名的，而且可以显示你选择的域名是否被使用。\n\n在选择域名，有几点要注意的：\n尽量选择.com的后缀，这是最常见的。\n\n要看选择的域名是否被别人注册。\n\n创建域名的几个小技巧：\n不同种类的动物名称\n\n触发词（像hype, instant, legend等）\n\n形容词（像happy,good,nature,color等）\n\n常见的单词或短语（像hella, phat, kicks等）\n\n创建好域名后就是关联到你的shopify店铺。在shopify后台操作界面，点击“online”的“domains”选项。\n\n点击“connect existing domain”，输入域名，然后点击“Next”。\n\n以上，就是第一天的内容，主要是简单介绍了shopify平台和dropshipping商业模式。\n通过今天的内容，希望大家对shopify和dropshipping能有一个大概的了解。\n下次，我将接着介绍创建shopify店铺的logo和后台操作。\n未完待续。。。\n\n长按二维码，添加关注！", "filename": "小北的梦呓_2019-03-20_从零开始，30天学会在shopify上开店——Day1.html"}, {"date": "2018-09-18", "title": "Shopify开店注册全流程指导（新手必看！）", "recommended": false, "content": "收录于话题\n#网站建站\n\n前天在深圳这边，参加了一个Shopify大会，给我感觉是shopify现在好像特别特别的火，之前写过一篇文章是 到底要不要用Shopify来建站呢？感兴趣的朋友看下\n\n的确对于很多想创业的小伙伴来说，如果你想成为跨境电商潮流中的一员，现在有一个很好的途径，那就是在shopify上开店，做dropshopping。\n\n毕竟，作为一个传统的电商er，你需要在产品库存上面浪费很多人力物力\n\n如果你现在考虑dropshopping这种新的电商模式，那库存就不再是问题了。因为在这种模式中，不需要压任何的库存。你可以把绝大部分的时间精力投入到营运店铺中，专注在获取更多的产品订单上。\n\n这个观点，我在Dropshipping你所要了解的一切这篇文章中，已经说的很清楚了\n\n实际上Dropshopping是一种非常灵活的管理模式，在各大跨境电商平台上广泛使用，包括现在很火的shopify。\n\n而且我相信，以后的趋势就是电商创业是越来越大众，越来越简单。所以，我希望这篇shopify的攻略，能够给有志于在跨境电商行业创业的小伙伴开一个好头！\n \n到底什么是Dropshopping？\n\nDropshopping是一种商业模式\n\n这个流程是很简单的，做Dropshopping的卖家，不需要提前准备库存，因此不需要很多的启动资金，也不用自己打包发货。\n\n如果卖家收到订单，只要立刻联系供应商，让供应商安装订单情况直接发货给顾客。\n\n而Oberlo在这个过程就相当于是一个桥梁的作用。它是一款针对Dropshopping的免费APP，可以帮你整合各种产品的供应商信息，下单流程更加简单。\n\n对于新手来说，Dropshopping是一个非常值得尝试的跨境电商模式，操作简单又便于管理，而且不需要高昂的前期投入资金。不用当全职店家，你完全可以利用空闲时间来开一家属于自己的店。\n\n那什么是Shopify?\nShopify也是当下主流的跨境电商平台之一，大家都能在上面开店。Shopify的操作十分简单，即使你没有任何技术方面的经验也是完全OK的。而且在操作过程中，基本上不会遇到任何问题。\n\n所以，如果你想从事跨境电商行业，那shopify是一个非常好的选择。\n \n做Dropshopping，为什么选shopify?\n\n对于那些启动资金不多的人来说，Dropshopping是一种最适合商业模式。如果要做Dropshopping，Shopify则是操作最简单的平台。\n\n在Shopify上开店，你根本不用担心库存的问题，你的库存完全是根据客户下单的数量。这个系统不同于传统的电商，而传统的电商是要自己先去批发产品的。现在你做Dropshopping的话，只要稍微动一动鼠标就能控制库存了。\n \nShopify注册开店教程\n\n接下来要介绍的是如何在Shopify上注册开店，每一步都有详细的说明和提示，努力带你避开各种坑，最后就可以成功注册一个自己的店铺，开始赚钱了。\n\nShopify的注册流程其实很简单的，但是稍微不注意就容易掉坑里去，有很多小伙伴会发现刚注册好的账号就被封了，实在无辜！\n\n所以在注册前，有几点还是要注意的：\n\n1. 要关闭翻墙工具，在翻墙的环境下可能会导致刚注册就被封号。\n2. 尽量不用QQ邮箱，最好用Gmail，outlook或者企业邮箱。\n3. 刚开始可用试用版本，有14天的期限，可以用来练手，熟悉后台操作和基本的设置。\n \n1. 注册shopify账户\n\n地址：https://www.shopify.com/\n\n打开网址后，进入到shopify的首页，页面的顶端你会看到一个输入框，要求你输入邮箱Your Email address。并且有提示说“有14天的试用，不要求信用卡，没有任何风险”。\n\n输入邮箱，点击“Get Started”后，会跳转到另一个界面，需要再次输入邮箱Your Email address，并创立密码password和店铺名称Your store Name \n\n当填写Your store name时，有几点要注意一下：\n\n1）想一个好的store name：\n\n简单\n有创意\n好记\n\nOberlo APP中有生成store name的功能（ Business name generator）。\n\n地址：https://www.oberlo.com/tools/business-name-generator\n\n你可以输入任何你想包含的关键字，点击“Generate names”就能生成一系列包含该关键字的名称，然后你可以从中挑选一个最喜欢的。这样一来，你就能省下不少时间，而且完全免费，如下图：\n\n2）你输入的store name就是你shopify店铺的免费二级域名地址\n例如，你的store name是“Betterlife”\n\n那你的网址就是“https://Betterlife.myshopify.com”\n\n如果两个单词之间有空格，那域名会自动补一个“-”，“Better Life”对应的是“https://Better-Life.myshopify.com”\n \n特别特别不建议大家用Better-Life，这种带有- 的来做域名，会让人显得特别特别的不专业\n\n填好这个界面的信息后，点击“Create your stroe”转到下一个界面填写你的地址信息。这些信息尽量用真实的信息，可以不用太详细，填的时候写到具体的城市就可以了。\n\n填好上面的信息之后，就会跳转到shopify的后台界面，此时你已经注册好了shopify的账户。目前的后台界面如下图，后续可能会有更新\n\n2. 设置账户信息\n\n成功注册shopify账户后，接着就是来设置账户信息\n\n可以设置的信息包括：\n\n网站的基础设置\n\n缴税设置\n\n账户权限\n\n收款方式\n\n信息通知\n\n订单管理\n\n付款流程\n\n文件管理\n\n店铺政策\n\n发货信息\n\n销售渠道\n\n功能太多，这里就不一一介绍了，挑几个重点讲解一下\n\nGeneral 网站基础设置\n\n点击页面底部的“Settings”，显示设置界面，然后点击“General”，进入基础设置。这些信息就是刚开始注册时填写的信息，如下图\n\nGeneral设置里面有四块内容修改设置：\n\n◎ Store Details，店铺名称、邮箱地址\n◎ Store address，你的电话、网站的地址\n◎ Standards and formats，网站时区、重量单位\n◎ Store currency，价格单位\n\nPayment Providers 收款方式\n\n给店铺设置收款方式是非常重要的一步，者毕竟是关系到钱的问题。\n返回“Settings”设置界面，然后点击“Payment Providers”，进入收款方式设置\n\nPayment 设置里面有两块基本内容：\n\n◎ Accept payment\n◎ Payments authorization\n\nAccept payment这里有四种收款方式供选择：\nPayPal、Accept credit cards、Alternative payments、Manual payments。\n\n我推荐用PayPal，如果你还没有paypal账号的话，分分钟可以注册一个，很简单的事。另外，网上有很多关于PayPal或其他付款方式的教程。\n\nStore Policies 店铺政策\n\n如果你决定要在shopify上开店，那么你要为你的店铺制定相关的政策。\n\n这里有三个内容：Refund policies，privacy policies，Terms of service。Shopify已经为卖家创建了一个自动生成模板的功能，点击“Create from template”模板就会自动生成。\n\n返回“Settings”设置界面，然后点击“Legal”，进入店铺政策设置，如下图\n\nShipping 运费设置\n\n卖家的运费计算方式清晰明了也很重要。但我的建议是最好”包邮”，这也是最简单的做法。收货地点都不同，那每次都要算一遍运费，这样其实非常麻烦。\n\n所以，可以把大概的运费算到产品价格中，然后包邮卖，这样就很方便了。比如，某款T恤你打算卖$20，那你就卖$25，包邮。而且，“包邮”也可以作为你营销的一个卖点。\n\n返回“Settings”设置界面，点击“Shipping”，进入运费政策设置，然后可以设置包邮。\n\n首先删除“domestic” shipping zones，点击“Edit”进入编辑页面，然后滑到页面底部点击“Delete zone”\n\n然后在“Rest of world”部分，点击“Edit”，选择“Weight based rates”部分的“Edit”，勾选“Free shipping rate”\n\n3. 开始营运店铺\n\n设置好所有的必要信息后，就可以开始营运店铺了。如何操作呢？你可以点击“Sales channals”旁边的“+”，然后可以选择你想添加的营销方式，如下图\n\n比如，如果你平时玩Facebook，就可以选择添加到Facebook上营销你的产品。当然这要关联到你的Facebook账号\n\n4. 店铺设计\n\n这部分，我们要强调一下店铺设计的重要性和一些要注意的地方。店铺的设计非常重要，因为这展示了你的设计理念和品牌。Online Shop有一个简洁美观的风格，就好比实体店拥有一个很诱人的橱窗一样重要。\n\n这决定了顾客对你店铺的第一印象，而第一印象很重要，很多时候往往决定了顾客是否会进店逛逛。所以有必要研究一下店铺的设计技巧，说不定你的销量会因此而爆发。\n\n说到店铺设计，总的来说要考虑两个方面——主题和logo。\n \n选主题\n\nShopify有内置的主题商店，（地址：https://themes.shopify.com/themes ）上面有各种各样的主题模板，总能挑到适合你的主题。\n\n主题有免费的和付费的，这个完全取决于自己的需求和经济情况。但要选一个非常适合自己的主题也并不简单，有两个很重要的问题需要思考：选主题前要考虑什么，要不要用免费主题。\n\nl 选主题前要考虑什么？\n\n使用常见的主题模板。常见的主题模板符合大家的使用习惯，这样的主题操作起来  更方便，容易上手。\n\n◎ 店铺界面最好也适合手机端\n\n据统计，移动设备的下单量超过了50%，所以你的主题最好适合在手机上浏览。同样，要使用常见的手机端界面布局。\n\n◎ 在多个主题模板中预览你的产品\n\n产品图片是很重要的信息，因此最好能有一些高清的图片，如果手上的图片较少的话，最好选择图片少的主题。\n \n◎ 结合你的预算\n\n如果你这方面的预算比较少甚至没留预算，那就用免费的主题，而且尽量选择banner较少的，重点突出产品。有的时候，简洁的主题反而能吸引顾客。\n\nl 要不要用免费主题？\n\n对我自己而言，我是一开始就用付费的主题。（也特别不建议大家去大森林里面去买主题，一句话，bug特别多）\n\n我想对那些打算，认认真真的做shopify的同学说，不要省一点主题，这都是小钱的，不要把很多时间浪费在这些无聊的事上，能花钱就花钱。\n\n当然，也不要觉得免费的主题就一定很垃圾，这些免费主题包括了大部分重要元素，而这些重要的因素往往是一个成功的主题所必备的\n\n下面是关于shopify主题的一些链接，供大家参考：\n\nhttps://themes.shopify.com/\nhttp://themeforest.net/category/ecommerce/shopify\nhttp://www.templatemonster.com/shopify-themes.php#gref\nhttp://troopthemes.com/\nhttp://www.shopifythemes.net/\n \n创建logo\n\n你的logo就代表着你的品牌，logo可以让顾客更容易记住你的品牌。所以，很有必要花些时间思考如何设计一款符合你店铺理念的logo。完全靠自己完成貌似不太容易，不过现在又很多免费的工具。\n\n比如，Oberlo 有一个在线工具Oberlo’free online Logo Maker，只要几分钟就能设计出一款满意的logo，你只要在上面选好喜欢的字体、颜色、图标和logo的位置就行了。\n\n如果你想自己设计logo，就要用到一些作图软件，比如PS和Canva。或者你可以花一些钱，外包给一些设计的自由职业平台，像 Upwork or Fiverr。\n\n当你选好主题也设计好logo后，你店铺的设置工作就大功告成了。\n下面是一些设计logo的工具和自由职业的外包平台：\n\nLogo设计工具这里和大家推荐：\n\nhttps://www.oberlo.com/tools/logo-maker\nhttps://www.logaster.com/\nhttps://www.canva.com/create/logos/\nhttps://www.ucraft.com/logo-maker\nhttps://logomakr.com/\n\n你也可以在一些自由职业的平台上找：\n\nhttps://www.upwork.com/\nhttps://www.toptal.com/\nhttps://99designs.com/\nhttps://www.freelancer.com/\nhttps://www.peopleperhour.com/\n \n5. 利用Oberlo选品\n\n店铺设计工具完成之后，接着就是要上传产品，有了产品生意才能正式开始。针对于shopify卖家选品和上传产品。\n\n最好用Oberlo（地址：https://app.oberlo.com/ ）， Oberlo是为shopify“量身定做”的一款软件，两者要结合起来用。这样，你可以很方便地把产品数据导入到你的店铺中。\n\n在线登陆Oberlo，可以“搜索产品”并“添加到import list”，然后“关联到你的shopify店铺”，把“import list导入到店铺中”。具体操作，见下图\n\n之后，要在店铺中“添加产品分类”，分类的名称最好按照产品类型来命名。比如，你的店铺主要卖T-shirt，那么类名就可以是“T-shirts”。你或许会疑问Oberlo能提供哪些产品？\n\nOberlo有两大不同类型的供应商：\n\nOberlo认证供应商\nOberlo供应商和速卖通\n\nOberlo认证供应商，都是精选的优质供应商，所以你不用担心找不到好的供应商。点击“Suppliers”，可以输入关键字来寻找相关的供应商\n\nOberlo供应商和速卖通，这里的产品就是直接从速卖通里面一键导入所有的产品\n\n6. 拿下首单\n\n当一切准备工作都完成之后，就可以开始营运店铺了。\n\n虽然店铺是开张了，但新店一开始一般没多少人知道。所以要多想一些曝光活动，多研究一下各类的营销渠道，然后找出最适合自己的，来吸引更多流量。\n\n后者你也可以研究竞争对手的网站，然后找到他们是如何运营的，这样你就可以少走很多的 弯路。\n\n史上最详细的监测Shopify的竞争对手方法！\n\n特别要说明的一点是，现在的shopify基本就和Facebook配合来打了，所以你可以通过Facebook去上面测试一些广告。\n\n重点是要持续测试，坚持测试一段时间之后，你肯定会找到最适合自己的营销渠道和方案，订单也会越来越多的。\n \n另外我之前也写了一篇Oberlo赚钱故事分享：我是如何一步步开始我的店铺赚钱计划？\n\n大家通过这篇文章，就可以看到整个的Shopify执行和操作计划，可以说就是一个体系了\n\n而里面的每一个体系，大家可以在延伸出相关的知识点，这些我在公众号和博客上都已经写了不少，大家可以去查阅。\n\n以上\n\n长按二维码，添加关注！", "filename": "小北的梦呓_2018-09-18_Shopify开店注册全流程指导（新手必看！）.html"}, {"date": "2019-02-19", "title": "2019手把手教你Shopify站内优化SEO", "recommended": false, "content": "收录于话题\n#Dropshipping\n\n前段时间，我主要是在给大家讲一些引流的问题，亚马逊也好，Facebook广告也好，基本都是在讲引流。引流重要，但是网站自身的优化也不能忽视。\n所以今天来给大家讲讲Shopify站内优化的问题。\n\n我觉得大家在做shopify应该都应该很在意店铺的设计，以及装饰问题。但是其实shopify店铺装饰的好不好看，跟吸引自然流量的多少其实是两回事。\n也就是说，并不是说你店铺装饰的好看，吸引到的自然流量就多。\nShopify店铺要获取更多的流量，要从不同的角度去获取，比如facebook广告，比如红人营销，还比如搜索引擎排名....\n那么，今天我们来讲一下怎样通过站内优化来提高shopify店铺的搜索引擎结果页面排名。\n那今天文章的主要内容有：\n\n01\n优化shopify网站结构\n\n对shopify优化来说，你网站内容结构是很重要的。\n大家不知道对SEO熟不熟，如何你熟悉的话，你就很清楚，一个好的网站架构，是非常有利于搜索引擎的抓取的。（论网站结构的重要性！）\n而且在搜索的排名上，很容易就能出现，全站式搜索，如下图：\n\n如果你的客户在你的店铺里都很容易找到他们想要的东西的话，他们甚至会在你的店铺里停留更长时间。而较长的网站停留时间是对网页的SRP排名很有帮助。\n\n所以，网站内容结构最好不要弄得太复杂。一个比较简单的结构，也更易于搜索引擎抓取我们的信息，提高排名。\n所以一般来说，简单的结构就如下图\n\n从图上看的话，大家应该也看得出来，产品页到主页也就两步过程，这个结构是非常简单清晰的。\n当然了，如果你产品比较多的话，还稍微分得细一点。如：\n\n总之，大家要记住一点，我们的网站首先是为了用户而建的，所以一切要优先考虑用户的体验感。\n当然一个网站除了产品类别和产品页面，还应该要有“关于我们”页面和“联系我们”页面。这两个页面主要是向用户和搜索引擎展现我们网站的可信度，所以这两个页面千万不能漏掉。\n最后，网站上最好再放一个搜索框。\n搜索框虽然不能直接影响SRP排名，但是可以让用户更加容易找到他们想要的产品。也就增加了他们购买的可能性，所以这其实是一个直接增加转化率的方法。\n\n02\n关键词调研\n\n使用Google keyword Planner：\nhttps://ads.google.com/home/tools/keyword-planner/\n首先我们调研这个关键词，要看的就是这个关键词的搜索量，才能知道这个关键词到底多少搜索量以及热度高不高。\n说到搜索量的时候，大家主要看看这个关键词的大概月搜索量是多少。\n除了前面说的Google关键词调研工具之外，这里还给大家推荐一个关键词调研工具SEO Metriks\n地址：\nhttps://apps.shopify.com/seometriks\n其实关键词调研最重要的不是用什么工具，而是你能不能把这个关键词研究得清楚明白的。\n所以其实用什么工具都不重要，重要的还是你自己要做主功课。\n内容关键词\n你网站的每一个页面，包括产品页，类别页，博客文章以及主页，其实都可以通过不同的关键词来排名。而且关键词调研甚至最开始就可以告诉你，你的网页页面应该以什么关键词为主。\n比如，很多你的关键词，可以作为主要的信息关键词；有些关键词不是那么重要的话，就可以用来暗示大家购买。\n\n03\nGoogle&Bing管理工具\n\n注册shopify店铺到Google&Bing网站管理工具\nGoogle Search Console：\nhttps://www.google.com/webmasters/tools/\nBing Webmaster Tools：\nhttps://www.bing.com/toolbox/webmaster\n如果你是认真在做你的shopify店铺的话，那你一定要注册这两个。不管是最开始你用什么平台建的网站，都要注册。\n注册这两个的用意，只是让这两个搜索引擎知道我们网站的存在，确保爬虫可以抓取到我们网站的内容。\n这里给大家提个醒，在注册的时候，最好是加或不加www都注册一次。\n比如：www.zhuce.com 以及 zhuce.com这两个版本。\n还有，如果你网站加密和不加密版本都有，那也两个都注册。\n也就是http:// 和https:// 两个版本都注册。\n注册这两个其实也很简单，第一步，进来 → 立即使用\n\n第二步，输入网址\n\n第三步，验证\n这一步其实也很简单，如果你不知道怎么把下载的文件上传到shopify店铺的话，还可以选择下面的几种选项\n\n如果实在不会的话，还是找工程师吧。一般来说，建站的时候，都会cover到这一步的，所以不用担心。\n提交网站地图至Google&Bing网站管理工具\n网站登记好了之后，我们还需要提交一个网站地图上去。提交这个的作用就是为了让爬虫更精确，更快速的抓取我们的网站信息。\n大家也不用担心，shopify也会自动生成一个网站地图地址。就只要在你的网站地址后面加上 — /sitemap.xml\n比如 www.example.com/sitemap.xml\n总之，一切都是非常简便。\n\n04\n使用SSL\n\n之前在讲语音搜索的时候，我们也讲过，要用SSL网站，也就是“https”，搜索引擎对SSL是比较看重的。\n除此以外，很多浏览器对不加密的网站其实很不友好，有时候访问的时候，还会特意给用户一个警告页面\n\n试想一下，如果你要网购的话，遇到有这种警告的店铺，你敢不敢买？\n所以，使用SSL是必须要做的，不能保证店铺的可信度的话，那其他的都是空的。而且shopify设置这个是非常简便的，只需要几个简单的步骤。\n进入shopify dashboard → Sales channel → Domains\n但是在使用SSL之前，我想先跟大家讲清楚我的一些思考。\n新网站的SSL\n如果你是刚刚申请了一个店铺，也就是说，不是从一个老帐户转过来，而是全新的一个账户。这个时候，直接开启SSL，都不用想，而且这种做法是很明智的。\n因为你一开始就是用的是SSL网站的话，那么这对你后面不管是改善店铺表现也好，或是提高搜索引擎结果页面排名也好，都是很有好处的。\n把一个不安全网站转换成SSL网站\n如果你现在的shopify店铺还没有加密，或是你从一个其他没有加密的网站，把它转换为SSL shopify网站的话，这个时候就要小心一点。\n在转换之前，你一定要确保你之前所有的链接地址都能永久的转到新的网址来。\n如果你忘记设置转到新网站来的话，那这样就会造成你排名下降，进而损失流量。要做这个转到就可以用301请求码，这个比较复杂，不懂的话，直接让工程师来做就行。\n但是如果你的网站本来就是shopify的话，那你不用担心这个问题了。因为shopify网站转换时会自动生成301 redirect，所以不用手动来做。这么一说，这就是一个非常简单的步骤，没别的。\n\n05\n优化URL\n\n使用清楚的URL，意思就是，你的网址不要看起来是一大堆东西，要看起来简单，也就是清爽。\n一个干净的URL，要短，简单以及可理解性强。比如，你的店铺是卖小动物T恤，那么你的网址可以是：www.dianpu.com/animal-tshirt\n而不是：\nwww.dianpu.com/gy/o542.phy?ref=46146544budsshd\n现在shopify网址的话，虽然不至于像第二种那么杂乱无章，但是它自动生成的网址也实在是不如我们自己设置的那么简洁的。\nShopify编辑网址，就跟前面编辑页面title的元描述在一块。\n注意：在编辑页面网址的时候，如果这个页面现在的排名还没有上来的时候，是比较好的。但是，如果这个页面现在排名已经很高了，那这种时候，优化网址就要小心点了。\n因为如果这个页面排名很高的话，说明它的外链已经很多了。所以如果你改网址，忘记设置redirect的话，那你这个外链基本上就算没了。后果很严重啊。\n而且改网址还会影响这个网页的社交分享状况，因为改掉网址的话，这个网页被分享的次数就会全部清零。\n所以，优化网址最好的时机就是在创建网页的同时或是创建网页不久。\n不要等到排名开始上来了，才想起来改网址，比较麻烦。\n\n06\n保证网站的加载速度越快越好\n\n网站加载速度是决定网站排名的一个很重要的因素，不用想，肯定是加载快的网站排名更加靠前。\n其实如果是使用shopify这个平台的话，我们对网站加载速度其实控制比较少。因为用shopify，我们不能选择自己的服务器或是自己建主题。\n我们只能使用shopify的服务器，主题也是。\n虽然这两个都很好，对小白来说也很方便。但是唯一的不足就是，我们没有办法决定这个主题的加载速度。\n但是，我们不能控制这个，并不代表我们什么都不能做，还是有很多可以做的。\n使用图片压缩工具，压缩图片。记住，所有上传的图片都要压缩。\n工具推荐：\nTiny Png — https://tinypng.com/\n不管是外部编辑还是其他代码，都尽量用最少\n\n尽量避免大量的网站字体排印，甚至可以直接完全不使用，全部换成网页安全字体（web safe fonts） — 这种字体加载更快\n\nShopify页面都要使用AMP形式\n\n07\n优化图片\n\n搜索引擎算法不仅仅只抓取我们网站的文字信息，他们也会抓取图片信息。\n要让他们抓取我们的图片信息的话，他们只能处理跟这张图片相关的内容 — alt信息和图片名称。相应的，我们也一定要确保这两个信息是符合SEO优化标准的。\nShopify添加alt文字\n在shopify给图片添加alt信息也很简单。\n操作步骤：products → all products\n（请忽略我的表情包）\n\n把鼠标移到图片上，选择“alt”\n\nShopify编辑图片文件名称\nShopify编辑图片文件名称并不像前面说的那几种那么简单，所以最好的办法就是，在你上传图片文件之前就先编辑好文件名称。\n也就是说，我们主要优化的就是图片文件名称，而且这个名称不用太长。\n举个例子，你这件产品是一件熊猫头像T恤，那你的这种图片名字就应该用“panda-T-shirt”。\n而不是什么“IMG46126HGU.563.JPG”,请问根据后面这个名字，你能知道这张图片的内容吗？\n如果你之前已经上传了很多图片，但是没有注意修改图片名称，那就没办法了。只能把那些图片删掉，重新上传优化好了的图片了。\n但是如果你之前上传的图片有成千上万那么多怎么办，这个工作量非常大。所以这种时候你就要权衡一下了，优化图片带给你的好处，值不值得你花那么多时间精力去做那些繁琐的事情。\n如果图片太多的话，可以有选择性的优化。优化一些对你的店铺比较重要的产品的图片。其他一些无关紧要的，不是必需品就无所谓了。我是觉得没必要浪费那些时间。\n\n08\n添加富文本\n\n富文本，加入这些信息可以同时帮助用户和搜索引擎理解我们网站的信息，而让搜索引擎理解我们的内容，才是对我们的排名真正有帮助的。\n这些信息包括一些视觉上内容，比如星星等级，作者，价格等\n\n09\n优化网站title\n\n网页优化，非常重要的一个因素就是网页标题。因为搜索引擎爬虫在抓取信息的时候，给信息分类的时候，他们会把这个网页标题视作一个关键性信息来排名。\n而且在搜索结果页面，你的标题是占搜索结果的绝大部分内容的。\n所以，标题最重要的一点，就是你的标题绝对不能模棱两可，意义不明。而且一定要以你的第一关键词开头。也就是说，你最想要排名的那个关键词，要在整个标题的前面。\n比如，你是一个洛杉矶本地卖动物头像T恤的一个店，那么你最好的关键词排列就是“洛杉矶动物头像t恤”，而不是更加笼统的“动物头像T恤”。\n当然了，你的关键词肯定不是像我这么随口一说就能决定的，不管什么时候。只要涉及到关键词，就一定要做关键词调研。\n关键词调研的工具无非就是那几种，Arefs就很足够了。\nShopify的网页标题主要有两种，一种是主页标题，另一种是其他不同网页的标题。\n优化主页title\n编辑主页title也很简单，编辑title的时候，也可以顺便把元描述也编辑一下。\n首先，Sales Channels → Online Store → Preferences\n\n优化元描述\n元描述呢，主要是网页内容的一个小概括，一般搜索引擎结果页面，蓝色标题下面的文字就是元描述。\n\n虽然Google官方有表示，这个元描述不是影响网站排名的因素。但是一个写的好的元描述可以吸引更多的人点击我们的网站。\n更多人点击我们的网站，也就是说会增加网站点击率。而点击率其实是会影响网站的排名的。所以说来说去，元描述还是很重要的。\n说起来，元描述应该要有一下几个原则：\n要简洁\n\n精确\n\n包含你要排名的关键词\n\n编辑其他页面title\n\n编辑其他页面title的时候，其实跟编辑主页title也是差不多的。\n操作步骤：sales channels → online store → pages\n\n选中要编辑的页面，选择“edit selected items”\n\n点击“add fields”按钮，这里顺便也可以把标题，元描述和URL一起编辑了\n\n10\n使用合适的headings\n\n很多人在使用shopify的时候，很容易忽略网站标题这个问题。有些人甚至有时候会使用粗体，来分散掉一些内容。这样其实是很不可取的。\n这样做有几个问题：\n第一，从美观的角度来看，这样子其实是挺难看的。\n第二，不习惯屏幕阅读的用户可能会更难理解你的网站内容；\n第三，这样会让搜索引擎更难处理以及理解网站的内容。\n所以，标题一定要重视，要跟你的文字信息搭配的好，你在上传文字之前就应该要考虑好这个问题。\nShopify添加标题和副标题也很简单啊\n操作步骤：sales channel → online store → pages → add page\n\nTitle填好之后，输入一段内容。\n如果你的标题就是第一段内容的话，就可以不用管，直接点击，选择你想要的标题类型就行了。\n\n但是如果你想要的标题是在内容中间的话，可以先加粗，再选择标题类型。注意，只能一段一段选中，所以，你要的标题内容分开成独立一段。\n还有，H1标题是这些标题中最重要的，因为搜索引擎会把这个跟title一起，作为网站排名非常主要的因素。所以，H1标题一定要包含你的第一关键词。\n\n11\n使用自适应设计\n\n自适应设计就是指你的网站要在电脑，平板，手机上等设备都能正常显示。\n这种自适应设计可以在很大程度上提高用户体验度，以及增加用户网站停留时间。而且Google会把网站停留时间作为一个网站排名的因素。\n所以一定要确保你的网站是移动自适应良好，特别是在手机端。因为现在很多网购的人，绝大部分都是在用智能手机，现在大家是，能不坐在电脑面前，就不坐在电脑面前。\n\n12\n提高店铺SRP排名的app\n\n其实站内优化可以用到很多优秀的app，下面我就给大家稍微介绍几个。\nPlug in SEO\n地址：\nhttps://apps.shopify.com/plug-in-seo\n\n这个工具帮助我们检查SEO问题，包括页面title，标题，元描述，网页加载速度，内容以及文章结构问题等。\n而且安装之后就是全自动工作，会定时给我们发送电子邮件提醒我们，让我们的店铺随时保持最优状态。\n有免费版本，以及7天试用期。\nSmart SEO\n地址：\nhttps://apps.shopify.com/smart-seo\n\n这个app可以自动生成产品，产品类别，博客，以及文章页面相关元标签。而且它还能根据搜索引擎的需求转换我们的店铺信息，让搜索引擎更容易抓取我们的店铺信息。\n\n从而减少网站优化所需的时间，以及提供给搜索引擎更准确的信息，改善网站排名。\n4.99美元/月，7天试用期。\nSmart Image Optimizer\n地址：\nhttps://apps.shopify.com/seo-image-optimizer\n\n这个app主要是优化图片大小，保证不会让图片内存太大，占用太多空间，从而拖慢网站加载速度。\n所以不想手动优化图片的话，可以使用这个工具来自动优化。\n免费。\n好了，前面说的内容基本上涵盖了站内优化的所有要点。未来应该还会对这个知识点进行再补充...\n以上！\n\n长按二维码，添加关注", "filename": "小北的梦呓_2019-02-19_2019手把手教你Shopify站内优化SEO.html"}, {"date": "2018-12-22", "title": "案例分析：不打广告，这家Shopify店铺为什么做的这么牛？", "recommended": false, "content": "收录于话题\n#案例学习#跨境电商案例\n\n今天我们来分析下一家shopify店铺的情况— HAK5\n\n这家公司如果你不注意的话，很难入你的法眼，因为做的类目太垂直了。这一家店的产品主要是聚焦在网络安全领域，比如加密U盘，网络安全书籍，防黑路由器等。\n除了这个安全防护产品之外，比较火的产品还有专门用来获取信息的一些装置。\n网站地址：https://shop.hak5.org/\n\n你知道这家店铺，有多厉害吗？\n它流量每个月都很稳定，三十万左右，欧美流量居多，搜索流量和直接流量居多，社交流量只占13%，所以可以看的出，这家店铺基本上广告费用很少。全靠精确搜索流量和老顾客流量。\n\n（ps，前面的几个月份流量没有，是我观察了这个网站做了一个改动，由之前的域名https://hakshop.com 跳转到 shop.hak5.org 所以流量做了一个变化）\n\n不要觉得每月的流量少，但人家的流量主要是靠搜索来的，现在这家公司基本就是躺着赚钱呐~\n可能这些产品大家平常没怎么关注，因为国内大家对于网络安全，信息隐私保护还不是特别的重视。\n但老外不一样啊，看看扎克伯克这一年，Facebook因为用户的数据泄露，闹得多惨\n（小札同学面对国会议员的质询）\n比较有意思的是，现在大部分人做shopify，要获取流量，首先想到的就是打广告。比如Google广告，Facebook广告，全部烧起来。但是这个店基本上没做什么广告，甚至可以说是完全没做广告。\n那像这样的产品本身就很小众，还没做广告，这个店现在的经营状态怎么样？\n我们来看看，他们的网站价，这里我用worthofweb来分析一下网站大概的价值：\n地址：https://www.worthofweb.com/\n\n7.4万美元，折算成人民币也就是51万多。这个价值还是很不错的，没做广告，所以成本也就是产品成本，其他全都是利润。\n既然没有做广告，那肯定有其他比较强大的途径在获取流量。那来看一下他们的流量情况，这里我用similarweb分析一下\n地址：https://similarweb.com\n\n从流量的分布来看，我们可以看出，这家店铺的绝大部分流量都是来自直接访问（收藏）以及搜索引擎带来的流量。来自广告社交的流量不到13%。\n所以这个网站应该是主要在做内容营销，SEO。\n\n再看这里，付费搜索直接是0，牛！而且搜索关键词绝大部分是他们品牌名字，下面都是他们自己产品名字。\n人家是完全没做广告啊。\n既然有社交流量，那这些社交流量怎么来的？是红人营销还是giveaway之类的活动？\n\n绝大部分社交流量是来自youtube，reddit有一点点，Facebook也有一点点。\n他们的YouTube很厉害啊，引流这么多，那我肯定也要来偷窥一下他们的YouTube。\n\n48万订阅，难怪可以引流这么多。\nYouTube上的内容这么多，他们做的什么内容可以吸引到这么多订阅？\n\n一眼看上去，基本上可以看出来是一些实操性比较强的干货内容。而且总共有一千多个这样的视频，有的视频时长还会达到50多分钟，将近一个小时。确实是很用心在做内容，而且是一直在持续输出。\n诶，又出现了，内容！\n虽然他们做的内容标题看起来比较实用，时长也比较长，订阅也比较多，但是不代表他们就一定很权威啊。\n那就来看一下他们的YouTube频道网站权重。\n用moz来分析一下\n地址：https://moz.com/link-explorer\n\n72，这个数字是页面权重，代表这个页面很受信任，会给这个网站带来很多的流量。这数值真的很高了！\n前面我也说了，这个店铺没有做什么广告，甚至是社交宣传，所以基本是在靠内容和SEO打天下。\n所以我们现在来看一下他们的SEO做得怎么样\n\n他们总共是有655个关键词在做排名，而且有153个关键词都是排前三的，这个很厉害啊，加上后面90个排4-10名的，基本上占据Google搜索结果页面第一页的就有243个关键词。\n所以他们的自然流量那么高，不是没理由的。\nSEO，基本上除了内容营销，就是外链建设。\n所以我们来看一下他们的外链情况，这里我用Moz工具，如下图\n\n总共是3k个外链，也是比较可观了。所以这么多的外链，带来的流量自然也比较多。\n\n而且这些外链比较多的都是来自YouTube，所以有个自己的干货输出的地方是很有好处的。\n分析完他们的流量以及营销策略之后，再回到他们的店铺本身来看一下\n主要看看网站的布局结构\n网站的布局主要包括以下6个板块组成：\n整体配色\n\n折扣广告\n\n店铺活动\n\n热销产品\n\n节日促销\n\n产品类别\n\n看到没有，这个网站的布局非常简单，清晰，没有很多花里胡哨的板块\n配色\n\n整个网站的配色只有三种：黑白红\n这种配色看起来很高级，不至于沉闷，也绝对不会花哨。因为毕竟是做高科技产品，不是做美妆或服装的。\n折扣广告\n\n包括产品，新闻社区，以及技术支持这四个区域，然后是一个节日折扣的标示。\n就这么简单。\n店铺活动\n\n这个是他们店铺现在在做的一些活动，还是黑白红，连图片都没有别的颜色。\n热销产品\n\n节日促销\n\n产品类别\n\n他们这里的分类是按照产品的用途来分的，WiFi，信息储存硬件啊，等等。\n看完产品之后，留意一下他们的产品页面。\n他们的产品页面，还是 — 简洁。\n一张图片，一段详细描述，一个call to action按钮，一列社交分享按钮，没了。\n\n好了，行了，网站看了这么多，然后呢？欣赏一下就行了？不是的，接下来，我们来看一下他们建网站用来哪些辅助工具。\n我们用Commerce Inspector这个工具呢，可以直接来查看，这个网站（只能查看shopify类型的网站）的主题是什么，插件用什么安装，流量如何，工具地址：\nhttps://chrome.google.com/webstore/detail/commerce-inspector/kefmekfmfacbdefimlancoccpocmgmpb\n这是一个Google chrome插件，安装到Google浏览器就可以直接使用。\n\n这些就是他们现在在用的工具，有个这个工具呢，竞争对手在用什么模板，插件，流量，订单预估，都是可以挖掘出来的，非常非常的实用。\nFree shipping bar by hextom\n地址：https://apps.shopify.com/free-shipping-bar\n\n这个，如果你的店铺也在做包邮的活动，那你也可以跟这个店铺一样，用一下这个app。\nLast second coupon by hextom\n地址：https://apps.shopify.com/last-second-coupon\n\n这个app可以在客户离开我们的网站之前，自动弹出一个折扣券，减少客户弃购，以及还可以跟我们之前说的一些工具一样可以高级定位客户，而且也还有节假日或是什么重大事件的专门主题。\nKlaviya email marketing for shopify\n地址：https://apps.shopify.com/klaviyo-email-marketing\n\n这个app是可以首先收集注册了我们网站客户的邮箱地址，帮助我们继续追踪之前加入了购物车，或是进入了结算页面，但是最后还是放弃购买的客户。直接通过邮件联系他们。\n为什么我感觉我写着写这就变成推荐工具的了…\nVisual web optimizer\n地址：https://vwo.com/\n\n这个工具是可以帮助我们调研受众，以及优化，测试等。还是很厉害的。\n从追踪受众，分析受众，制定策略，测试策略，定位受众一系列的功能，都是为了增加用户的转化率。\nQuantity breaks\n地址：https://apps.shopify.com/quantity-breaks\n\n这也是一个shopify插件，可以按照数量来计算折扣，比如达到多少数量就打几折这样，而且非常容易安装。\nAddthis sharing tool\n地址：https://apps.shopify.com/addthis-sharing-tool\n\n这个就是，在产品页面的的那些社交分享按钮，而且我们可以自己选择要展示哪些按钮。比如你没有做Instagram的话，就可以选择不展示Instagram按钮。\nMixpanel\n地址：https://apps.shopify.com/mixpanel\n\n这也是一个shopify插件，这个工具也是一个跟踪用户，并且可以提供数据的用途。\nHatjar\n地址：https://www.hotjar.com/\n\n这个还是一个帮助我们了解用户的工具，就是用户在你网站上操作的轨迹，帮你判断用户喜欢看哪些页面，对用户的行为分析是有所帮助的。\n之前我对这个工具也有介绍过，有兴趣的话可以看这篇文章所有市场营销人员应该使用的6款免费Google工具\n所有的品牌商，不仅很重视内容营销，而且还非常注重分析受众信息，了解用户，才能更好的抓住用户。\n所以，内容为王啊！\n分析完这个店铺之后，我们得出了什么结论？\n这家店呢，是靠SEO做起来的，还是靠内容营销才获得了这么多的流量啊。\n内容营销，内容营销，内容营销！重要的事情说三遍。\n内容营销虽然见效慢，但是真的是非常重要，我之前写了好多关于内容的文章，就是希望大家重视起来....\n可见内容营销，在其中的重要性。\n好吧，最后再看看我的一个好基友---Runsky，人家也是靠内容营销做起来的，特别是小语种，人家至少一年也千万了。\n但聊的过程中，下面两句话是值得深思啊\n现在人都求快\n你怎么说他们也不会去玩的\n\n以上！\n\n长按二维码，添加关注！", "filename": "小北的梦呓_2018-12-22_案例分析：不打广告，这家Shopify店铺为什么做的这么牛？.html"}, {"date": "2018-05-15", "title": "史上最详细的监测Shopify的竞争对手方法！", "recommended": false, "content": "收录于话题\n#如何监测竞争对手\n\n我们在做shopify的时候（其实不止是shopify，做任何电商都是一样），我们都要问一下自己：\n1 我的竞争对手是谁？\n2 他们销售的产品是什么？\n3 他们的价位是什么样的？\n4 他们的市场营销策略是什么？\n5 他们在shopify上安装的是哪个插件？\n6 他们的市场营销渠道有哪些？\n7 竞争对手的强项和弱项是什么？\n清楚的这道对手的市场策略，会对我们的营销打法，起到重要的作用。\n下面，我会跟大家介绍一些免费的工具（付费的工具，也会在将来的文章中写出，请大家期待）\n工具一：xpareto\n地址：http://xpareto.com/\n\n你可以通过关键词，进行直接的搜索，比如搜索headphone，所罗列出来的有9家\n\n你可以通过关键词查看，网站的每日流量，best selling，以及facebook campaigns。另外特别要说明的是，这个平台上所展示的网站，都是做dropshipping的商家\n工具二：myip.ms\n地址：https://myip.ms/\n因为shopify上的服务器是在加拿大，其中的一个Ip地址为：23.227.38.32，那么你可以直接利用这个ip，进行竞争对手的信息查询，如下图：\n\n点击 “Other Sites on IP”这个按钮，如下图\n\n这里搜索出来了有72228个店铺，如果你想查看更多的话，那么可以点击 View all records，如下图：\n\n你也可以点具体的排名数字，进行查询：\n\n这里我们假设，一个店铺的平均最低转化率是2%，那么你就可以知道每日的订单数量。假设一天有100000 x0.02= 2k 那么一天就有2k个订单\n另外除了第一个我们给出的通过shopify ip 来超找，的主要ip还有：\n23.227.38.64\n23.227.38.71\n23.227.38.68\n比如以 23.227.38.68这个ip来查询，我们也可以反向的查询有哪些网站的域名放在这个服务器上，使用的工具有： http://s.tool.chinaz.com/same  （进行反向的查询）\n\n第三：利用 shopify stories\n地址：https://www.shopify.com/success-stories\n我们利用shopify stories 可以找到我们感兴趣的品类，来进行查看\n\n第四：Shopify Exchange\n地址： http://suo.im/5iiZZU\n利用 Shopify Exchange 也可以找到竞争对手，同时你也可以查看具体的指标，比如价格，收益，网站的之间长度，网站的商业类型等等，可以进行一个快速的排查，如下图：\n\n利用shopify exchane 也可以查看网站的的每月收益预估，每月的订单量，流量估算等等\n\n以及这个网站的市场策略的是怎么样的，如下图：\n\n第五：Turbo Ad Finder\n地址：http://suo.im/540IHU\nTurbo Ad Finder 是一款Google插件，安装完这个插件之后，那么你facebook上的信息流中，全部都是广告\n\n当你在信息流中follow了一些niche的行业，那么以后这个广告主的广告，都会推给你，这样你也可以研究行业的竞争对手\n第六：利用Google的关键词搜索\n在Google上，Google查询的关键词格式为： site:myshopify (冒号要用英文字符)+空格+“关键词”\n如下图：site:myshopify.com “headphone”\n\n利用myshopify.com 是因为shopify给所有的卖家的初始域名是xxx.myshopify.com，但是很多卖家并没有去解析网站的域名，而是用了shopify给的最原始的域名\n那么这样你找出来的网站全部都是shopify的网站\n第七：利用facebook查询\n你也可以利用facebook来进行关键词的查询，关键为：.myshopify.com+and“所要查询的关键词”，如下图所示：\n\n另外这样的关键词也可以是\nGet yours now\nGet yours here\nJust pay shipping\nOnly pay shipping\nTag a friend\nTag someone\nLike and share\nClaim yours here\nClaim yours now\nLimited supply\nGiving away 50 free\nGiving away 100 free\n10% OFF\n25% OFF\n50% OFF\n80% OFF\nFree shipping\nBuy here\nBuy this\nGet it here\n\n搜索的到的结果有：\n\n设置都可以带上短连接来查询：\ngoo.gl\nbit.ly\nbit.do\ntinyurl.com\now.ly\nt.co\nbuff.ly\n注意：\n你是不是经常看到别人使用短连接，很想知道这个短连接所带来的流量是怎么样的，那么怎么分析短连接的流量呢？\n\n你可以用下面的方法\n\n在锻炼的后面加上 “+”或者“ .info”就可以了，比如\n你在facebook上的查询为’’.myshopify.com’’ and “bit.ly”，并且你找到了一个bitly的短连接，如下图：\n\n比如 https://bitly.com/2tzcnY2 这个bitly短连接，那么你可以在连接的末尾加上 + ，形为：https://bitly.com/2tzcnY2+\n\n回到前面，利用facebook来监测竞争对手，那么同样可以利用pinterest来查找，和facbeook的查询语句是一样的，这个我不多讲\n好了，接下来，在来讲一个话题\n通过不同的渠道找到你关心的竞争对手，那么接下来就要分析竞争对手的流量，怎么做呢？\n\n利用：worthofweb\n地址：https://www.worthofweb.com/website-value/\n\n输入你要查询的关键，比如anker.com\n\n预估每月的流量，以及网站的价值\n\n利用：Commerce Inspector\n地址：http://suo.im/4WuHYH\n\nCommerce Inspector 这个插件想必不用我在做介绍了吧，玩shopify的人都清楚！我们可以利用Commerce Inspector 来查看竞争对手的流量来源，具体的社交的流量的分布渠道\n\n这个网站安装了哪些插件？\n\nCommerce Inspector可以很好的监测竞争对手的各个维度，非常的实用\n查看shopify店铺的热销产品\n最后的一种方法是直接查看，shopify上的热销产品，这个我之前也写过，方法为：如何快速挖掘竞争对手最热销的产品？（快点收藏）\n下面，我在把这种方法简要介绍下\n你可以查看shopify店铺上的热销产品是什么，可以利用工具为：/collections/all?sort_by=best-selling  形如：\n\n这样你就可以，非常粗暴的找到竞争对手的热销产品了！\n写在最后：\n记住我们做营销的时候，不要只是看重工具，这些都是死的东西，我更多的是希望，大家通过工具，来查看数据背后的细节点，你用工具，最终目的也是为了了解对手，并最终超越对手，那么在分析数据的过程中，你要知道\n竞争对手哪里做到的好\n\n哪些页面带来的流量大\n\n他们的营销策略是怎么样的\n\n文案怎么写的\n\n用户的反馈是怎么样的\n\n品牌的忠诚度是怎么样的\n\n乃至背后的人力，策略是怎么样的，我们又应该要怎么打？\n\n我想明白这些，才是我们挖掘数据的意义所在。\n\n长按二维码，添加关注！", "filename": "小北的梦呓_2018-05-15_史上最详细的监测Shopify的竞争对手方法！.html"}]}, {"name": "AI+跨境", "color": "#ea580c", "icon": "🤖", "articles": [{"date": "2026-04-15", "title": "我用Claude Code管Shopify店铺，实测：1天干完原来1周的活", "recommended": true, "content": "Shopify前两天放了个大招，推出来了，Shopify AI Toolkit\n\n这个功能出来，再配合claude code ，真的感慨啊，独立站的门槛是进一步下降了，\n这篇文章，我把这几天\n踩过的坑、\n\n验证过的流程、\n\n以及真正好用的场景，\n\n毫无保留地分享给你。\n\n01\n\n这玩意儿到底是什么？\n\n简单说，Shopify AI Toolkit是Shopify官方做的一套连接器。\n以前你想用AI帮改店铺，只能让AI写代码，然后你自己复制粘贴到后台。现在有了这个Toolkit，你的AI助手可以直接：\n读取你的店铺数据（产品、订单、客户）\n\n验证代码对不对（API调用是否正确）\n\n执行操作（真的去改价格、改库存、生成SEO描述）\n\n有了这个功能，你只要对Claude说：\n\"帮我把所有标记为'Summer Sale'的产品价格下调20%\"，\n它直接读写整个后台，自动优化商品、改标题描述、设元数据，还逐条确认，零成本、秒级完成\n\n非常优秀了\n\n02\n\n有哪些场景可以用\n\n我把我这几天在用的实战场景，分享出来，大概有下面这些场景\n\n场景1：批量生成产品描述\n多账号的、多 SKU 的，这个是最头疼的。\n之前有个朋友做家居用品，200多个产品，每个都要写英文描述。他雇了个写手，一周写了50个，质量还参差不齐。\n现在可以直接用 Claude Code：\n读取我店铺里所有标题包含\"xxx（比如Ceramic）\"的产品，为每个产品生成一段150字左右的SEO优化描述，语气要温暖、适合北美家庭，然后直接更新到店铺里。\n20分钟后，全部搞定。\n而且因为 Toolkit 会验证 API 调用，不会出现格式错误或者字段不对的问题。\n场景2：库存预警和调整\n做季节性产品的同学都知道，库存管理是个噩梦。\n现在直接也可以利用 Claude，每周让它跑一遍：\n查询所有库存低于10件的产品，把它们的标题前面加上\"[Low Stock]\"，同时把比较成本（cost per item）高于售价的产品列个表给我。\n以前这需要导出 CSV、Excel 筛选、再导入，现在一句话的事。\n场景3：主题代码调试\n绝大多数做跨境的，基本没有改代码的能力。比如店铺主题更新后，结账页面的某个自定义字段不见了。\n以前你要找 Shopify 客服，排队半小时；找外包，报价 $200，还不一定能改好。\n检查我当前主题的checkout.liquid文件，查找自定义字段\"gift_message\"相关的代码，看看为什么最新版本里没有渲染出来。\n它不光找到了问题（主题更新覆盖了自定义代码），还给出了修复方案，并且验证了新代码在当前主题版本下能正常运行。\n这个对于做出高质量的着陆页来说，是非常有用的，是代码小白的福音。\n场景4：批量SEO优化\n这个可能是最省时间的。\n如果你有 300 多个产品，要改描述、插入关键词，人工做得花几天，而且做到最后，肯定做的稀烂。\n现在一小时搞定：\n找出所有没有metadescription的产品\n\n根据产品标题和描述生成160字符以内的metadescription\n\n包含主要关键词，吸引点击，然后批量更新。\n\n你在旁边喝杯咖啡的功夫，300 个产品的 SEO 基础全补齐了。\n场景5：竞品价格监控+自动应对\n做独立站最糟心的就是竞品偷偷降价抢你的流量。\n以前要人工每天打开对手网站看，看到最后眼都花了，根本盯不住。现在让 Claude 自动盯着：\n每天上午10点查询竞品A和竞品B的\"Vintage Lamp\"产品价格，如果比我低超过10%，自动生成一个限时折扣码（格式：PRICE+日期），折扣幅度比竞品低5%，并发邮件通知我。\n现在只要Claude 发邮件说竞品 A 从49.99降到了39.99。\n我可以直接跟进，直接点一下，5 分钟后我的折扣码已经生效，Instagram Story 也自动发出去了。\n整个过程我没登一次后台。\n你想想，如果没有这个，等你发现竞品降价可能已经是三五天以后了，流量早被截走了。\n场景6：主题安全修改\n这个场景是血泪教训换来的。\n有次直接让 AI 改生产环境的主题代码，结果首页 Banner 没了，3 小时没发现，损失了十几单。\n从那以后强制用这套流程：\n第一步：先克隆，不要直接动线上的\n克隆我当前发布的主题，命名为\"Dawn-AI-Backup-今天日期\"，确保所有自定义代码和设置都复制过去。\n第二步：在克隆主题上改\n在备份主题上修改checkout.liquid，在礼品留言区域添加一个字符计数器，限制客户输入不超过200字符。\n第三步：先预览，别急着发布\n生成这个主题的预览链接，让我在浏览器里测试修改效果。\n第四步：确认没问题了，再上线\n虽然多了几步，但再也没出现过\"改完发现页面崩了\"的事故。\n做独立站的都懂，线上出一次事故，损失的可不只是那几单，客户信任丢了才是最贵的。\n场景7：客服自动化（订单查询）\n做过客服的都知道，每天被问最多的就是\"我的订单到哪了\"。\n这种重复性的问题占了客服工作量的一大半，但又不能不回，回慢了客户就投诉。\n现在让 AI 接管这类标准咨询：\n当收到客户问\"Where is my order\"时：1. 从消息中提取订单号2. 查询该订单的fulfillment状态和tracking number3. 生成友好回复，包含：   - 当前状态（已发货/处理中）   - 追踪链接（可点击）   - 预计送达时间4. 如果是已送达状态，提醒客户检查邮箱或门口\n客户发来\"Order #10245 status?\"，AI 30 秒内返回完整的物流信息。\n客服终于可以把精力放在真正需要人来处理的售后问题上，退换货谈判、客诉升级这些，才是人该干的活。\n场景8：数据报表自动化\n做运营的都有一个痛：老板每周一要数据。\n你得周一早上现导 Excel、做图表，手忙脚乱赶在开会前交出去，质量还不一定好。\n现在让 Claude 周五下午就生成好，周一直接交：\n生成上周（周一到周日）的店铺数据报表，包含：1. 总销售额、订单数、平均客单价（对比上上周增长率）2. Top 10热销产品3. 流量来源Top 54. 退货率和退款金额5. 转化率漏斗（访问→加购→结账→支付）格式要求：- 核心数据用表格展示- 列出3-5条关键洞察- 给出下周建议行动（2-3条）\nClaude 返回的东西是这样的：\n?? 上周核心数据销售额：$24,580（↑15.2%）订单数：156单（↑9.9%）客单价：$157.56（↑4.8%）?? 关键洞察：? Vintage Lamp系列贡献32%销售额，库存仅剩12件? Instagram广告ROI从2.3提升到3.1? 周四-周六转化率最高（4.2%）? 下周建议：1. 紧急补货Vintage Lamp2. 加大周四-周六的IG投放3. 测试周日邮件的最佳发送时间\n10 分钟搞定以前一上午的活。\n而且你会发现，AI 给的洞察经常比你自己看 Excel 看出来的还全，因为它不会漏数据，也不会看花眼。\n\n03\n\n具体怎么安装？\n\n安装配置，其实很简单\n先说前提条件：\n电脑装了Node.js 18+\n\n有Shopify CLI\n\n有Claude Code、Cursor、或者VS Code\n\n有个Shopify合作伙伴账号（免费注册）\n\n推荐安装方式（会自动更新）：\nClaude Code用户：\n\n在Claude Code聊天框里输入：\n/plugin marketplace add Shopify/shopify-ai-toolkit/plugin install shopify-plugin@shopify-plugin\nCursor用户：\n\n直接在Cursor扩展市场里搜\"Shopify\"，一键安装。\n就这么两步，完事。\n装好后第一次用，会让你登录Shopify账号授权。\n建议用开发商店或者测试店铺先试试，别直接上生产环境，这是血泪教训。\n\n04\n\n它和 Shopify Magic、Sidekick 是什么关系？\n\n这三个名字很容易搞混，但其实各管各的事：\n\nShopify Magic \n\n这个主要功能就是帮你写产品描述、生成图片的功能。你点个按钮，它帮你写一段文案出来。这是 Shopify 内置的基础 AI 能力，所有商家免费用。\n\nSidekick \n\n是后台右下角那个聊天助手。你可以用大白话跟它说\"帮我看看上个月销量前 10 的产品\"、\"给夏季系列打八五折\"，它就帮你操作了。\n\n最近升级成了 Sidekick Pulse，更聪明了，不光你问它才动，它还会主动提醒你\"这个产品最近退货率飙升了，要不要看看？\"\n\nAI Toolkit 不一样\n\nMagic 和 Sidekick 都是 Shopify 自己做的、内置在后台里的工具。AI Toolkit 是一个\"开放接口\"，让外面的 AI 工具（Claude Code、Cursor 等）也能进来干活。\n\n打个比方：\nMagic 和 Sidekick 是 Shopify 给你配的\"自带管家\"，住在你家里，帮你做家务。\nAI Toolkit 是你家装了一个智能门锁，允许你从外面请更专业的人进来，可能是装修师傅、可能是收纳整理师——他们有自己的工具箱，干的活更重、更深。\n\n什么时候用哪个？\n\n日常运营（看看数据、改个折扣、写个文案）用 Sidekick 就够了\n\n需要大规模批量操作、自动化流程、或者做开发 ，上 AI Toolkit\n\n05\n\n避坑指南：这些坑我替你踩过了\n\n坑1：没有撤销按钮\nAI执行的操作是即时生效的，没有\"撤销\"功能。\n我第一次试的时候，让Claude\"把所有产品价格提高10%\"，它照做了，包括那些本来就在打折的产品。\n很危险\n正确做法：\n先在测试店铺验证批量操作前，先让AI\"查询\"当前状态，你确认后再执行重要操作前手动备份数据\n\n坑2：它不懂你的品牌\nShopify AI Toolkit解决的是技术操作问题，不是\"营销策略\"问题。\n让它\"优化产品描述\"，它会给你语法正确、SEO友好的文字。\n但你的品牌调性是什么、目标客户是谁、竞品差异化在哪，这些它不知道，你需要在prompt里明确说明。\n坑3：默认会传代码到Shopify服务器\nToolkit为了验证代码，默认会把你的代码片段发送到Shopify服务器。\n如果你处理的是商业机密或者客户数据，一定要设置环境变量：\n这样做的好处是：你的代码和数据只在本地跑，不会传到任何外部服务器。\n\n \n对于做品牌的卖家来说，你的前端定制代码、营销策略逻辑这些东西，能不外传就不外传。\n\n设置方法，一行命令：\nexport OPT_OUT_INSTRUMENTATION=true\n\n坑4：权限给太多\n授权的时候，Shopify会让你选择权限范围。很多人图省事直接全选，这很危险。\n原则是：只给当前任务需要的权限。如果只是想读取产品信息，就别给\"修改订单\"的权限。\n\n这个功能，主要是特别适合：\n\nSKU 数量多、经常需要批量操作的店铺\n\n没有预算请开发团队，但又有自定义需求的小卖家\n\n喜欢折腾、想提高效率的工具控\n\nShopify AI Toolkit确实是一个杠杆，把你的时间杠杆放大10倍、100倍。\n那些重复、机械、耗时的操作，交给AI。\n你把省下来的时间，用在选品、供应链、客户关系这些真正创造价值的事情上。\n现在独立站这么难的，也被直接打穿了，太不可思议了。", "filename": "小北的梦呓_2026-04-15_我用Claude Code管Shopify店铺，实测：1天干完原来1周的活.html"}, {"date": "2026-03-12", "title": "每月花 1000 美金用 AI，我总结了一套工具分工", "recommended": false, "content": "现在市面上一堆AI工具，让人眼花缭乱\n小北我几乎把所有主流的AI工具都碰了一遍，而且都是付费用户，比如我现在手上在用的：\n大模型：\n\nGemini，一个月20美金\n\nChatGPT一个月20美金\n\nClaude 一个月129美金（之前一个月200美金）\n\nKimi 2.5 一个月199\n\n自动化\nComet一个月20美金\n\nN8N 一个月24欧 （我部署在官网上）\n\n做图的：\n\nLovart 一个月45美金\n\nYouMind 一年700多\n\nSeed AI一年600多\n\n美图工作室：按月30元\n包括一些做视频的，充值积分这还不算各种服务器，API的钱，包括第三方数据接口，比如afiy\n一个月我算了一下，大概在1000美金\n因为用了这么多，所以我才能知道感知不同大模型，哪些适用于我公司，因为，我的理念是\n多付费，最后反而是少付费\n所以，写这篇文章，我肯定是比较有发言权的。\n\n这里，我先说一件很多人没意识到的事：不同大模型之间的差异，远比你想象的大。\n不是\"差一点\"，是\"完全不是一个级别\"。\n很多人觉得凑活，都差不多，但是用对了模型，和随便抓一个来用，结果可以天差地别。\n这绝对是我用下来最真实用下来的感受。\n所以，在讲工具之前，我想先把这个前提说清楚：\n\n每个工具都有它最擅长的地方，但首先你得用对模型。 用错了，再好的工具也白瞎。\n接下来我说说我的分工逻辑，以及每个工具我为什么这么用\n希望这篇文章对你有帮助。\n\n01 \n\nClaude Code\n\nClaude Code 当之无愧我的神，这是我用得最重的工具，没有之一。\n我是用max，贵是真的贵，一个月几百块，加上公司的，一个月几千块了。\n但是好用是真的好用。\n举个最直接的例子：n8n 工作流自动化\n很多人说 n8n 难，踩了一堆坑，折腾半天跑不起来。但说实话，这个问题有一半不是 n8n 的问题，是模型选错了。\n你用那些不对口的的模型来解决 n8n 的报错，当然效果差，代码修了又坏，逻辑绕来绕去。\n但换成 Claude Code + Opus，完全是两个世界。\n很多 workflow 的 bug 它自己就能定位修复，不用你手动查日志、一条条试。\n如果再叠上 n8n 的 MCP，工作流做起来就跟喝水一样。\n我说这句话，优联荟的同学大部分都能深刻体会，同样的任务，模型不一样，效果真的完全不一样。\n很多人没有付费过，所以不懂的什么是王者，以为什么模型都可以凑活着来用，但是真的不一样。\n它在写代码，理解产品逻辑、帮你做架构决策，这就是王者。\n用一句话总结就是：做产品，首选，吊打。\n至于Codex 我留着当备用，偶尔切换一下。\n而且这两天，我还把我的claude code 集成到了飞书，和discord中来出来工作。\n这样的好处是我建立一个群，群里有CC的bot，每个团队都能直接在群里问CC，让CC来处理工作。\n这样我只要拿着手机就可以指挥命令工作了。\n\n02\n\nChatGPT\n\n我主要是用来给建议、做头脑风暴。\n它最大的优势是全面，能给你很多你自己没想到的角度，它会给你补出来，帮你防止思维缺漏。\n不知道该问谁的问题，先扔给它，基本都能给你一个方向。我把他当作聊天来用\n但我不敢真的让它去\"干活\"。\n原因很直接：这家伙马屁太多了。 \n你随便说个想法，它先给你来一顿夸，夸完再接着说。时间长了，你根本不确定它说的是真心话还是哄你开心。\n用来发散可以，用来做决策要小心。\n\n03\n\nComet / Atlas\n\n AI 的浏览器，主要是用他来找信息、看背景。\n\n比如，你在看亚马逊评论的时候，它帮你快速归纳消费者核心痛点；读一篇外文报道，它实时补充背景信息。\n信息密度高的场景，用它效率翻倍。它不是用来生成内容的，是用来读懂内容的。\n比如comet浏览器，他可以做自动化的内容，比如帮你设定时间，来监控竞品，全网搜索你想要监控的关键词信息\n\n04\n\nAI Studio\n\nGoogle AI Studio，跑 Demo 的首选。\n直连 Gemini 最新模型，免费额度大，速度快。很多人不知道，AI Studio 的免费额度其实非常慷慨，同样的 API 调用，在这里测试完全不花钱，非常适合早期折腾阶段。\n我的用法是这样的：一个产品想法冒出来，先扔到 AI Studio 里快速跑一遍，看看逻辑通不通、效果大概在哪个水位。提示词也一样，在这里反复打磨，调好了再搬到正式项目里。\n这个过程可能就是二三十分钟的事，验证了，接着做；验证不了，早点放弃，省了后面大量时间。\n所以总的来说，我是Demo 用 AI Studio，产品用 Claude Code \n\n05\n\nGemini\n\nGemini 本身挺强，但我目前主要用它做两件事：\n一是跟它的新功能\n\nGoogle 更新节奏快，Deep Research、长上下文、Gems，隔一段时间就有值得学的东西；\n二是教育优惠\n\n有学生邮箱的话，Google One AI Premium 的折扣非常划算，是用上 Gemini Advanced 最省钱的方式。\n另外人家体系强啊，Google drive给2T，还有NotebookLM，Google flow，都需要Gemini一个会员。\n另外谷歌的Gemini CLI，也是很香\n可以跑在终端里，免费，直接处理本地文档和文件——整理笔记、批量重命名、提取信息……非常方便。\n不过我的第一选择都是claude code\n\n06\n\nNotebookLM\n\n很多人低估了 NotebookLM\n我的用法：把原始资料（YouTube，PDF、文章、语音）全扔进去，让它整理成结构化内容。\n当然每个知识库都是相似的内容，比如读书是读书的知识库，亚马逊是亚马逊的知识库。\n它的核心优势是不瞎编，只基于你上传的资料回答，不凭空捏造。\n我去，你能懂这个功能的意义吗？简直好处太强了\n看文献、整理报告、给客户出汇报稿，精准度要求高的场景，用这个稳的一批。\n他的用法实在太多了，有更高级的用法，我也打算在社群中分享下。\n不过notebooklm，你给的数据是精准的，他的回答就是精准的，你要是给你的内容是一坨屎，那对不起，那些资料就会变成屎山。\n\n07\n\nYouMind\n\n说实话，我最开始付费 YouMind，是因为它的手绘风格 Infographic 做得真的好看。\n我公众号很多手绘图就是用它出的，那种手绘质感在一堆 AI 生成图里很出挑。\n除了这个，它还有两个我经常用的功能：YouTube 视频一键转结构化笔记，公众号文章批量收藏整理。做选题调研、分析竞品内容，基本都走这条路——信息量大、整理快。\n不过要诚实说：现在这个工具对我的用处没以前大了。 \n很多它能做的事，我通过 Openclaw、Claude Code、NotebookLM 都能实现，而且往往还更顺手。\n但手绘图这个需求它目前还是我的首选，这块还没找到更好的替代品。\n\n08\n\nGrok\n我用 Grok 主要就一个原因：推特上有一堆 AI 牛人，他们的分析和前沿信息全在上面。\n这些内容散在几百个账号里，你自己刷根本刷不完，也找不全。但 Grok 能帮你做这件事——它能直接访问 X 的实时数据，毕竟是自家产品，限制少，抓取能力比其他模型强不少。\n说说我的实际用法：\n1、追前沿信息\n让它帮你抓某个 AI 话题最近 48 小时内推特上的主要观点，比你自己刷快十倍\n2、找特定账号\n告诉它\"帮我找专门做 Amazon FBA 运营分析的推特账号\"，直接给你筛出来\n3、舆情摸底\n新产品上线前，让它帮你看看这个品类在推特上最近都在聊什么、抱怨什么\n4、追实时事件\n\n某个 AI 发布会刚结束，让 Grok 帮你归纳推特上的核心反应，5 分钟搞定\n所以我的主要场景是在信息的获取上。\n\n09\n\nLovart\n\n跨境里面做图，我现在用Lovart \n他有一个功能让我觉得非常值：图层编辑。\n用法是这样的：\n直接在 Lovart 上用Nao Banana 2 大模型生成产品图或场景图，如果生成的不满意，你在图层上直接做二次编辑\n比如可以再换背景、加文案、调元素位置、改产品细节……\n整个流程下来，出来的图达到可以直接上 listing 的水准。\n\n对做跨境电商的人来说，这个组合解决了一个一直很难搞的问题：\n\nAI 生成的图好看，但不能直接用，还差\"最后一步\"的精修。\nLovart 就是补那最后一步的工具。\n以前这步要开 PS，或者找设计师改。现在自己就能搞定，而且速度快很多。\n\n最后\n\n任何人想要得到好的结果，或者说，你目前的用AI，其实花费是三点：\n1、大模型\n2、token\n3、精准数据\n这一句是这样的，\n\n想要生成好的结果，是需要用适合的大模型（花钱）\n\n而大模型尤其是AI向着Agent方向发展，背后是要消耗token的（花钱）\n\n你要给他赋予技能，比如skills，mcp，才能让他获取到精准数据（花钱）\n\n这三笔加起来，每完成一个任务，都有一个实际的成本在那里。\n\n所以问题来了：你这个人值多少钱？\n\n于是，这就回到我之前写的文章，接下来的职场， 可能会变成这样，\n公司雇一个人的成本，和用 AI 完成同等工作的成本，两个数字放在一起比。\n可怕，接下来的薪资计算方法都变了\n这个逻辑很残酷，但我觉得，这已经是行业里很多人心照不宣的事了。（当然是从产出的效益来比较）\n能不能超过 AI 的成本上限，是接下来每个打工人都要认真面对的问题。", "filename": "小北的梦呓_2026-03-12_每月花 1000 美金用 AI，我总结了一套工具分工.html"}, {"date": "2026-03-27", "title": "万字讲透Claude Code从“能用”到“真好用”的分水岭：Workspace 深度解析", "recommended": false, "content": "很多人都说 Claude Code 好用。\n确实好用\n写代码、改 bug、做文案、拆解视频脚本、批量处理数据、搭网站、写爬虫，它能干的事越来越多，而且干得越来越像那么回事。\n但你有没有发现一个问题？\n你是不是有时候会觉得，他输出总觉得不够稳定，输出质量时好时坏，有时候你明明教过它的东西，下次又忘了。\n问题出在哪？\n这其实不是 Claude Code 能力不行，很多时候是你没有配好它的底层架构。\n真正能把 Claude Code 用好的人，是非常了解它的底层结构 。\n这个东西决定了你用 AI 的工作质量是 30 分还是 90 分——是分水岭级别的差距。\n\n但好像很多人不太注重这个。装上就用，能跑就行。结果呢？AI 的能力发挥了三分之一，剩下三分之二一直在沉睡。\n基于这个，我写了这篇文章，给真正想发挥 Claude Code 全部功能的人看。\n\n这篇文章，应该可以作为你的 Workspace 配置指南了。我会从以下几个方面，全面、系统地做一次深度拆解：\n1、CLAUDE.md -- 整个 Workspace 的大脑，怎么写、写什么、不写什么\n2、 Rules — 当一个 CLAUDE.md 不够用时，怎么拆成模块\n3、 Skills — 给 Claude 装技能包，让它自动触发正确的工作流\n4、 MCP — 给 Claude 一双手，连接搜索、浏览器、数据库等外部能力\n5、 Hooks — 让 Claude 学会条件反射，自动格式化、自动存档、自动拦截\n? Memory — Claude 自己给自己记的工作笔记，跨会话记忆\n\n按照这个内容来配置，你的 Claude Code 能力会有巨大的进展。每一块都是实操，能直接抄作业。\n\n01\n\n先来看整体的全貌\n\n先看全貌：Workspace 到底是什么\n?? 这是什么\n\n你可以把 Workspace 想象成给 Claude 搭了一个\"工位\"。\n一个好工位需要什么？\n桌上放着工作手册（CLAUDE.md），告诉它这个项目的规矩；抽屉里有常用工具（MCP），让它能操作外部服务；\n有一套技能培训资料（Skills），教它怎么高效完成特定任务；有自动化的工作流程（Hooks），该做的事自动做；\n还有一本随手记的笔记本（Memory），上次聊到哪、踩过什么坑，下次打开就能想起来。\n\n这些东西加在一起，就是 Workspace。\n?? 为什么重要\n\n没有 Workspace 配置的 Claude Code，就像一个每天来的新实习生——啥都得从头教。\n你每次新开对话，都得重新解释项目背景、代码规范、测试命令。\n配好了 Workspace 的 Claude Code，就是一个驻场老员工——项目架构门儿清，代码习惯了然于胸，出了问题知道去翻哪个文件。\n这就是同一个工具，用出三成功力和九成功力的区别。\n\n?? 全貌长什么样\n\n具体到文件，一个配好的项目有两套配置：\n项目级配置（在你的项目文件夹里，提交到 Git，团队共享）：\n\n你的项目文件夹/├── CLAUDE.md← 工作手册（最重要的文件）├── .claudeignore←告诉Claude 哪些文件别碰└── .claude/   ├──settings.json← 权限配置   ├── mcp-servers.json        ← 外部工具配置   ├──rules/← 分模块的规则   ├──skills/← 技能包   └──commands/← 自定义命令\n\n全局配置（在你电脑的用户主目录下，个人偏好，所有项目都生效）：\n\n~/.claude/├── CLAUDE.md← 全局手册├── settings.json← 全局权限├── mcp-servers.json           ← 全局工具├── skills/← 全局技能包└── projects/<项目路径>/memory/  ← Claude 自己记的笔记\n\n两套配置的关系很简单：项目级优先。 项目级提交到 Git，团队共享；全局级是你个人偏好，不进 Git。团队规范统一，个人习惯各管各。\n搞清楚全貌了，下面一个一个来。\n\n02\n\nCLAUDE.md怎么设置\n\nCLAUDE.md：整个 Workspace 的大脑，非常重要\n\n你的项目文件夹/├── ??CLAUDE.md←工作手册（最重要的文件）?? 当前在这里├── .claudeignore└── .claude/   ├── settings.json   ├── mcp-servers.json   ├── rules/   ├── skills/   └── commands/\n\n?? 这是什么\n\nCLAUDE.md 是一个 Markdown 文件，放在项目根目录。\n它的作用只有一个：每次你打开 Claude Code，它做的第一件事就是读这个文件。 不管你开多少次新对话，这个文件的内容永远会被加载进去。\n说人话就是——你写在 CLAUDE.md 里的东西，Claude 永远记得。\n?? 为什么重要\n\n你每天重复跟 Claude 解释\"用什么框架\"\"测试命令是什么\"\"代码规范怎么写\"——本质上就是因为没有这个文件。\n把这些信息写进 CLAUDE.md，一劳永逸。\n更关键的是，CLAUDE.md 有个很多人不知道的特性——当对话太长被压缩（/compact）时，CLAUDE.md 会被完整重新注入。 也就是说，写在里面的指令永远不会丢失。这是对话里随口说的指令做不到的。\n所以你最核心的东西，一定要写在 CLAUDE.md 里，而不是靠在对话里反复提醒。\n\n?? 怎么写效果最好\n\n很多人第一反应是把项目 README 贴进去，或者写一大堆\"请写出高质量代码\"。这两种都是典型的错误做法。\nCLAUDE.md 要短、要具体、要能直接执行。 官方建议 200 行以内，我的经验是越短越好——短到每一行都有用。\n你就想象：一个高级工程师入职第一天，你给他看一份文档，他看完就能开始干活。那份文档应该写什么？\n第一，构建和测试命令\n\n这是最实用的——Claude 改完代码想验证，得知道命令是什么。npm run dev 启动开发服务器，npm run test 跑测试，npm run build 做生产构建。一行一个，清清楚楚。\n第二，目录结构\n不用写很细，写清楚\"去哪找什么\"就够了。比如 src/app/ 是页面和 API 路由，src/components/ 是 UI 组件，prisma/ 是数据库相关的。Claude 知道了目录结构，改代码时就不会找错地方。\n第三，代码规范\n\n你团队的约定——命名规则、组件写法、函数风格——Claude 不知道，你不告诉它就不知道。写下来，它就会遵守。\n第四，禁止操作\n\n不能删的文件、不能动的配置、不能用的依赖。这个非常重要——Claude 有时候\"手快\"，你不拦它就干了。\n比如\"不动 prisma/schema.prisma 除非我明确要求\"、\"不碰 .env 文件\"，写进去就是硬规则。\n\n反过来，以下东西不该写进去：\n?  大段项目背景故事 — Claude 不需要知道你为什么做这个项目\n?  完整的 API 文档 — 太长了，用 @ 引用外部文件就行\n? 空洞的通用原则 — \"请写出高质量代码\"等于没说\n? 跟当前项目无关的个人偏好 — 那个放全局 CLAUDE.md 里\n\n核心原则：每一行都要有指导价值。如果 Claude 读了这一行之后行为没有任何变化，就删掉。\n\n?? 进阶用法：多份 CLAUDE.md + 引用外部文件\n\nCLAUDE.md 不只能写一份。你可以在不同的文件夹下放不同的 CLAUDE.md，Claude 进到哪个文件夹，就自动读哪份规则。\n举个例子：你有个项目，写公众号文章和做数据分析是两套完全不同的工作流。\n你可以在\"文章\"文件夹下放一份 CLAUDE.md 写排版规范，在\"数据\"文件夹下放另一份写分析流程。Claude 自己知道该用哪套，不用你切换。\n另外，如果有些内容太长，不适合全塞进 CLAUDE.md 里（比如一份详细的操作手册、一个完整的风格指南），可以用 @ 符号引用外部文件。Claude 需要的时候会自动去读，你不用每次都复制粘贴一大段进去。\n\n03\n\nRules怎么设置\n\n当你的项目变大——前端、后端、测试、部署各有各的规范——全塞在一个 CLAUDE.md 里就太臃肿了。\n.claude/rules/ 文件夹就是用来解决这个问题的。\n你可以把不同领域的规范拆成独立的文件，每个文件管一块事。比如 code-style.md 管代码风格，testing.md 管测试规范，react.md 管 React 组件写法。\n说白了，CLAUDE.md 是通用员工手册，rules 是各岗位的专项手册。\n\n你的项目文件夹/├── CLAUDE.md├── .claudeignore└── .claude/   ├── settings.json   ├── mcp-servers.json   ├──??rules/←分模块的规则?? 当前在这里   ├── skills/   └── commands/\n\n?? 为什么重要\n\n最大的价值不是拆分本身，而是 rules 文件支持路径匹配。\n什么意思？你可以在 rules 文件顶部指定一个路径规则，比如 paths: \"src/components/**/*.tsx\"。\n这样 Claude 只有在操作 React 组件文件时，才会加载这条规则；操作后端代码时，这条规则根本不出现。\n这解决了一个核心问题——上下文空间是有限的，每条规则都占空间。 路径匹配让规则按需加载，不浪费宝贵的上下文。你可以写几十条规则，但 Claude 在任何时刻只加载跟当前工作相关的那几条。\n\n?? 怎么用效果最好\n\n关键就两点：\n第一，每个 rules 文件只管一件事\n\n 不要在一个文件里又写代码风格又写测试规范。拆细了，路径匹配才精准。\n第二，路径匹配用好了是杀手锏\n\n 在 rules 文件顶部加 YAML frontmatter，用 paths 字段指定生效范围。语法跟 .gitignore 一样\n\n**/*.ts 匹配所有 TS 文件，src/components/** 匹配 components 目录下的所有文件。\n比如你可以写一个 react.md ， \n顶部加上 paths: \"src/components/**/*.tsx\" ，里面写\"所有组件必须有 Props 类型定义\"、\"样式用 Tailwind 不写内联 style\"。\n Claude 只在碰到 React 组件时才看这些规则，非常精准。\n\n03\n\nSkills：给 Claude 装技能包\n\n如果说 CLAUDE.md 是\"员工手册\"，Skills 就是\"岗位技能培训教材\"。\n你可以把 Skill 想象成一个工作交接 SOP 大礼包——把某项工作的执行方法、该注意什么、参考模板、常见错误全打包在一起。Claude 装上这个包，就知道怎么干这件事了。\n比如 Anthropic 官方自带的 PDF Skill，教 Claude 怎么处理 PDF——提取文本、合并拆分、填表单。\n\n你说\"帮我把这三个 PDF 合成一个\"，Claude 自动识别出该用 PDF Skill，按照 Skill 里写的步骤执行。\n非技术人员完全可以做 Skill。\n\n 一个 Skill 最核心的就是一个叫 SKILL.md 的文件，纯自然语言写成，不需要写代码。\nAnthropic 官方的 brand-guidelines Skill，里面就只有品牌颜色、字体规范这些文字信息。但 Claude 装上之后，做设计就会自动遵循这些规范。\n\n你的项目文件夹/├── CLAUDE.md├── .claudeignore└── .claude/   ├── settings.json   ├── mcp-servers.json   ├── rules/   ├──??skills/←技能包?? 当前在这里   └── commands/\n\n?? 为什么重要\n\nSkill 和普通命令最大的区别是——它能自动触发。\n你不用记任何命令名。你说\"帮我做个产品介绍的 PPT\"，Claude 自动识别出应该用 PPT Skill；你说\"review 一下这段代码\"，Claude 自动触发代码审查 Skill。\n这靠的是 SKILL.md 顶部的 description 字段。\nClaude 读到你的请求后，会拿你的话跟所有 Skill 的 description 做匹配。匹配上了就自动加载并执行，匹配不上就忽略。\n所以 description 怎么写，直接决定了 Skill 好不好用。 这是 Anthropic 官方 33 页指南里反复强调的\ndescription 要写\"什么时候该用\"，不要写\"我是什么\"。\n? \"这是一个代码审查 Skill\"\n?\"当用户要求 review 代码、检查代码质量、或者提交前审查时使用\"\n\n前者是自我介绍，Claude 不知道什么时候该用；后者是触发条件，Claude 一看就能匹配。\n\n?? 怎么用效果最好\n\n第一，不用担心装多了撑爆上下文。\n很多人会想：装了一堆 Skill，上下文不就满了吗？不会。因为 Skill 有个聪明的设计叫渐进式披露——三层信息，按需加载：\n第一层，只有 name 和 description，几行字而已，永远加载在上下文里，用来判断要不要触发。第二层是 SKILL.md 正文，只有匹配成功才会加载进来。第三层是 scripts、references、assets 目录里的文件，Claude 执行过程中需要的时候才去读取。\n所以你可以同时装 20-50 个 Skill，日常只有 description 占一点点空间。官方数据是：所有 Skill 的 description 加起来，上下文预算大概是窗口的 2%。\n第二，Skill 里面最有价值的部分不是\"做什么\"，而是\"别做什么\"。\n你或团队踩过的坑——某个 API 的怪异行为、某个库的已知 bug、某个配置的易错点——全写进 SKILL.md 的\"踩过的坑\"章节。Claude 会读这些警告并在执行时主动规避。\n这比写十遍\"正确步骤\"都有用。因为 Claude 不缺执行能力，它缺的是\"知道哪里有坑\"。你把坑的位置标出来，它就不会踩。\n\n04\n\n怎么从零做出一个自己的 Skill\n\n这是很多人最想知道的部分。其实做一个 Skill 比你想象的简单得多——核心就是写一份工作文档。\n第一步：想清楚你要封装什么。\n回顾一下你日常的工作流，哪些操作是重复的？每次都要跟 Claude 解释一遍的？那就是最适合做成 Skill 的东西。\n比如：每次创建一个新的 API 接口，你都要跟 Claude 说\"在 src/app/api/ 下建文件、定义类型、加参数校验、写测试\"。这个流程固定了，就可以封装成 Skill。\n\n比如：每次做代码 review，你都要提醒 Claude \"检查错误处理、看类型有没有 any、确认测试覆盖率\"。这个清单也可以封装。\n不一定是技术操作。 你每次写公众号文章的排版流程、每次做竞品分析的步骤、每次整理客户反馈的方法——只要是可以标准化的工作流，都能做成 Skill。\n第二步：建一个文件夹\n在 .claude/skills/（项目级）或 ~/.claude/skills/（全局）下面，建一个文件夹。名字用小写 + 连字符，比如 create-api-route、review-code、write-article。\n文件夹里只需要一个文件：SKILL.md。这个名字是固定的，不能改。\n第三步：写 SKILL.md\n这是最关键的一步。SKILL.md 由两部分组成：顶部的 YAML frontmatter 和下面的正文。\n顶部 frontmatter 决定了\"什么时候触发\"：\n1、name — 你的 Skill 名字\n2、description（最重要）— Claude 靠它判断要不要自动触发。写\"什么时候该用\"而不是\"我是什么\"\n3、allowed-tools（可选）— 限制 Skill 可使用的工具，比如只读分析限制为 Read、Grep、Glob，防止误操作\n4、disable-model-invocation（可选）— 设为 true 表示只能手动触发，适合部署、发布等有副作用的 Skill\n\n正文就是你的工作流文档，推荐分三个章节：\n\n执行步骤 — 按顺序列出具体要做什么，每一步尽量具体。不要写\"创建必要的文件\"，要写\"在 xx 目录下创建 xx 文件\"\n踩过的坑 — 把你和团队踩过的坑写进去。前面讲过了，这是整个 Skill 里最有价值的部分\n模板/参考（可选）— 如果有标准模板，放在 assets/ 目录下，正文里指向它\n\n第四步：测试和迭代\n\nSkill 写好了，试用几次。看看 Claude 触发的时机对不对（不对就调 description）、执行步骤有没有遗漏（有就补）、有没有新的坑需要记录（有就加）。\n\n好的 Skill 不是一次写完的，是用出来的。用几次之后你就知道哪里需要补充、哪里写多了可以删。\n\n第五步：决定放哪里\n如果这个 Skill 是通用的（比如代码 review、文章排版），放在全局 ~/.claude/skills/ 下，所有项目都能用。\n如果是项目专属的（比如特定 API 的创建流程），放在项目的 .claude/skills/ 下，提交到 Git，团队共享。\n\n05\n\n实战案例\n\n在这这里，小北我用一个非技术的例子来串一遍，更容易理解。\n假设你每次让 Claude 帮你排版公众号文章，都要重复说一堆要求：\n\"标题用 H2 加粗\"、\n\"不要用 markdown 表格，用灰色方框\"、\n\"结尾加金句引用块\"、\n\"关键句加粗但别全篇都粗\"……\n\n烦不烦？烦。那就做成 Skill。\n建一个文件夹wechat-format，里面放一个 SKILL.md。\n顶部 frontmatter 写触发条件：description 写\"当用户要求排版公众号文章、微信文章格式化、或者说'帮我排版'时使用\"。\n这样你以后只要说\"帮我排版一下\"，Claude 就自动触发。\n正文写你的排版规范：H2 标题纯黑加粗、H3 深蓝加粗、每节只有 1-2 句粗体、不用 markdown 表格改用灰色 section 框、结尾用引用块加金句……把你平时反复交代的那些要求全写进去。\n加一个\"常见错误\"章节：比如\"不要在正文里给关键词上色\"、\"代码块和灰色框不能混用\"、\"禁止用 <div> 包裹全文设字号\"。这些是你踩过的坑，写进去 Claude 就不会再犯。\n\n从今往后，你说\"帮我排版一下\"，Claude 自动按照你的标准执行，不用再重复交代。你省的不是一次的时间，是以后每一次的时间。\n这个思路放到任何场景都一样，做竞品分析、整理客户反馈、写周报、做数据报告——只要是你反复做的事，都能用同样的方式封装成 Skill。\n\n?? 值得装的现成 Skill\n\n不想自己做也没关系，很多现成的 Skill 可以直接装。\nClaude Code 自带五个 Skill，装完就能用。其中 /simplify 是三路并行代码审查（复用性、质量、效率三个维度同时跑），/batch 是并行处理（把任务拆成多个单元同时执行），/loop 是定时巡检（比如每 5 分钟检查一次部署状态）。\n第三方 Skill 优先装这几个\n\nSkill Vetter （安全必装，防止恶意 Skill 投毒，装了之后 Claude 会自动检测你安装的每个 Skill 有没有藏恶意代码，地址：\nhttps://clawhub.ai/spclaudehome/skill-vetter 、 \nagent-browser （让 Claude 能自动操作浏览器）、 \nsummarize （长内容一键压缩摘要）、\n find-skills （搜索 Skill 生态，发现更多好用的 Skill）。\n\n安装就一行命令，比如 \n\nnpx skills add vercel-labs/agent-browser@agent-browser -g -y。\n加 -g 表示装到全局，所有项目都能用。\n项目专属的 Skill 就放在 .claude/skills/ 下，提交到 Git。\n\n06\n\nMCP怎么配置\n\nMCP 全称 Model Context Protocol，翻译过来就是\"模型上下文协议\"。\n听着很技术对吧？\n说人话：MCP 就是一个标准化的插件接口。 每个 MCP 插件提供一组工具，Claude 按需调用。\n装了搜索的 MCP，Claude 就能上网搜东西；装了浏览器的 MCP，Claude 就能操作网页；装了飞书的 MCP，Claude 就能直接读写你的飞书文档。\n没有 MCP 的 Claude，只能在你的代码文件里干活。有了 MCP 的 Claude，能伸手到外面的世界\n这就是为什么我说它是\"给 Claude 一双手\"。\n\n你的项目文件夹/├── CLAUDE.md├── .claudeignore└── .claude/   ├── settings.json   ├── ?? mcp-servers.json      ← 外部工具配置 ?? 当前在这里   ├── rules/   ├── skills/   └── commands/\n\n?? 为什么重要\n\nCLAUDE.md 告诉 Claude 怎么思考，Skills 告诉它按什么流程干活，MCP 解决的是\"能不能做\"的问题。\n没有 MCP，Claude 遇到需要搜索的场景只能跟你说\"我没法联网\"；有了搜索 MCP，它自己就能去查。\n没有 MCP，Claude 想帮你操作飞书只能给你一段代码让你自己跑；有了飞书 MCP，它直接帮你操作完。\n这是从\"助手\"到\"代理人\"的关键一步。\n但这里有个很重要的注意事项——每个 MCP 插件会吃掉 10-20K tokens 的上下文空间。 \nClaude Code 总共 200K 的上下文窗口，系统占 15-20K，CLAUDE.md 和 Memory 占 5-10K。\n装五六个 MCP，光工具描述可能吃掉 60-80K——三分之一没了。\n所以原则是：用什么装什么，不用的及时删。\n别贪多。\n\n?? 怎么用效果最好\n\n选哪些 MCP 装，按四层来想就清楚了。每层选 1-2 个够用：\n第一层：搜索 — 让 Claude 能上网查资料\n\n推荐 Tavily（专为 AI Agent 设计，每月 2000 次免费）或 Open-WebSearch（完全免费，不需要 API Key）\n\n第二层：阅读 — 让 Claude 能读网页内容\n推荐 Jina Reader（URL 前加前缀即可转 Markdown）或 Agent-Reach（支持微信/YouTube/小红书等多平台）\n\n第三层：浏览器操控 — 让 Claude 能像人一样操作网页\n推荐 Playwright MCP（微软官方）。大部分人不需要这层，有自动化测试需求再装\n\n第四层：数据采集 — 让 Claude 能批量抓取数据\n推荐 Apify，15000+ 现成爬虫，Instagram、TikTok、YouTube 都有。做跨境电商的话这层很有用\n\n大部分人装第一层 + 第二层就够日常用了。安装就一行命令：\n\nclaude mcp add tavily npx @anthropic-ai/mcp-server-tavily，加 --global 装到全局。\n\n MCP 和 Skills 的关系\n\n这个很多人搞混，但其实很简单：\nMCP 解决\"能不能做\"，Skills 解决\"做得好不好\"。\n只装 MCP 不写 Skill，Claude 能调工具但不知道正确的工作流程。比如你装了飞书 MCP，Claude 确实能操作飞书了。\n但如果你再写一个 Skill 告诉它\"查多维表格要先 list tables → 再 list fields → 最后 search records，每次最多查 500 行\"——出来的效果完全不一样。\n前者经常出错，后者稳定输出。\nMCP + Skill 配合，才是稳定输出的关键。\n\n07\n\nHook怎么配置\n\nHooks 是 Workspace 里最被低估的功能。\n它的本质非常简单：在 Claude 执行特定操作的前后，自动触发你预设的动作。\n类比一下就懂了——你跟员工说\"每次改完代码，自动跑一下格式化工具\"、\"每次要删文件之前，先确认一下是不是在删重要的东西\"。这就是 Hook 在做的事。\n\n你的项目文件夹/├── CLAUDE.md├── .claudeignore└── .claude/   ├──??settings.json←权限+Hooks配置?? 当前在这里   ├── mcp-servers.json   ├── rules/   ├── skills/   └── commands/\n\n?? 为什么重要\n\n没有 Hooks 的时候，很多事要么靠你手动去做，要么靠你在 CLAUDE.md 里反复叮嘱（而且 Claude 不一定每次都记得执行）。\n有了 Hooks，这些事变成了强制自动执行——不是 Claude \"应该做\"，而是\"一定会做\"。\n比如你想让 Claude 每次改完代码都跑格式化，写进 CLAUDE.md 只是个\"建议\"，Claude 有时会忘。但写成 Hook，就是硬性的、100% 触发的自动流程。\n更厉害的是 PreToolUse Hook，它可以在 Claude 执行操作之前先做检查。\n如果检查不通过（脚本返回 exit code 2），操作直接被阻断。\n相当于给 Claude 装了一道安全门：要删 .env 文件？拦住。\n要 rm -rf？拦住。要改数据库配置？拦住。\n\n?? 怎么用效果最好\n\nHooks 配置写在 settings.json 里。能挂载的事件有 17 个，覆盖了从会话开始到结束的完整生命周期。\n但日常最实用的就两个：PostToolUse（工具调用后自动执行）和 PreToolUse（工具调用前做检查/拦截）。\n最推荐的第一个 Hook：自动 Git 存档。 \n配上之后，Claude 每做一步操作（改文件、跑命令），都会自动 commit 一个 checkpoint。\n出了问题 git log 一查，每一步干了什么清清楚楚，随时回滚到任意一步。我去，真的是那种用完之后想问自己以前怎么活过来的。\n 第二个推荐：自动格式化。 \nClaude 每次用 Edit 或 Write 改完文件，自动执行你的 Prettier / ESLint 脚本。\n好处是 Claude 不用浪费 token 去调格式化命令，格式 100% 符合你的配置。 \n第三个推荐：拦截危险操作。\n 在 PreToolUse 上挂一个检查脚本，检查 Claude 是不是在动 .env、是不是执行 rm -rf、是不是要改关键配置文件。检查不通过就阻断。\n\n另外，Hooks 不只能跑 shell 命令，官方支持四种类型：command（执行命令，最常用）、\nhttp（发请求通知外部系统，比如往 Slack 发消息）、prompt（用轻量模型做快速判断）、\nagent（启动子 Agent 处理复杂检查）。大部分场景用 command 就够了。\n\n08\n\n关于Memory\n\n其实Memory是不用自己配置的，它是 Claude 在工作过程中自己记下来的笔记。\n你跟 Claude 调试了半天终于解决了一个 bug，Claude 会把这个调试经验记下来。\n你纠正了 Claude 的某个习惯（\"别用 any，要定义类型\"），Claude 也会记下来。这些笔记存在 ~/.claude/projects/<项目路径>/memory/ 目录下。\n\n~/.claude/├── CLAUDE.md├── settings.json├── mcp-servers.json├── skills/└── projects/<项目路径>/   └──??memory/←Claude自己记的笔记?? 当前在这里\n\n?? 为什么重要\n\n以前每次关掉终端，记忆就清零了。下次打开，Claude 对之前的对话一无所知。\n现在有了 Auto Memory，Claude 会自动记住：项目怎么构建、调试时踩了什么坑、你的编码偏好、哪个文件是干什么的。下次新开对话，它直接回忆上次的进度。\n这意味着 Claude 会越用越顺手。 它记住了你的习惯，记住了项目的坑，不需要你反复教。\n启动时 Claude 会加载 MEMORY.md 的前 200 行（约 25KB），其他主题文件按需读取。常用记忆随时在线，又不吃太多上下文。而且 Memory 不进 Git，按项目隔离，是你个人的。\n\n?? 怎么用效果最好\n\n搞清楚 CLAUDE.md 和 Memory 的分工。 一句话：CLAUDE.md 管\"应该怎么做\"（规则和约定），Memory 管\"上次做了什么\"（经验和模式）。\n1、CLAUDE.md：你写的 → 规则和约定 → 进 Git 团队共享 → 手动维护\n2、Memory：Claude 自己记的 → 经验和模式 → 不进 Git 仅个人 → 自动维护\n\n两者配合使用效果最好。你负责定规矩，Claude 负责记经验。如果想查看或编辑 Memory，用 /memory 命令。\n\n 它会列出所有加载的 CLAUDE.md 和 Memory 文件，你可以编辑内容、开关某个文件。\n如果在 CI 环境不需要 Memory，设环境变量：\nCLAUDE_CODE_DISABLE_AUTO_MEMORY=1 就行。\n\n最后说一句。\n这些东西不用一次全配完。先把 CLAUDE.md 写好，把最核心的规范写进去\n光这一步，体验就会有质的变化。\n然后 Skills 从封装你自己的重复工作流开始，MCP 按需加搜索和阅读，Hooks 配一个自动 Git 存档。一周之内你就能感受到那个\"对了\"的感觉。\n关键不是你装了多少东西，而是你有没有把自己的工作方式\"教给\" Claude。 \n教得越清楚，它干得越好。\n工具不怕强，怕你不会调。调好了，它就是你的人。", "filename": "小北的梦呓_2026-03-27_万字讲透Claude Code从“能用“到“真好用“的分水岭：Workspace 深度解析.html"}, {"date": "2026-04-28", "title": "带货短视频素材，我实现了自动化了", "recommended": false, "content": "最近跨境的流程，借助AI，又迭代了，从发现优秀的内容，到自动归集，提取视频素材，文字，到归类，到数据分析，\n全部自动化\n直接看结果啊，整个流程是这样的\n\n第一阶段：素材自动入库\n\n平常拿着手机，吃饭的时候、坐车的时候，只要刷到一条好的 TikTok、YouTube 内容，或者看到一条竞品素材，我不需要马上打开电脑整理。\n我只要把链接丢给 AI，然后说两个字：\n入库。\n后面的事情，AI 自动接住。\n它会把 TikTok、YouTube 里的文字、视频、图片等素材全部抓下来。如果是视频内容，会自动转文字，同时按关键帧自动截图。素材文件也会自动上传到阿里云端，这样本地不会乱，后面链接失效也不怕。\n所以从人的角度看，这件事变得非常轻：\n我只负责在刷内容的时候做一个判断：这个素材不错，值得入库。\n剩下下载、提取、截图、归档、上传，全都交给 AI。\n\n第二阶段：入库之后，关键是自动拆解\n很多人做素材库，最后会变成一个垃圾堆：链接很多，截图很多，视频很多，但真正要用的时候，还是不知道该找什么。\n所以我现在做的不是简单收藏，而是让 AI 按 Karpathy 那套知识库思路，把内容自动分解。\n\n一条素材进来以后，它会被拆成很多可复用的元素：\n痛点是什么\n\n场景是什么\n\n功效是什么\n\n激励点是什么\n\n开头钩子是什么\n\n镜头结构是什么\n\n有哪些相似元素可以复用\n\n适合什么产品、什么人群、什么内容方向\n\n这些内容源源不断进入飞书，而且这些东西不是靠我一条条手填，因为借助飞书lark-cli功能，可以自动对入库的内容，AI自动整理成多维表，  \n\n这些爆款素材的搜集和整理，现在全部AI都可以做到  \n第三阶段：数据自动分析\n还有内容入库之后，再用apfiy的接口，就能抓取我们在tiktok上的数据表现\n然后Ai根据我们的数据，自动分析出爆款素材，这样可以及时调整我们的素材制作方向\n\n这个流程，至少省了2个人有，因为平常我们拿着手机是最多的，大家不要小看手刷，这个是最有质量的归集\n\n这套下来多少钱？\n\n我走的是订阅的模式，不是API，所以都是按月付费，所以成本是可控的，固定的。\n\n目前我订阅了claude code和ChatGPT\n\n现在用GPT5.5，处理这些问题，根本不在话下，质量非常高。这套我至少跑了3个月了（之前都是用claude code），\n\n目测销量质量非常高，比手工操作，强太多了，优联荟的同学，都知道这一套，他们应该都用在他们的工作里了\n\n01\n\n我感觉很多人跑偏了\n\n我最近有一个很强的感觉。\n很多人搞 AI，搞着搞着，好像味道变了\n今天装 OpenClaw，明天装 Hermes，后天研究 Skills，再后天搞 memory、heartbeat、sub agents、MCP。\n一套东西配下来，电脑像开了个小公司。\n当你在配置文件、运行日志、自动回复，心里会冒出一种很真实的感觉：\n我好像正在进步。\n但问题就在这里。\n很多人的 AI 进步感，不是来自结果，而是来自配置感。\n这个东西很危险，因为它太像进步了。\n你确实学了很多。\n收藏夹里多了十几个教程，群里多了几个 AI 大佬，电脑里多了几套配置。\n但到了晚上，电脑一关，你突然发现：\n自己好像还是没有真正闲下来，这种方法非常危险??\n\n02\n\n用好AI，判断标准只有一个\n\nAI 应该先接管你每天重复做的笨活，而不是先帮你搭一套漂亮的工作流。这句话很狠。\n一个 AI 工作流好不好，不看它用了多少工具、多少节点、是不是全自动。\n只看一件事：\n你今天还在用吗？\n如果今天不用，明天不用，下周也不用，只在刚搭好的两天兴奋了一下，那它就是失败的。\n反过来，一个很土的流程，如果每天都在替你省时间，就是好流程。\n比如做内容，AI 能从素材库里抽选题；做活动，AI 能从旧文案库、海报库、话术库里抽参考；研究竞品，AI 能把卖点、价格、评论整理成表\n上面我介绍的方法，就是我天天在用的，效果，我每次看完真的出去交流，都觉得我自己很不错。\n（抱歉了）\n\n03\n\n先从最多的重复事项开始\n\n其实很多人AI学一堆，但是就是没有实质性的进步，我觉得如果连最烦、最重复、最不想做的那件事都没列出来，就开始研究“公司组织架构”，这根本就是本末倒置\n真正的顺序应该反过来：先找一件笨活。不是十件，就是一件。\n这件事跑通了，再谈系统。\n哪怕把公司的SOP，先落地，其实也是在实践AI的内容。\n我真的发现，如果公司有sop，效果实在太好了，AI时代真的就能做到快人一步\n很危险\n有SOP的公司\n首先业务逻辑是清晰的\n业务员的表达是体系的\n和AI交互是明确的\n\n所以，我觉得什么都是一点一滴的构建\n\n不要连很多基础都没做，就开始谈宏大的叙事，而且AI时代，拼的是对业务的理解，现在大模型很厉害了，基本你能有清晰的业务逻辑，他都可以帮你实现出来。\n\n对了，剪辑的自动化，我一直在测试，目前来看也要成型了（我一般都是测试几个月再拿出来）\n\n敬请期待！", "filename": "小北的梦呓_2026-04-28_带货短视频素材，我实现了自动化了.html"}, {"date": "2026-04-11", "title": "从现在开始，跨境做全域流量", "recommended": false, "content": "其实全域流量，我讲了很多年了，我自己本来就做独立站的，所以有更深的感触\n\n只不过，在当下，感觉越来越重要了。\n\n跨境电商确实现在变天了，一方面AI在效率上有了大幅度的提升，另外一方面，越来越多卖家要做全域流量\n\n所以不做全域流量，真不够用啊。\n\n主要有几点：\n\n一方面，流量费越来越贵\n\n很多人跟我吐槽，现在随便开个广告，一个点击1美金的情况到处都是，光靠烧钱换订单真的越来越顶不住。\n\n第二，跨境一定会重复国内的老路\n\n你看现在国内，单纯做淘宝天猫有多难生存？大家都是满世界跑到小红书、抖音去搞内容，搞私域。\n\n亚马逊可能会好一点，但这个大趋势它是不会变。\n\n本质上大家都是在对抗买量越来越贵的危机，想尽办法去吃透这些新渠道跨平台叠加产生的，流量“溢出效应”。\n\n现在搞跨境早就不像当年我们在亚马逊上单纯打个广告那么简单了，订单就哗啦啦的来了\n\n越来越多的人通过TikTok上搞一波红人流量，然后再到亚马逊成交的。\n\n反过来也是一样，亚马逊本身巨大的搜索流量和信任背书，最终也会影响你在独立站和TikTok的转化率增长。\n\n01\n\n流量溢出效应\n\n全域运营的底层逻辑之一，就是不同平台间的流量互串。\n1. TikTok → 亚马逊\nTikTok 上刷到一个产品视频，用户第一反应是什么？去亚马逊搜一下。\n\n因为亚马逊解决了信任度的问题\nTikTok 前端种草带来的真实增量销售中，约有高达 62% 会实际溢出到 Amazon 等外媒搜索渠道，只有小部分会沉淀在挂载的独立站。\n\n这意味着，你的 TikTok 即使表面转化率一般，它的内容爆发本身就在成倍地放大你亚马逊原有的 Search 流量盘。\n2. 红人种草的“矩阵脉冲”与 10% 利润返还\n这就是全域里最“杠杆”的一环。\n行业标杆Anker（安克），很多人以为他只靠亚马逊站内起家。但他每个月那几百万的独立站流量怎么来的？\n都是靠前期在YouTube上死磕各类博主的测评开箱，在Reddit这些极其硬核的垂直论坛里，和一群极客用户真枪实弹地互动出来的。\n最后这些红人发声，源源不断地给独立站和亚马逊输送了意向极高的精准买家。\n\n但数据显示，Anker 独立站高达 41% 的流量是“直接流量”（Direct），29% 是自然搜索。\n红人的曝光带来了信任和销量，最终心智完全反哺给了独立站池子。\nTips：\n在找红人合作时，千万记得在亚马逊后台生成 Amazon Attribution（亚马逊引流洞察） 追踪链接。\n如果你是品牌备案卖家，通过“品牌引流奖励计划（BRB）”，你能额外获得这笔站外销量 平均 10% 的金额返还 ，直接抵扣佣金。很\n多卖家嫌麻烦没搞，等于白白丢了 10% 的净利。\n\n02\n\n具体怎么玩？\n\n从包裹发出那一刻起，全域营销才刚刚开始。我最最近一年都在了解\n第一步：以售后卡片为“诱饵”\n绝对不要只印一个冷冰冰的“Give me 5 star”。实战转化率最高的玩法是：\n二码合一：这个挺有意思的，就是深圳有一家服务商，和亚马逊合作，居然可以做到二码合一\n这个码卖家可以用任意的软件扫描，不需要跳转到独立站，直接在亚马逊站内，\n可以实现售后服务、粉丝激活、粉丝互动、粉丝沉淀、新品促销等多种营销目的，\n流程是这样的\n\n这个方法挺牛逼的，和我们接下来说的第二种方法完全不同。\n\n第二步：站外放量 \n千万不要把 TikTok 或 Facebook 广告的流量直接导入亚马逊！\n羊毛党太多了，点进不买，会瞬间把你的 Listing 转化率拉跨，排名暴跌。\n正确的实战做法是搭建一个中间着陆页：提供 30%-50% 的高额折扣，但条件是必须输入邮箱换取一次性折扣码。\n百亿大卖 Aosom（遨森），就是这样做的，在亚马逊做销量的同时，通过类似的精美引流卡操作，硬生生把独立站做到了百万级用户规模。\n大家可以去研究下他的策略\n\n这个动作会极其精准地过滤掉无购买意向的劣质流量。\n拿着折扣码去亚马逊下单的，转化率甚至可飙升至 20% 以上，瞬间带来的销量异动会强行把你的 BSR 排名拉进核心词的首页前三！\n活动结束后一周，再对这些已经享受了高折扣的邮箱发跟进邮件索评，留评率惊人，且完全符合亚马逊规范。\n第三步：独立站上接入Buy with Prime\n如果你担心独立站前期没有信任背书无法转化，可以在独立站接入 “Buy with Prime” 按钮。\n客户在你的独立站看中商品，点击后调用大平台的物流履约。既获取了客户访问数据，又大幅降低了下单信任门槛。\n\n报告显示，有的品牌采用了这套双轨机制，独立站转化率在短时间内激增了 40%。\n\n03\n\n动态定价\n\n还有，保持利润最重要，但是我们经常做营销，折扣什么的，我们也的有一套方法来保住利润：\n我直接给答案啊：\n最优折扣深度 = (类目平均秒杀转化率 / 你的产品转化率) × 市场基准折扣\n举个实操例子：\n你们类目的平均转化率假设是 8%，但你的产品质量硬、Review好，自然转化率能达到 12%。\n竞品此时给出了 20% Off 的折扣。你真的也要打八折吗？\n不需要。\n\n根据公式，只需要(8 / 12) × 20% = 13.3%。\n所以，你只需要放出 13-14% 的折扣，就能抢到和竞品一样的转化效果。\n这意味着你在流量最高峰的节点，不声不响地比对手多保住了 将近 7% 的净利润！\n为什么这样设计？\n因为折扣的本质是\"用利润换转化率\"。\n你的产品本身转化率就高于类目平均，说明消费者已经用钱包投了信任票，你天然不需要和弱于你的竞品打一样的价格战。\n同样效果，更浅折扣，多出来的就是纯利。\n\n所以，做全域，也不是随便乱折扣，不然热闹个寂寞。\n\n04\n\n关键\n\n现在做tk，搞网红，导入亚马逊大家都懂，但是绝大多数还是卖货思维，但是大家想想看，现在tk比较好做，你网红比较好联系，但是依然没有价值最大化\n（这两年好多人靠tk网红对接赚了大钱）\n大卖跑到站外做网红、抢流量，他图的绝对不仅仅是简单地多卖两个杯子或几件衣服。\n他们图的是高溢和私域资产。\n有了这批人，你发新品测款不需要求着服务商，发封邮件就能清库存；一个原本买完就走的客户，被你运营成了复购十次的铁粉。\n\n当你能在前端用社交媒体当流量收割机，用亚马逊当现金牛转化器，再用私域把一次性客户变成复购用户，这三件事叠加在一起，就形成了一个飞轮：\n新流量 → 成交 → 沉淀私域 → 低成本复购 → 利润反哺投放 → 更多新流量\n所以全域运营的本质不是多开几个渠道，而是让每一滴流量都流转起来、沉淀下来、复利增长。\n渠道谁都能开，广告谁都能投，但能把流量变成资产的，才是最终的赢家。\n\n最后，一定要提价，大胆提价，别把自己的产品当废品卖。\n但你看看大多数跨境卖家的定价策略：成本×2、对标竞品再压5块、打折促销冲排名……\n\n本质上是在用白牌的逻辑卖品牌货。\n\n如果你已经在多个渠道有品牌曝光，大胆测试提价10%-15%。\n\n大多数卖家怕提价掉排名，但全域流量下，你的站外曝光在持续给站内搜索量输血，提价对流量的冲击远比你想象的小。\n\n提价后配合Coupon而不是直接降价，维持List Price的高位，既保住了品牌调性，又不影响转化。\n\n当然也要定期监控提价前后BSR变化，如果排名波动在10%以内，说明你的品牌已经有溢价支撑力了。\n\n以上！", "filename": "小北的梦呓_2026-04-11_从现在开始，跨境做全域流量.html"}, {"date": "2025-08-08", "title": "0 库存、全自动化，月入10w刀，真不错", "recommended": false, "content": "昨天在 YouTube 上刷到一个做 Etsy 的哥们，\n分享自己靠 Print-on-Demand 模式，前 6 个月一分钱没赚到，第 7 个月直接突破 10 万美元的经历。\n\n全程干货满满，整理出来给想入局的朋友参考 \n\n— 1 —\n选对工具，打好地基\n\n想要在etsy上做好生意，核心就三点，「流量、产品、设计」，\n这哥们，他的解决方案很简单：\n流量哪里来？\n\n主攻 Etsy 平台。自带流量池，不用从零开始砸钱引流，对新手特别友好。\n产品哪里来？\n全靠 Printify 一件代发。生产、发货全外包，自己只负责设计和上架，真正实现 0 库存、低风险。\n图哪里来？\n设计工具用 Canva（小白也能快速上手）和 Figma（进阶玩家首选），出图效率拉满，不用等设计师排期。\n\n— 2 —\n自动化 + 高效化\n\n第二步的核心是：自动化 + 高效化，解放双手搞批量\n他用了以下一些工具，我整理给大家\n\n1?? 批量设计\n\n一次出5-10款同主题设计，不是想到什么做什么。\n\n灵感哪里来？模仿成功店铺、ChatGPT 生成创意，自己做些变体。\n\n建立自己的模板库，比如某种风格+字体+配色，反复用，做得快还统一风格。\n\n2?? 批量上传\n\n用 Pre-list，一键把设计图和信息同步到 Etsy 和 Printify。\n\n这样不用一天点几十次鼠标，几分钟几十个产品就上线了。\n\n3?? 批量制作模型图\n\n自定义模型图比系统自带的漂亮太多，他用Photoshop 脚本，一口气生成上百张模型图。\n\n图片一好看，点击率、转化率直接上来。\n\n4?? 批量编辑列表\n\n别小看这一步，他说很多新手就是因为不上心优化标题、标签、描述，导致根本没流量。\n\n还有他用 Listing Topper 查关键词，再统一批量优化，每个 listing 都是 SEO 武器库\n\n— 3 —\n关键总结\n\n最后他还总结了成功关键点，我觉得说得挺对：\n\n量就是机会\n上架的产品越多，出爆款的概率越大，\n2、效率优先\n能批量做的事绝不手动干，工具是解放时间的核心，省下的时间研究市场和设计。\n3、别瞎拍脑袋\n去看别人什么卖得好，抄+改比你闭门造车强太多。多看同行爆款，抄框架、改细节，比闭门造车靠谱 10 倍。\n4、图必须好看\n线上卖货，图片是第一印象，再棒的产品，图拍得烂也没人买，花时间打磨视觉绝对值得。\n按照这两步走，从 0 到稳定出单的路径其实很清晰。如果你也在做 Print-on-Demand，或者想入局 Etsy，这些经验可以直接抄作业～\n\n我分享这个案例给大家，主要是想传递2个信息，\n一、赚钱越来越高效了\n尤其是借助AI，借助工具，来钱的速度加快了\n二、一个人的公司\n现在搞钱，人真不需要多，核心是想法，认知，执行层面擅长借用工具，外包，这种公司会越来越多\n我觉得这个模式真不错，\npod模式，产品端不用发货，不管物流，没有客服\n吃设计\n设计用工具\n上产品用工具\n完全可以批量测试，快速搞钱\n听懂点赞～", "filename": "小北的梦呓_2025-08-08_0 库存、全自动化，月入10w刀，真不错.html"}]}, {"name": "平台趋势", "color": "#475569", "icon": "📊", "articles": [{"date": "2023-12-04", "title": "做Temu的风险和未来应对措施 ｜卖家必看", "recommended": false, "content": "来说说，Temu吧\n\n他的发展，未来存在的风险问题，以及我对卖家们的一些建议。\n本篇内容，应该是值得你认真看下的。\n我们开始吧。\n\n— 1 —\n拼多多发展太猛了\n\n拼多多的发展，包括海外的Temu，可以说一骑绝尘。\n\n看看刚刚公布的第三季度的财报：\n拼多多公布了 2023 年第三季度财报。\n第三季度收入为 688.4 亿元，同期相比大增 93.9%，远超市场预期的 537.7 亿元。\n实现美国通用会计准则口径净利润 155.4 亿元，净利润率 22.6%。\n非通用会计准则口径，净利润 170.3 亿元，同比增长 37%，同样远超市场预期。\n\n与此同时，拼多多的股价猛涨了17%\n\n这数据确实漂亮。\n\n而且拼多多未来在海外有更大的策略，比如在明年2月份的美国“春晚”超级碗上，进行广告投放。\n\n你要知道，今年超级碗一条30秒的广告花费，可是高达700万美元。\n拼多多豪掷上千万美金，给Temu打广告，这将会带来巨大的影响力。\n\n而且给大家看一组数字，今年到目前为止，Temu数字广告支出的\n\n46%投向了Facebook，\n\n22%投向了Instagram，\n\n15%投向了YouTube。\n\n大量的在外面砸钱搞流量，非常夸张，我猜接下来的股价还要再继续上涨。\n\n我把话放在这里了，听懂掌声！\n\n— 2—\nTemu潜在的风险 \n\nTemu一路高歌猛进，但是存在潜在的风险，\n这点卖家一定要注意。\n\n风险一：政治风险\n我认为最大的风险，就是美国会用行政措施对付Temu\nTemu如果这样持续搞下去，受影响的必然是亚马逊\n\n没办法啊，钱和用户就那么多，去Temu多了，去亚马逊的肯定就少了。\n但是如果动了亚马逊的蛋糕，\n你要知道，亚马逊在美国的财力，背后的财阀，舆论，新闻，公关，你看看会不会都用上？\n看看之前tiktok 被打压成什么样子？\n所以，现在美国政府很可能是给 你点蜜汁，无所谓啊，你帮我降低通胀\n\n现在还不至于影响亚马逊份额，给你甜头，无所谓\n但是后面真做大了，真影响一大批人就业\n行政措施，很可能就 来了\n那时候像对付华为的力度，不知道他扛不扛的住？\n这就第一个风险\n风险二：责任风险\n另外拼多多有点坑爹，就是他把责任撇的一清二楚\n如果你侵权，或者损害消费者的利益，是卖家你要出来背锅，不是平台来背锅\n在美国，人家报警，诉讼跟喝水一样正常\n你以为退款了事，搞不好 还要告你\n告谁？\n告的就是我们这些卖家\n责任全在你！\n这里面的风险，是实实在在的！\n\n— 3 —\n小北给卖家的建议\n\n我对未来的判断是这样的\n有几条路\n第一：打不过就加入\n还能怎么办？如果人家确实搞到第一名，我们骂骂咧咧都没用，打不过就加入。\n\n至于说风险什么时候来，那就不不知道了。\n所以没有门槛，技术的卖家，哪个平台火，你就跟着做那个平台吧\n比如temu，比如tiktok shop\n这种卖家就是随风逐流，管不了那么多，哪里有肉吃哪里\n第二种：品牌卖家\n前期亚马逊积累一定资金了，有一定销量，特别是某个垂类已经打出来爆品了，你一定要强自己品牌的能力\n这样不至于随风逐流，不至于太焦虑，\n很多人是什么平台火，就做什么平台，然后不断的开发新品，周而复始\n而品牌是什么平台做什么，只要入驻这个平台，品牌依然会有强大的生命力\n第三点：必须大量积累资源\n什么网红资源，什么pr资源，什么deal资源，每家公司你必须有自己的资源\n你没有这些东西，你很容易被人穿透\n你必须从现在开始积累，没有积累的公司，太容易在这个时代被打趴下了\n就是 必须建立私域流量\n第四点：建立私域用户\n各种外面搞流量，沉淀用户，\n任你东西南北，建立几千，几万名私域用户，这就是最大的壁垒\n有理想，有远见的公司，必须做这一环\n这是我小北，给大家最真实和忠诚的建议\n希望你们听进去\n以上！", "filename": "小北的梦呓_2023-12-04_做Temu的风险和未来应对措施 ｜卖家必看.html"}, {"date": "2025-10-13", "title": "靴子落地，跨境正式收税了", "recommended": false, "content": "该来的还是来了\n你没看错啊，靴子落地了，亚马逊现在全站点推送税务税务合规信息\n\n从此以后，你在海外平台赚的每一分钱，税务局都能看见，大家千万不要在有侥幸心理了。\n\n之前还有人抱着侥幸说，亚马逊不可能把信息推送给中国政府\n我就说了，首先只用一招就可以制服你，你总的收款吧，但是你看看\nPingPong是中国公司，总部在杭州\n\n连连支付是中国公司，总部也在杭州\n\n万里汇，P卡虽然是外资,但在中国有牌照、有分公司\n\n这些收款工具想在中国做生意,就必须拿到中国的支付牌照。\n拿牌照的前提是什么?必须接受中国政府监管!\n所以，你怎么可能不配合，怎么可能监管不到。\n\n— 1 —\n\n涉及到所有跨境平台\n\n说实在话，以前的跨境电商税务监管，说白了就是\"你不说我不问\"的游戏。\n平台不主动报，卖家不主动申报，税务局也没有直接下场。偶尔查几个大卖家，更多是\"杀鸡儆猴\"式的抽查。\n所以，一直以来跨境的灰色空间巨大，规则模糊，大家都在\"擦边球\"。\n\n但是你看看，这次公告最狠的地方在哪里？不再依赖人工举报，而是靠数据自动比对。\n亚马逊、eBay、Shopee、TikTok Shop、速卖通、Temu……所有主流平台，必须按季度向中国税务机关报送：\n你的身份信息（姓名、税号、店铺ID）\n\n你的交易数据（销售额、退款、净收入、订单量）\n\n换句话说：\n你卖了多少钱？系统知道。\n退了多少单？系统知道。\n收款进了哪个账户？系统也是能追踪到的。\n\n— 2 —\n\n国家为什么动真格了\n\n我直接说啊，三个核心原因：\n\n跨境电商体量太大了\n\n2024年中国跨境电商交易额突破2.4万亿元，但实际纳税的卖家比例极低。税收流失严重。\n2、全球税务透明化大趋势\nCRS（全球金融账户信息自动交换）已经实施多年，现在轮到跨境电商了。这是国际税收协作的必然结果。\n3、合规化是行业成熟的标志\n一个行业合规，其实才能让让真正的长期玩家留下来，所有成熟的行业都是如此。\n4、经济xx，中美博弈，大国复兴，增长xx\n懂得都懂，方方面面都需要钱，具体就不说了\n\n— 3 —\n\n三类卖家最危险\n\n第一类：用个人账户收款的卖家\n\n典型操作：\n公司店铺的收入，通过PingPong、万里汇、连连等工具，直接打到个人银行卡或支付宝。\n这样的操作存在什么问题？\n公司收入和个人收入混在一起，无法区分\n\n税务局一旦比对平台数据和个人流水，立刻发现异常\n\n被认定为隐匿收入、逃避纳税，补税+罚款+滞纳金\n\n第二类：没有税号、没有企业主体的卖家\n典型操作：\n用个人身份直接注册店铺\n\n或者挂靠别人的公司开店，但财务完全不规范\n\n没有做账，没有申报，觉得\"平台不查就没事\"\n\n这里面的危险点在哪里？\n新政要求平台报送纳税人识别号，如果你没有，系统会直接标红\n\n税务局可以通过身份证号追溯到你的所有收入来源\n\n无税号运营 几乎等于裸奔式违规，一查一个准\n\n这种的被查到，肯定是被要求补办企业主体、补缴税款，并被平台暂停店铺，损失惨重。\n第三类：用境外个人账户收款的卖家\n\n这些人主要是\n\n注册香港个人银行账户，直接收款\n或者用新加坡、美国等地的个人账户，觉得\"国内查不到\"\n\n为什么危险？\nCRS早就把全球金融账户信息互通了，其实都是可以查到的（中国和新加坡都是成员）\n跨境资金流异常，容易触发反洗钱监控\n一旦被认定为非法转移资产，后果比逃税更严重\n\n小北我之前看到有卖家的香港个人账户因为频繁大额转账被冻结，资金无法提取，业务直接停摆。\n\n— 4 —\n\n接下来有哪些方法？\n\n首先我是鼓励合规，正常交税，其实大家是因为不懂，所以才恐慌，你一个账户控制在300w，分几个主体，你根本不用怕。\n\n好吧，但是确实还有几个选择\n\n第一：建议注册美国公司或香港公司\n如果你是亚马逊、eBay等平台卖家，建议注册美国公司或香港公司，然后申请EIN（美国税号）或香港商业登记证\n用企业主体重新认证店铺，完成身份合规\n第二：规范账户结构，公对公收款\n一定不再用个人账户收款，全部改为企业账户公司收入进公司账户，个人工资通过公司发放避免公私混用，保持资金流清晰\n公司的钱归公司，个人的钱归个人，不要混在一起\n第三：建立财税系统，留痕+留底\n\n每笔收入、支出都要有对应的发票或凭证，建立规范的财务账本，按月记账\n聘请专业财税顾问或使用跨境财税SaaS工具\n这样做税务局查账时，你能拿出完整的证据链，证明自己的收入来源合法、税款申报真实。\n第四：主动申报，合理税务筹划\n\n利用税收优惠政策（如小规模纳税人、核定征收等）合理降低税负，还有千万别碰虚开发票、做假账，这是红线\n\n— 5 —\n\n常用一些问题\n\n问题一：我公司有几个店铺 A、B、C，为了退税是通过另一家公司 D 出口的，这样可以吗？\n\nA：不可以。\n这种做法属于“出口主体与销售主体不一致”，在新规下属于是高风险操作。\n因为现在的税务、海关、平台数据现在都是打通的，一旦比对不一致，很容易被系统标红。\n问题二：为什么这种操作以前没事，现在不行了？\n\n以前可以是因为各系统独立，平台只管销售，海关只看报关单，税务只核退税单；\n还是一句话，金税四期，包括数据全面联网，只要出现“店铺卖货、别家公司退税”，系统自动预警。\n问题三：这种情况可能会有什么后果？\n\n1?? 被认定为挂靠出口或虚假申报；\n2?? 退税款可能被追回；\n3?? 税务风险暴露，公司列入重点稽查名单。\n问题四：那现在应该怎么整改？\n\n第一步： 给 A、B、C 公司办理自己的出口权；\n第二步： 收款、发票、退税全部对应同一主体；\n第三步： 整理历史单据，确保账、单、款一致。\nQ5：短期内怎么办？D 公司还在帮我退税。\n可以先停新增业务，\n同时签署合法的代办协议，\n并尽快为实际经营主体办理出口备案，\n主动向税务说明历史情况，避免被动稽查。\n反正借壳出口肯定是不行的。\n所以优联荟，接下来肯定要开个合规的内容了，太重要了！\n\n最后我想说的是：\n\n如果你真心想在跨境电商这条路上走下去，那现在做的每一步合规动作，都是在为未来铺路。\n\n现在补救，一定是比以后被查强一百倍。\n其实我觉得，也不是说国家要\"打击\"跨境电商，哪怕美国，你不交税试试。\n我们一定要适应不断变化的节奏。", "filename": "小北的梦呓_2025-10-13_靴子落地，跨境正式收税了.html"}, {"date": "2025-10-14", "title": "跨境出海，哪些品类还有机会？", "recommended": false, "content": "我做了这么多年生意，见过太多品类的起起落落。\n\n今天就说说我观察到的，哪些品类还有机会，哪些已经没啥搞头了。\n\n纯粹分享\n— 1 —\n\n哪些品类别碰了\n\n我先来说说已经卷成麻花的品类\n\n1、服装鞋帽，别碰了。\n我以前做过几年，现在基本不碰了。为啥？太卷了。\n你去看看Temu、Shein，衬衫2块钱一件，连运费都不够。河北那边的卖家，不赚钱也要发货，就为了走量。你怎么跟人家拼？\n除非你做高端品牌，有自己的设计，否则别进这个坑。\n2、小商品杂货，也够呛。\n什么手机壳、数据线、小饰品，义乌一大堆。价格透明得不能再透明了。你在1688上拿货10块，别人8块都能拿到。\n这些品类唯一的出路就是做精品，做品牌。但做品牌需要时间和投入，不是一般人能玩的。\n\n— 2 —\n\n哪些有机会的\n\n再说说还有机会的\n\n第一类：科技类小家电\n我还是看好\n为啥？因为中国的供应链太强了，迭代速度快，成本又低。老外做不出来这个性价比。\n最近几年火的：比如扫地机器人、空气炸锅、筋膜枪、美容仪。哪个不是中国货占领了市场？\n之前看到跨境有个卖家做那种便携式榨汁机，就是充电的，可以随身带的那种。\n1688上拿货40块，卖到美国29.99美金。一个月能出三四千单。\n关键是这东西老外确实需要。他们喜欢健身，喜欢喝果汁，又懒得洗榨汁机。这种便携式的正好解决了痛点。\n但是我建议，一定做差异化才有竞争力\n比如续航、刀片设计、安全锁、可拆洗结构等，依然有利润空间\n还有那种智能插座、智能灯泡。老外对智能家居接受度很高，中国货便宜又好用，市场大着。\n但这里有个坑要注意：一定要过认证。\n\n欧洲的CE，美国的FCC、UL，一个都不能少。不然到时候出事儿，肯定罚你到痛。\n\n第二类：户外用品\n露营前几年火得一塌糊涂，不光国内，国外也一样。\n我去年去广交会，看到好几个做户外的厂，生意好得不得了。老外排队下单。\n什么帐篷、睡袋、折叠椅、便携炉具，都好卖。特别是那种有点科技含量的。比如充气帐篷，几分钟就能搭好。比如太阳能充电板，可以给手机充电。\n\n但是我自己肯定是不做了。主要是，露营赛道现在非常依赖内容驱动\n在亚马逊、TikTok、Instagram上，买家被场景短视频种草（露营布景、户外灯氛围），\n如果你只是“上架卖货”，没有内容、品牌、视觉差异，很难起量，我觉得我这个做不来。\n还有钓鱼用品。\n我建议往深的来做，比如线组、鱼钩、支架、收纳包、灯具、防水盒…\n这类产品，SKU极度碎片化\n\n第三类：宠物用品\n老外对宠物的重视程度，超出你想象。他们宁愿自己少吃点，也要给宠物买好东西。\n什么自动喂食器、智能猫砂盆、宠物背包、宠物推车，全是商机。\n我有个做跨境的朋友，专门卖宠物推车。就是那种可以推着猫狗出去遛弯的。1688上拿货200块，卖到美国89美金。一个月能出上千单。\n关键是这东西复购率还挺高的。养宠物的人，会持续买各种用品。\n但这个品类有个问题：\n\n竞争也在变大。你要做，就得做有差异化的。要么功能独特，要么设计好看，要么性价比极致。\n第四类：美容美妆工具\n注意，我说的不是化妆品，是工具。\n化妆品有各种认证要求，门槛太高。但美容工具就简单多了。\n什么洗脸仪、美容仪、LED面膜、瘦脸仪，老外特别吃这一套。\n之前看过一个做美容仪的朋友，一个月能在亚马逊卖两三千台。利润率还挺高，能有40%。\n关键是这东西看起来科技含量高，其实成本不贵。1688上拿货六七十块，能卖到四五十美金。\n但要注意：\n\n这个品类对颜值要求很高，包装要好看，产品要好看，视频要拍得精致。不然老外看都不看，所以没实力的也别做。\n\n— 3 —\n\n特别有潜力的\n\n说几个特别有潜力的品类\n\n1、汽车配件\n汽车配件不是什么新奇玩样，但是老外真的特别喜欢自己DIY修车。什么行车记录仪、车载充电器、座椅套，都是刚需。\n特别是那种有点科技感的。比如太阳能胎压监测，比如无线充电手机支架。\n有个温州的朋友做车载吸尘器，一年能做一千多万。\n但是这个类目，有些品牌化趋势明显，比如Baseus、Veepeak这类品牌占了头部\n还是要做垂类，比如新能源车周边，车内氛围，车载收纳垂类\n2、园艺工具\n老外家家有院子，园艺工具是刚需。\n什么修枝剪、浇水器、除草机，需求量很稳定。\n特别是那种省力的、智能的。比如电动修枝剪，比如自动浇水系统。\n园艺类的问题在于，\n产品体积较大，头程&仓储成本高。\n\n有一定安全标准限制（如刀片类）。\n\n内容驱动强：用户购买前需要被教育“怎么用\n\n这些问题要注意\n3、乐器配件\n老外学乐器的特别多。什么吉他配件、尤克里里、电子鼓，都有市场。\n我看到有人在TikTok上卖尤克里里，一个月能出好几千把。\n但是要注意，这个产品，也要特别注意内容，在TikTok/YouTube\n因为音乐人内容容易种草，你看看有没有这个能力\n\n— 4 —\n\n几个建议\n\n第一，别追风口\n什么火就做什么，那是送死。等你反应过来，市场已经饱和了。\n要做就做自己熟悉的，或者身边有资源的。\n第二，一定要有差异化\n现在这个时代，同质化的产品没机会了。\n要么功能独特，要么设计好看，要么性价比极致，要么品牌做得好。总得有一样能打的。\n第三，重视供应链\n好的供应链能让你少走很多弯路。品质稳定，交期准时,售后少。\n别光看价格便宜就拿货。便宜的货，坑更大。\n第四，合规很重要\n该过的认证一定要过，该买的保险一定要买。\n我见过太多人因为没认证，被平台下架，被海关扣货，甚至被起诉。那个代价太大了。\n第五，别指望一夜暴富\n我现在就是往深的来做，比如做品牌。但这个是慢活儿。前期投入大，见效慢，但一旦做起来，就很稳。\n那些想着快速捞一笔的，基本都死得很难看。\n\n现在真是拼品质、拼设计、拼品牌。\n如果你只会打价格战，劝你别做了。那条路已经走不通了。\n但如果你愿意沉下心来,好好做产品，好好做品牌，机会还是很大的。\n毕竟中国的供应链在这儿摆着，全世界没有第二个国家能跟咱们比。这是咱们最大的优势。\n以上！", "filename": "小北的梦呓_2025-10-14_跨境出海，哪些品类还有机会？.html"}, {"date": "2026-05-22", "title": "美国市场，搞钱的方法太多了", "recommended": false, "content": "美国是一个非常神奇的市场，搞钱的方法太多了\n\n就比如说 Facebook Marketplace，上面经常能看到一些让人大跌眼镜的财富密码。\n\n在美国，很多中产家庭的院子里都会装那种巨大的实木秋千滑梯组合，动辄上千美金。\n\n可当孩子长大后，这玩意儿就成了巨大的空间累赘。\n\n如果请专门的垃圾清理公司来拆，主人反而要倒贴几百美金。\n\n所以，Facebook Marketplace 上每天都有无数人把它挂成 $0美金免费赠送，唯一的条件是：\n\n只要你能在周末开辆车来，自己把它拆走就行！ \n\n这个模式的本质，你以为卖的是二手滑梯，其实卖的是“大件物流、硬核拆卸与重组”的劳动力服务！ \n\n这里面其实可以赚2道钱 \n\n不只是倒买倒卖，因为普通家庭就算想买便宜的二手滑梯，也会被怎么搬运、怎么安装的巨大痛点劝退。\n\n而你的核心操作就是直接两头截流： \n\n1、零成本挂牌：在网上看到有人免费送，直接截图，反手在同一个平台上加价到 $500 美元重新上架，标题直接标明“含免费送货 + 上门组装”。\n\n2、两头锁单：一旦有需要的买家联系你并付了定金，你再立刻联系免费赠送的卖家，开着皮卡去拆卸，当天运到买家后院完成组装，半天直接净赚 $500 美元！\n\n如果你有皮卡，会拆，会装，能协调时间，你完全可以先锁定免费货源，再去找需要滑梯的家庭，报价 500 美金，包含送货和上门组装。\n\n前面说了，这表面看你卖的是二手滑梯，实际上你卖的是拆卸、搬运、重组和省心。\n\n说白了，你赚的是麻烦费，但这就是套利。 \n\n还有你不要看到，皮卡，会拆，会装，你觉得不适合你，那当然了，有门槛才能刷选掉一部分人，没有门槛你只能搞那些轻小件的。 \n\n感兴趣的点个赞，明天写个更具体的方法和落地策略。", "filename": "小北的梦呓_2026-05-22_美国市场，搞钱的方法太多了.html"}]}]};

    cl.previousElementSibling.classList.remove('collapsed');
  }
  if(window.innerWidth<=768) { document.getElementById('sidebar').classList.remove('open'); document.getElementById('backdrop').classList.remove('show'); }
  const c = document.getElementById('content');
  let h = '<div class="article-header"><div class="article-title">'+escHtml(a.title)+'</div><div class="article-meta"><span>📅 '+a.date+'</span><span>'+a.catIcon+' '+a.catName+'</span>';
  if(a.recommended) h += '<span class="badge">⭐ 强烈推荐</span>';
  h += '</div></div>';
  h += '<div class="tts-bar"><button class="tts-btn play" onclick="ttsToggle()" id="ttsPlay">🔊 朗读全文</button><button class="tts-btn stop" onclick="ttsStop()" id="ttsStopBtn" disabled>⏹ 停止</button><span class="tts-speed">语言 <select id="ttsLang" onchange="ttsLangChange()"><option value="zh-CN" selected>普通话</option><option value="zh-HK">粤语</option></select></span><span class="tts-speed">语速 <select id="ttsSpeed" onchange="ttsSpeedChange()"><option value="0.8">慢速</option><option value="1" selected>正常</option><option value="1.3">快速</option><option value="1.6">很快</option></select></span><span class="tts-progress" id="ttsProgress" style="display:none"><div class="tts-progress-bar"><div class="tts-progress-fill" id="ttsProgressFill"></div></div><span id="ttsStatus"></span></span></div>';
  // Split content into paragraphs for highlighting
  const paras = a.content.split(/\n+/).filter(p => p.trim());
  h += '<div class="article-body" id="articleBody">';
  paras.forEach((p, i) => { h += '<p id="para-'+i+'">'+escHtml(p)+'</p>'; });
  h += '</div>';
  h += '<div class="nav-buttons">';
  if(idx>0) { const p=flat[idx-1]; h += '<div class="nav-btn prev" onclick="loadArt('+(idx-1)+')"><div class="label">← 上一篇</div><div class="title">'+escHtml(p.title)+'</div></div>'; } else { h += '<div></div>'; }
  if(idx<flat.length-1) { const n=flat[idx+1]; h += '<div class="nav-btn next" onclick="loadArt('+(idx+1)+')"><div class="label">下一篇 →</div><div class="title">'+escHtml(n.title)+'</div></div>'; }
  h += '</div>';
  c.innerHTML = h;
  window.scrollTo({top:0,behavior:'smooth'});
  document.getElementById('topBtn').style.display = 'block';
}
function escHtml(t) { const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }
function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); document.getElementById('backdrop').classList.toggle('show'); }
function handleSearch(v) {
  const sb = document.getElementById('sidebarContent');
  if(!v.trim()) { renderSidebar(); return; }
  const results = [];
  flat.forEach((a,i) => {
    if(a.title.toLowerCase().includes(v.toLowerCase()) || a.content.toLowerCase().includes(v.toLowerCase())) results.push({...a,gi:i});
  });
  let h = '<div class="search-results"><div style="padding:12px;font-size:13px;color:#6b7280;font-weight:600">找到 '+results.length+' 篇</div>';
  results.forEach(r => {
    h += '<div class="result-item" onclick="loadArt('+r.gi+');document.getElementById(\'searchInput\').value=\'\';renderSidebar()"><div class="title">'+(r.recommended?'⭐ ':'')+r.title+'</div><div class="cat">'+r.catName+' · '+r.date+'</div></div>';
  });
  if(results.length===0) h += '<div style="padding:20px;text-align:center;color:#9ca3af">未找到</div>';
  h += '</div>';
  sb.innerHTML = h;
}
window.addEventListener('scroll', () => {
  const sh = document.documentElement.scrollHeight - window.innerHeight;
  document.getElementById('progressBar').style.width = (window.scrollY / sh * 100) + '%';
});
renderSidebar();
document.getElementById('cl0').classList.remove('hidden');

// ===== TTS 朗读功能（分段高亮+自动滚动+多语言） =====
let ttsPlaying = false;
let ttsPaused = false;
let ttsParas = [];
let ttsParaIdx = 0;
let ttsVoices = [];

// Load available voices
function loadVoices() {
  if ('speechSynthesis' in window) {
    ttsVoices = window.speechSynthesis.getVoices() || [];
  }
}
if ('speechSynthesis' in window) {
  loadVoices();
  window.speechSynthesis.onvoiceschanged = loadVoices;
}
function getTtsLang() {
  const sel = document.getElementById('ttsLang');
  return sel ? sel.value : 'zh-CN';
}
function setTtsVoice(utterance) {
  const lang = getTtsLang();
  // Find a matching voice
  const voice = ttsVoices.find(v => v.lang === lang) ||
                ttsVoices.find(v => v.lang && v.lang.startsWith(lang.split('-')[0]));
  if (voice) utterance.voice = voice;
}
function ttsLangChange() {
  const lang = getTtsLang();
  if (lang === 'zh-HK') {
    const has = ttsVoices.some(v => v.lang === 'zh-HK' || (v.lang && v.lang.includes('HK')));
    if (!has) {
      const s = document.getElementById('ttsStatus');
      if (s) s.textContent = '⚠️ 系统未安装粤语语音包，将用普通话朗读';
      setTimeout(() => { if (ttsPlaying) document.getElementById('ttsStatus').textContent = '朗读中 ' + (ttsParaIdx + 1) + '/' + ttsParas.length; }, 3000);
    }
  }
}
function ttsToggle() {
  if (!('speechSynthesis' in window)) { alert('当前浏览器不支持语音朗读功能'); return; }
  if (ttsPlaying && !ttsPaused) { ttsPause(); return; }
  if (ttsPaused) { ttsResume(); return; }
  ttsStart();
}
function ttsStart() {
  window.speechSynthesis.cancel();
  const body = document.getElementById('articleBody');
  if (!body) return;
  // Collect all paragraph elements
  ttsParas = Array.from(body.querySelectorAll('p'));
  if (ttsParas.length === 0) {
    // Fallback: read raw text
    const raw = body.textContent || '';
    if (!raw.trim()) return;
    const u = new SpeechSynthesisUtterance(raw);
    u.lang = getTtsLang(); u.rate = parseFloat(document.getElementById('ttsSpeed').value) || 1;
    setTtsVoice(u);
    window.speechSynthesis.speak(u);
    return;
  }
  // Clear previous highlights
  ttsParas.forEach(p => p.classList.remove('reading-para','done'));
  ttsParaIdx = 0;
  ttsPlaying = true;
  ttsPaused = false;
  updateTtsUI('playing');
  document.getElementById('ttsProgress').style.display = 'flex';
  speakPara();
}
function speakPara() {
  if (ttsParaIdx >= ttsParas.length) {
    ttsStop();
    document.getElementById('ttsStatus').textContent = '✅ 朗读完毕';
    setTimeout(() => { if(!ttsPlaying) document.getElementById('ttsProgress').style.display='none'; }, 3000);
    return;
  }
  // Mark previous as done
  if (ttsParaIdx > 0) {
    ttsParas[ttsParaIdx - 1].classList.remove('reading-para');
    ttsParas[ttsParaIdx - 1].classList.add('done');
  }
  // Highlight current
  const para = ttsParas[ttsParaIdx];
  para.classList.add('reading-para');
  para.classList.remove('done');
  // Auto-scroll to current paragraph
  para.scrollIntoView({ behavior: 'smooth', block: 'center' });
  // Update progress
  const pct = Math.round((ttsParaIdx / ttsParas.length) * 100);
  document.getElementById('ttsProgressFill').style.width = pct + '%';
  document.getElementById('ttsStatus').textContent = '朗读中 ' + (ttsParaIdx + 1) + '/' + ttsParas.length;
  // Speak this paragraph
  const text = para.textContent.replace(/\s+/g,' ').trim();
  if (!text) { ttsParaIdx++; speakPara(); return; }
  // Split long paragraphs into chunks (browser limit ~32KB, but also helps with pauses)
  const sentences = text.match(/[^。！？!?\n]+[。！？!?\n]*/g) || [text];
  let buf = '';
  const chunks = [];
  for (const s of sentences) {
    buf += s;
    if (buf.length >= 180) { chunks.push(buf); buf = ''; }
  }
  if (buf) chunks.push(buf);
  let chunkIdx = 0;
  function speakChunk() {
    if (chunkIdx >= chunks.length) {
      ttsParaIdx++;
      if (ttsPlaying && !ttsPaused) speakPara();
      return;
    }
    const u = new SpeechSynthesisUtterance(chunks[chunkIdx]);
    u.lang = getTtsLang();
    u.rate = parseFloat(document.getElementById('ttsSpeed').value) || 1;
    setTtsVoice(u);
    u.onend = () => { if (ttsPlaying && !ttsPaused) { chunkIdx++; speakChunk(); } };
    u.onerror = () => { if (ttsPlaying && !ttsPaused) { chunkIdx++; speakChunk(); } };
    window.speechSynthesis.speak(u);
  }
  speakChunk();
}
function ttsPause() {
  window.speechSynthesis.pause();
  ttsPaused = true;
  updateTtsUI('paused');
}
function ttsResume() {
  window.speechSynthesis.resume();
  ttsPaused = false;
  updateTtsUI('playing');
}
function ttsStop() {
  window.speechSynthesis.cancel();
  ttsPlaying = false;
  ttsPaused = false;
  // Clear highlights
  if (ttsParas.length) ttsParas.forEach(p => p.classList.remove('reading-para','done'));
  ttsParas = [];
  ttsParaIdx = 0;
  updateTtsUI('stopped');
}
function ttsSpeedChange() {
  const s = document.getElementById('ttsStatus');
  if (s) {
    s.textContent = '语速已调整，下段生效';
    setTimeout(() => { if (ttsPlaying) s.textContent = '朗读中 ' + (ttsParaIdx + 1) + '/' + ttsParas.length; }, 1500);
  }
}
function updateTtsUI(state) {
  const btn = document.getElementById('ttsPlay');
  const stopBtn = document.getElementById('ttsStopBtn');
  const status = document.getElementById('ttsStatus');
  const prog = document.getElementById('ttsProgress');
  if (state === 'playing') { btn.innerHTML = '⏸ 暂停'; btn.className = 'tts-btn pause'; stopBtn.disabled = false; }
  else if (state === 'paused') { btn.innerHTML = '▶ 继续'; btn.className = 'tts-btn play'; }
  else { btn.innerHTML = '🔊 朗读全文'; btn.className = 'tts-btn play'; stopBtn.disabled = true; if (status) status.textContent = ''; if (prog) prog.style.display = 'none'; }
}
</script>
